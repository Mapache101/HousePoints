<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIS AR Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: {
                            navy: '#0C1D40',
                            gold: '#FFF86B',
                            grey: '#A8A6A5'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'fade-in': 'fadeIn 0.2s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        
        /* Mobile friendly active states */
        .btn-press { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active:not(:disabled) { transform: scale(0.97); }
        
        /* Hide scrollbar for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Radio button custom styling */
        input[type="radio"]:checked + div {
            border-color: #0C1D40;
            background-color: #eff6ff;
        }
        input[type="radio"]:checked + div .radio-indicator {
            background-color: #0C1D40;
            border-color: #0C1D40;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, Timestamp, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ IMPORTANT: Replace this with your actual Firebase project config 
        // You can find this in your Firebase Console -> Project Settings
        const githubPagesConfig = {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };

        // Setup Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : githubPagesConfig;
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'scis-ar-portal';

            window.FirebaseDB = { auth, db, collection, addDoc, onSnapshot, query, orderBy, Timestamp, doc, updateDoc, deleteDoc, signInWithCustomToken, signInAnonymously, onAuthStateChanged, appId };
        } catch (error) {
            console.error("Firebase Initialization Error:", error);
            // We failed to init (likely bad API key on Github Pages). The React app will catch this and show a warning.
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Constants
        const HOUSES = {
            'centaurs': { name: 'Centaurs', color: '#3b82f6', icon: '🏹', bg: 'bg-blue-100', text: 'text-blue-700' },
            'pegasus': { name: 'Pegasus', color: '#22c55e', icon: '🪽', bg: 'bg-green-100', text: 'text-green-700' },
            'titans': { name: 'Titans', color: '#eab308', icon: '⚡', bg: 'bg-yellow-100', text: 'text-yellow-700' },
            'unicorns': { name: 'Unicorns', color: '#ef4444', icon: '🦄', bg: 'bg-red-100', text: 'text-red-700' }
        };

        const REASONS = [
            "Late to class (unexcused) - Llegar tarde a clases.",
            "Disruptive behaviour - Comportamiento inadecuado.",
            "Constantly interrupting class - Interrumpir en clase constantemente.",
            "Not following instructions - No seguir instrucciones.",
            "Not wearing the proper uniform - No vestir el uniforme adecuado.",
            "Not presenting requested materials in class - No presentarse con los materiales de trabajo requeridos.",
            "Eating in class - Comer en horarios de clase.",
            "Public Display of affection(PDA) - Contacto físico en publico.",
            "Speaking spanish inside the class and in the hallways - Hablar en español en pasillos/dentro del aula.",
            "Sleeping in class - Dormir en clase.",
            "Other - Otro"
        ];

        const SUBJECTS = [
            "Coordination", "Spanish / Ms Carola", "Spanish / Ms Charito", "Science / Mr Tobias", 
            "Science / Ms Daniela", "Chemistry", "Social Studies", "History", 
            "Physics", "Physical Education", "Maths / Kingsley", "Maths / Silvia", 
            "Maths / Guillermo", "English / Elvia", "English / Sara", 
            "English / Letty", "ICT", "Biology", "Art", "Music", "Global Perspectives / Ms Wei", 
            "Global Perspectives / Ms Bell", "Business Studies", "Homeroom"
        ];

        function StudentManager({ students }) {
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ name: '', grade: '', house: 'centaurs' });
            const [filter, setFilter] = useState('');

            const filtered = students.filter(s => s.displayName.includes(filter.toUpperCase()) || s.grade.includes(filter));

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { db, collection, doc, addDoc, updateDoc, appId } = window.FirebaseDB;
                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', editingId), formData);
                        setEditingId(null);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), formData);
                    }
                    setFormData({ name: '', grade: '', house: 'centaurs' });
                } catch (err) { alert("Error saving student"); }
            };

            const handleDelete = async (id) => {
                if(!confirm("Delete this student?")) return;
                const { db, doc, deleteDoc, appId } = window.FirebaseDB;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
            };

            const handleBulkImport = async () => {
                const jsonStr = prompt("Paste JSON array of students e.g. [{name: 'John Doe', grade: '2sA', house: 'centaurs'}]:");
                if (!jsonStr) return;
                try {
                    const arr = JSON.parse(jsonStr);
                    if (!confirm(`Import ${arr.length} students?`)) return;
                    const { db, collection, addDoc, appId } = window.FirebaseDB;
                    for (const s of arr) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), {
                            name: s.name, grade: s.grade, house: s.house
                        });
                    }
                    alert("Import complete!");
                } catch(e) { alert("Invalid JSON format."); }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-display font-black text-xl text-scis-navy">{editingId ? 'Edit Student' : 'Add New Student'}</h3>
                            <button onClick={handleBulkImport} className="text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-200">Bulk Import JSON</button>
                        </div>
                        <form onSubmit={handleSubmit} className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                            <input type="text" placeholder="Full Name" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required className="sm:col-span-2 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-scis-navy outline-none font-medium text-sm" />
                            <input type="text" placeholder="Grade (e.g. 2sA)" value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})} required className="p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-scis-navy outline-none font-medium text-sm" />
                            <select value={formData.house} onChange={e => setFormData({...formData, house: e.target.value})} className="p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-scis-navy outline-none font-medium text-sm">
                                {Object.entries(HOUSES).map(([id, h]) => <option key={id} value={id}>{h.name}</option>)}
                            </select>
                            <div className="sm:col-span-4 flex gap-2">
                                <button type="submit" className="bg-scis-navy text-scis-gold px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#122859] transition-colors">{editingId ? 'Update Student' : 'Add Student'}</button>
                                {editingId && <button type="button" onClick={() => {setEditingId(null); setFormData({name:'', grade:'', house:'centaurs'})}} className="bg-slate-100 text-slate-600 px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-slate-200">Cancel</button>}
                            </div>
                        </form>
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                        <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-4">
                            <h3 className="font-display font-black text-xl text-scis-navy">Student Directory ({students.length})</h3>
                            <input type="text" placeholder="Search..." value={filter} onChange={e => setFilter(e.target.value)} className="p-2 bg-slate-50 border border-slate-200 rounded-lg focus:border-scis-navy outline-none text-sm" />
                        </div>
                        <div className="max-h-96 overflow-y-auto pr-2">
                            {filtered.map(s => (
                                <div key={s.id} className="flex justify-between items-center p-3 border-b border-slate-100 hover:bg-slate-50">
                                    <div>
                                        <div className="font-bold text-scis-navy text-sm">{s.name}</div>
                                        <div className="flex gap-2 mt-1">
                                            <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-1.5 rounded">{s.grade}</span>
                                            <span className="text-[10px] uppercase text-slate-400">{HOUSES[s.house]?.name}</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => {setEditingId(s.id); setFormData({name: s.name, grade: s.grade, house: s.house})}} className="text-blue-500 text-xs font-bold hover:underline">Edit</button>
                                        <button onClick={() => handleDelete(s.id)} className="text-red-500 text-xs font-bold hover:underline">Delete</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- COMPONENTS ---

        function HouseBadge({ houseId }) {
            const house = HOUSES[houseId];
            if (!house) return null;
            return (
                <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${house.bg} ${house.text} border border-${house.color}/20`}>
                    {house.icon} {house.name}
                </span>
            );
        }

        function ARForm({ user, students }) {
            const GRADES = useMemo(() => [...new Set(students.map(s => s.grade))].sort(), [students]);

            const [searchMode, setSearchMode] = useState('search'); // 'search' | 'dropdown'
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedGrade, setSelectedGrade] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            const [reason, setReason] = useState('');
            const [customReason, setCustomReason] = useState('');
            const [subject, setSubject] = useState('');
            
            const [showPreview, setShowPreview] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [successMsg, setSuccessMsg] = useState(false);

            // Filter students
            const filteredStudents = useMemo(() => {
                if (searchMode === 'search') {
                    if (searchTerm.length < 2) return [];
                    return students.filter(s => s.displayName.includes(searchTerm.toUpperCase()));
                } else {
                    if (!selectedGrade) return [];
                    return students.filter(s => s.grade === selectedGrade);
                }
            }, [searchTerm, searchMode, selectedGrade, students]);

            const isFormComplete = selectedStudent && reason && (reason !== 'Other - Otro' || customReason.trim() !== '') && subject;

            const handleSubmit = async () => {
                setIsSubmitting(true);
                try {
                    const { db, collection, addDoc, Timestamp, appId } = window.FirebaseDB;
                    const arData = {
                        studentId: selectedStudent.id,
                        studentName: selectedStudent.displayName,
                        grade: selectedStudent.grade,
                        house: selectedStudent.house,
                        reason: reason,
                        customReason: reason === 'Other - Otro' ? customReason : null,
                        subject: subject,
                        teacherEmail: user.email || "teacher@scis-bo.com",
                        timestamp: Timestamp.now(),
                        status: 'pending'
                    };

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'active_reflections'), arData);
                    
                    setSuccessMsg(true);
                    setTimeout(() => {
                        // Reset Form
                        setSuccessMsg(false);
                        setShowPreview(false);
                        setSelectedStudent(null);
                        setSearchTerm('');
                        setReason('');
                        setCustomReason('');
                        setSubject('');
                    }, 3000);

                } catch (error) {
                    console.error("Error saving AR:", error);
                    alert("Failed to submit AR. Please check connection.");
                }
                setIsSubmitting(false);
            };

            if (successMsg) {
                return (
                    <div className="flex flex-col items-center justify-center py-20 animate-fade-in text-center px-4">
                        <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-5xl mb-6 shadow-sm border-4 border-white">
                            ✓
                        </div>
                        <h2 className="text-2xl font-display font-black text-scis-navy uppercase tracking-tight mb-2">AR Assigned</h2>
                        <p className="text-slate-500 font-medium">Active Reflection recorded successfully.</p>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto pb-24 animate-fade-in">
                    
                    {/* Header */}
                    <div className="mb-6 px-4">
                        <h2 className="text-3xl font-display font-black text-scis-navy uppercase tracking-tight">Assign AR</h2>
                        <p className="text-slate-500 text-sm font-medium mt-1">Issue an Active Reflection to a student.</p>
                    </div>

                    <div className="space-y-4 px-4">
                        
                        {/* 1. STUDENT SELECTION */}
                        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="w-8 h-8 rounded-full bg-scis-navy text-scis-gold font-display font-black flex items-center justify-center">1</span>
                                <h3 className="font-bold text-lg text-scis-navy">Select Student</h3>
                            </div>

                            {selectedStudent ? (
                                <div className="bg-slate-50 rounded-2xl p-4 border-2 border-slate-200 flex justify-between items-center animate-slide-up">
                                    <div>
                                        <p className="font-black text-scis-navy text-sm md:text-base leading-tight mb-1">{selectedStudent.displayName}</p>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-bold text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-200">Grade: {selectedStudent.grade}</span>
                                            <HouseBadge houseId={selectedStudent.house} />
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedStudent(null)} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                </div>
                            ) : (
                                <div>
                                    <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
                                        <button onClick={() => setSearchMode('search')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${searchMode === 'search' ? 'bg-white text-scis-navy shadow-sm' : 'text-slate-500'}`}>Search Name</button>
                                        <button onClick={() => setSearchMode('dropdown')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${searchMode === 'dropdown' ? 'bg-white text-scis-navy shadow-sm' : 'text-slate-500'}`}>By Grade</button>
                                    </div>

                                    {searchMode === 'search' ? (
                                        <input 
                                            type="text" 
                                            placeholder="Type name (e.g. Perez)..."
                                            value={searchTerm}
                                            onChange={e => setSearchTerm(e.target.value)}
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-scis-navy/20 focus:border-scis-navy font-medium"
                                        />
                                    ) : (
                                        <select 
                                            value={selectedGrade} 
                                            onChange={e => setSelectedGrade(e.target.value)}
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-scis-navy/20 focus:border-scis-navy font-medium appearance-none"
                                        >
                                            <option value="">-- Select Grade --</option>
                                            {GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                    )}

                                    {filteredStudents.length > 0 && (
                                        <div className="mt-2 border border-slate-200 rounded-xl max-h-48 overflow-y-auto bg-white shadow-lg absolute z-10 w-[calc(100%-2rem)] max-w-[calc(36rem-2rem)]">
                                            {filteredStudents.map(student => (
                                                <div 
                                                    key={student.id} 
                                                    onClick={() => setSelectedStudent(student)}
                                                    className="p-3 border-b border-slate-100 last:border-0 hover:bg-slate-50 cursor-pointer active:bg-slate-100"
                                                >
                                                    <p className="font-bold text-sm text-scis-navy">{student.displayName}</p>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className="text-[10px] text-slate-500 font-bold bg-slate-100 px-1.5 rounded">{student.grade}</span>
                                                        <span className="text-[10px] uppercase text-slate-400">{HOUSES[student.house]?.name}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 2. REASON SELECTION */}
                        <div className={`bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60 transition-opacity duration-300 ${selectedStudent ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                            <div className="flex items-center gap-3 mb-4">
                                <span className="w-8 h-8 rounded-full bg-scis-navy text-scis-gold font-display font-black flex items-center justify-center">2</span>
                                <h3 className="font-bold text-lg text-scis-navy">Reason</h3>
                            </div>
                            
                            <div className="space-y-2">
                                {REASONS.map((r, idx) => (
                                    <label key={idx} className="block relative cursor-pointer">
                                        <input 
                                            type="radio" 
                                            name="reason" 
                                            value={r} 
                                            checked={reason === r}
                                            onChange={() => setReason(r)}
                                            className="sr-only" 
                                        />
                                        <div className="p-4 border-2 border-slate-100 rounded-xl flex items-start gap-3 transition-colors">
                                            <div className="w-5 h-5 rounded-full border-2 border-slate-300 mt-0.5 radio-indicator flex-shrink-0"></div>
                                            <span className="text-sm font-medium text-slate-700 leading-tight">{r}</span>
                                        </div>
                                    </label>
                                ))}
                                
                                {reason === 'Other - Otro' && (
                                    <textarea 
                                        placeholder="Please specify..."
                                        value={customReason}
                                        onChange={e => setCustomReason(e.target.value)}
                                        className="w-full p-4 mt-2 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-scis-navy font-medium text-sm min-h-[100px] animate-slide-up"
                                    ></textarea>
                                )}
                            </div>
                        </div>

                        {/* 3. SUBJECT SELECTION */}
                        <div className={`bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60 transition-opacity duration-300 ${reason ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                            <div className="flex items-center gap-3 mb-4">
                                <span className="w-8 h-8 rounded-full bg-scis-navy text-scis-gold font-display font-black flex items-center justify-center">3</span>
                                <h3 className="font-bold text-lg text-scis-navy">Subject / Class</h3>
                            </div>
                            
                            <div className="relative">
                                <select 
                                    value={subject} 
                                    onChange={e => setSubject(e.target.value)}
                                    className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-scis-navy font-medium appearance-none text-slate-700"
                                >
                                    <option value="">-- Select Subject --</option>
                                    {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* Fixed Bottom Action Bar */}
                    <div className={`fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-slate-200 transition-transform duration-300 z-50 ${isFormComplete && !showPreview ? 'translate-y-0' : 'translate-y-full'}`}>
                        <button 
                            onClick={() => setShowPreview(true)}
                            className="w-full max-w-xl mx-auto block btn-press bg-scis-navy text-scis-gold py-4 rounded-2xl font-display font-black text-lg tracking-widest uppercase shadow-xl"
                        >
                            Review AR
                        </button>
                    </div>

                    {/* Preview Modal */}
                    {showPreview && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-scis-navy/40 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl animate-slide-up">
                                <div className="bg-amber-100 text-amber-900 p-6 text-center border-b border-amber-200">
                                    <span className="text-4xl block mb-2">⚠️</span>
                                    <h3 className="font-display font-black text-2xl uppercase">Confirm AR</h3>
                                    <p className="text-xs font-bold uppercase tracking-widest opacity-80 mt-1">Please review details</p>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Student</p>
                                        <p className="font-black text-scis-navy leading-tight">{selectedStudent?.displayName}</p>
                                        <div className="flex gap-2 mt-1">
                                            <span className="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-bold">{selectedStudent?.grade}</span>
                                            <HouseBadge houseId={selectedStudent?.house} />
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Reason</p>
                                        <p className="font-medium text-sm text-slate-700">{reason === 'Other - Otro' ? `Other: ${customReason}` : reason}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Subject</p>
                                        <p className="font-bold text-scis-navy">{subject}</p>
                                    </div>
                                </div>
                                <div className="p-4 grid grid-cols-2 gap-3 bg-slate-50 border-t border-slate-100">
                                    <button 
                                        onClick={() => setShowPreview(false)}
                                        disabled={isSubmitting}
                                        className="py-3 rounded-xl font-bold text-sm text-slate-600 bg-white border border-slate-200 hover:bg-slate-100"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={handleSubmit}
                                        disabled={isSubmitting}
                                        className="py-3 rounded-xl font-bold text-sm text-white bg-blue-600 hover:bg-blue-700 shadow-md flex items-center justify-center"
                                    >
                                        {isSubmitting ? 'Submitting...' : 'Submit AR'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CoordinatorDashboard({ students }) {
            const [view, setView] = useState('ars'); // 'ars' | 'students'
            const [ars, setArs] = useState([]);
            const [loading, setLoading] = useState(true);
            
            // Advanced Filtering and Sorting States
            const [filter, setFilter] = useState('');
            const [gradeFilter, setGradeFilter] = useState('');
            const [sortField, setSortField] = useState('date'); // 'date' | 'name' | 'grade' | 'subject'
            const [sortDirection, setSortDirection] = useState('desc'); // 'asc' | 'desc'

            useEffect(() => {
                const { db, collection, query, onSnapshot, appId } = window.FirebaseDB;
                
                // Firestore Rule 2 Constraint: No complex orderBy/where. Fetch all and filter client side.
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'active_reflections'));
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setArs(list);
                    setLoading(false);
                }, (error) => {
                    console.error("Dashboard Error:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            // Dynamically generate available grades from AR records for the filter dropdown
            const availableGrades = useMemo(() => {
                const grades = new Set(ars.map(ar => ar.grade).filter(Boolean));
                return [...grades].sort();
            }, [ars]);

            const processedArs = useMemo(() => {
                let result = [...ars];
                
                // 1. Apply Grade Filter
                if (gradeFilter) {
                    result = result.filter(ar => ar.grade === gradeFilter);
                }

                // 2. Apply Text Search
                if (filter) {
                    const f = filter.toLowerCase();
                    result = result.filter(ar => 
                        ar.studentName?.toLowerCase().includes(f) || 
                        ar.grade?.toLowerCase().includes(f) ||
                        ar.teacherEmail?.toLowerCase().includes(f) ||
                        ar.subject?.toLowerCase().includes(f)
                    );
                }

                // 3. Apply Sorting
                result.sort((a, b) => {
                    let comparison = 0;
                    if (sortField === 'date') {
                        const dateA = a.timestamp?.seconds || 0;
                        const dateB = b.timestamp?.seconds || 0;
                        comparison = dateA - dateB;
                    } else if (sortField === 'name') {
                        comparison = (a.studentName || '').localeCompare(b.studentName || '');
                    } else if (sortField === 'grade') {
                        comparison = (a.grade || '').localeCompare(b.grade || '');
                    } else if (sortField === 'subject') {
                        comparison = (a.subject || '').localeCompare(b.subject || '');
                    }
                    
                    return sortDirection === 'asc' ? comparison : -comparison;
                });

                return result;
            }, [ars, filter, gradeFilter, sortField, sortDirection]);

            const formatDate = (ts) => {
                if (!ts) return '';
                const d = new Date(ts.seconds * 1000);
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            };

            return (
                <div className="max-w-6xl mx-auto p-4 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between md:items-end gap-4 mb-8">
                        <div>
                            <h2 className="text-3xl font-display font-black text-scis-navy uppercase tracking-tight flex items-center gap-2">
                                <span className="text-3xl">📋</span> {view === 'ars' ? 'Dashboard' : 'Student Database'}
                            </h2>
                            <p className="text-slate-500 text-sm font-medium mt-1">High School Coordinator Panel</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('ars')} className={`px-4 py-2 rounded-xl text-sm font-bold transition-colors ${view === 'ars' ? 'bg-scis-navy text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>Dashboard</button>
                            <button onClick={() => setView('students')} className={`px-4 py-2 rounded-xl text-sm font-bold transition-colors ${view === 'students' ? 'bg-scis-navy text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>Manage Students</button>
                        </div>
                    </div>

                    {view === 'students' ? (
                        <StudentManager students={students} />
                    ) : (
                        <>
                            {/* Advanced Filter and Sort Toolbar */}
                            <div className="flex flex-col md:flex-row gap-3 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="flex-1 relative">
                                    <input 
                                        type="text" 
                                        placeholder="Search student, teacher, subject..." 
                                        value={filter}
                                        onChange={e => setFilter(e.target.value)}
                                        className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy focus:ring-1 focus:ring-scis-navy text-sm shadow-sm"
                                    />
                                    <svg className="w-5 h-5 text-slate-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </div>
                                
                                <select 
                                    value={gradeFilter} 
                                    onChange={e => setGradeFilter(e.target.value)}
                                    className="py-2.5 px-4 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy focus:ring-1 focus:ring-scis-navy text-sm shadow-sm"
                                >
                                    <option value="">All Grades</option>
                                    {availableGrades.map(g => <option key={g} value={g}>{g}</option>)}
                                </select>

                                <div className="flex gap-2">
                                    <select 
                                        value={sortField} 
                                        onChange={e => setSortField(e.target.value)}
                                        className="py-2.5 px-4 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy focus:ring-1 focus:ring-scis-navy text-sm shadow-sm"
                                    >
                                        <option value="date">Sort by Date</option>
                                        <option value="name">Sort by Name</option>
                                        <option value="grade">Sort by Grade</option>
                                        <option value="subject">Sort by Subject</option>
                                    </select>
                                    <button 
                                        onClick={() => setSortDirection(prev => prev === 'asc' ? 'desc' : 'asc')}
                                        className="p-2.5 bg-white border border-slate-300 rounded-xl hover:bg-slate-100 text-slate-600 shadow-sm transition-colors font-bold w-10 flex justify-center items-center"
                                        title={sortDirection === 'asc' ? 'Ascending Order' : 'Descending Order'}
                                    >
                                        {sortDirection === 'asc' ? '↑' : '↓'}
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                {loading ? (
                                    <div className="p-10 text-center text-slate-500 font-medium">Loading records...</div>
                                ) : processedArs.length === 0 ? (
                                    <div className="p-16 text-center">
                                        <span className="text-5xl block mb-4 opacity-50">✨</span>
                                        <h3 className="font-display font-bold text-xl text-scis-navy">No Active Reflections</h3>
                                        <p className="text-slate-400 text-sm mt-1">No ARs match your current filters.</p>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse min-w-[800px]">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Date</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Student</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Subject</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Reason</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Teacher</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {processedArs.map(ar => (
                                                    <tr key={ar.id} className="border-b border-slate-100 hover:bg-slate-50/50 transition-colors">
                                                        <td className="p-4 whitespace-nowrap text-slate-500 font-medium">{formatDate(ar.timestamp)}</td>
                                                        <td className="p-4">
                                                            <div className="font-bold text-scis-navy">{ar.studentName}</div>
                                                            <div className="flex gap-2 mt-1 items-center">
                                                                <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-1.5 rounded">{ar.grade}</span>
                                                                <HouseBadge houseId={ar.house} />
                                                            </div>
                                                        </td>
                                                        <td className="p-4 font-medium text-slate-700">{ar.subject}</td>
                                                        <td className="p-4">
                                                            <div className="max-w-[250px] truncate text-slate-700" title={ar.reason === 'Other - Otro' ? ar.customReason : ar.reason}>
                                                                {ar.reason === 'Other - Otro' ? (
                                                                    <span className="italic">Other: {ar.customReason}</span>
                                                                ) : (
                                                                    ar.reason.split(' - ')[0] // Show English part mostly for brevity in table
                                                                )}
                                                            </div>
                                                        </td>
                                                        <td className="p-4 text-slate-500 text-xs">{ar.teacherEmail}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function App() {
            // Early return if Firebase failed to initialize (e.g., missing API key on Github Pages)
            if (!window.FirebaseDB) {
                return (
                    <div className="flex h-screen flex-col items-center justify-center bg-slate-50 p-6 text-center">
                        <div className="text-red-500 text-6xl mb-4">⚠️</div>
                        <h2 className="text-2xl font-black text-scis-navy font-display uppercase tracking-tight mb-2">Firebase Setup Required</h2>
                        <p className="text-slate-600 max-w-md text-sm">
                            It looks like you deployed to GitHub Pages! Please open the <code>index.html</code> file in your code editor, locate the <code>githubPagesConfig</code> placeholder (around line 70), and replace it with your real Firebase Project configuration.
                        </p>
                    </div>
                );
            }

            const [user, setUser] = useState(null);
            const [role, setRole] = useState('teacher'); // 'teacher' | 'coordinator'
            const [authLoaded, setAuthLoaded] = useState(false);
            const [students, setStudents] = useState([]);

            useEffect(() => {
                const { auth, db, collection, query, onSnapshot, appId, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseDB;
                
                // Follow Rule 3: Auth before Queries
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth init failed:", e);
                    }
                };

                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoaded(true);
                });

                // Fetch real-time students from Firestore
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                const unsubscribeStudents = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => {
                        let docData = doc.data();
                        
                        // Automatically format legacy grades (e.g., 1s1 -> 1sA, 2s2 -> 2sB) for UI display
                        let formattedGrade = docData.grade || '';
                        formattedGrade = formattedGrade.replace(/s1/g, 'sA').replace(/s2/g, 'sB');

                        list.push({ 
                            id: doc.id, 
                            ...docData, 
                            grade: formattedGrade,
                            displayName: (docData.name || '').toUpperCase() 
                        });
                    });
                    list.sort((a,b) => a.name.localeCompare(b.name));
                    setStudents(list);
                });

                return () => {
                    unsubscribeAuth();
                    unsubscribeStudents();
                };
            }, []);

            if (!authLoaded) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50">
                        <div className="animate-pulse text-scis-navy font-display font-black tracking-widest uppercase">Connecting...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Top Navigation */}
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 py-3 sticky top-0 z-40 shadow-md">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <div className="bg-scis-gold text-scis-navy w-8 h-8 flex items-center justify-center rounded-lg shadow-inner font-display font-black text-xl">
                                    🦅
                                </div>
                                <h1 className="text-lg font-display font-black text-white tracking-tight uppercase leading-none hidden sm:block">SCIS Portal</h1>
                                <h1 className="text-lg font-display font-black text-white tracking-tight uppercase leading-none sm:hidden">AR</h1>
                            </div>
                            
                            {/* Role Switcher (For prototype/demo purposes) */}
                            <div className="flex bg-white/10 p-1 rounded-xl">
                                <button 
                                    onClick={() => setRole('teacher')}
                                    className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${role === 'teacher' ? 'bg-scis-gold text-scis-navy' : 'text-white hover:bg-white/20'}`}
                                >
                                    Teacher Mode
                                </button>
                                <button 
                                    onClick={() => setRole('coordinator')}
                                    className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${role === 'coordinator' ? 'bg-scis-gold text-scis-navy' : 'text-white hover:bg-white/20'}`}
                                >
                                    Dashboard
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="pt-6">
                        {role === 'teacher' && user && <ARForm user={user} students={students} />}
                        {role === 'coordinator' && user && <CoordinatorDashboard students={students} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
