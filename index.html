<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIS House Cup Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: {
                            navy: '#0C1D40',
                            gold: '#FFF86B',
                            grey: '#A8A6A5'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        
        /* Gamified UI Elements */
        .btn-game {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-game:active:not(:disabled) {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }
        .btn-game:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }

        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .bar-transition { transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body>
    <div id="root">
        <div class="flex h-screen items-center justify-center bg-slate-50">
            <div class="text-center bg-white p-10 rounded-3xl border-2 border-slate-100 border-b-8 border-b-scis-navy shadow-xl">
                <div id="loader-icon" class="mb-6 inline-block h-12 w-12 border-8 border-scis-gold border-t-scis-navy rounded-full loading-spin"></div>
                <p id="loader-text" class="font-display font-black text-xl uppercase tracking-widest text-scis-navy">Initializing Portal...</p>
            </div>
        </div>
    </div>

    <script type="module">
        console.log("Starting Firebase script...");
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, increment, query, where, getDocs, writeBatch, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.FirebaseDB = { db, auth, collection, doc, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, increment, query, where, getDocs, writeBatch, Timestamp, signInWithEmailAndPassword, signOut, onAuthStateChanged };
            console.log("Firebase successfully initialized");
        } catch (error) {
            console.error("Firebase Init Error:", error);
            const loaderText = document.getElementById('loader-text');
            if (loaderText) loaderText.innerText = "Connection Error: Check Firebase Config.";
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const HOUSES = [
            { id: 'centaurs', name: 'Centaurs', color: '#3b82f6', icon: '🏹' }, 
            { id: 'pegasus', name: 'Pegasus', color: '#22c55e', icon: '🪽' },   
            { id: 'titans', name: 'Titans', color: '#eab308', icon: '⚡' },    
            { id: 'unicorns', name: 'Unicorns', color: '#ef4444', icon: '🦄' }  
        ];

        const APP_ID = 'scis-house-points';
        const ADMIN_EMAIL = 'dolguin@scis-bo.com';

        const formatDateTime = (timestamp) => {
            if (!timestamp) return '';
            const d = new Date(timestamp.seconds * 1000);
            return d.toLocaleDateString() + ' at ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        };

        function CustomBarChart({ data, heightClass = "h-72 sm:h-96" }) {
            const maxPoints = Math.max(...data.map(d => d.points), 10); 
            
            return (
                <div className={`w-full ${heightClass} flex items-end justify-around pt-10 pb-4 border-b-4 border-slate-200 relative`}>
                    <div className="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-20 z-0">
                        <div className="w-full border-b-2 border-dashed border-slate-400"></div>
                        <div className="w-full border-b-2 border-dashed border-slate-400"></div>
                        <div className="w-full border-b-2 border-dashed border-slate-400"></div>
                        <div className="w-full border-b-2 border-dashed border-slate-400"></div>
                    </div>

                    {data.map((house) => {
                        const heightPercent = (house.points / maxPoints) * 100;
                        return (
                            <div key={house.name} className="flex flex-col items-center justify-end h-full flex-1 group z-10">
                                <div className="w-full h-full flex flex-col justify-end items-center relative">
                                    <div className="absolute -top-12 opacity-0 group-hover:opacity-100 group-hover:-translate-y-2 transition-all duration-300 bg-scis-navy text-white font-display font-bold text-lg py-1 px-4 rounded-xl shadow-lg whitespace-nowrap z-20">
                                        {house.points}
                                        <div className="absolute -bottom-1 left-1/2 transform -translate-x-1/2 w-3 h-3 bg-scis-navy rotate-45"></div>
                                    </div>
                                    <div 
                                        className="w-12 sm:w-20 rounded-t-xl shadow-[inset_0_-8px_0_0_rgba(0,0,0,0.15),0_8px_16px_rgba(0,0,0,0.1)] bar-transition relative overflow-hidden group-hover:brightness-110"
                                        style={{ height: `${Math.max(heightPercent, 5)}%`, backgroundColor: house.color }}
                                    >
                                        <div className="absolute top-0 left-0 w-1/3 h-full bg-white opacity-20"></div>
                                    </div>
                                </div>
                                <div className="mt-4 flex flex-col items-center">
                                    <span className="text-2xl mb-1 drop-shadow-sm">{house.icon}</span>
                                    <span className="text-[10px] sm:text-xs font-black text-slate-500 uppercase tracking-widest">{house.name}</span>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        function SimpleStanding({ ranks }) {
            const places = [
                { key: 'first', label: '1ST Place', bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-600' },
                { key: 'second', label: '2ND Place', bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-600' },
                { key: 'third', label: '3RD Place', bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-600' },
                { key: 'fourth', label: '4TH Place', bg: 'bg-slate-50', border: 'border-slate-200', text: 'text-slate-600' }
            ];

            return (
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mt-4">
                    {places.map((p) => {
                        const houseIds = ranks[p.key] || [];
                        return (
                            <div key={p.key} className={`p-4 rounded-2xl border-2 ${p.border} ${p.bg} flex flex-col items-center justify-center text-center min-h-[110px]`}>
                                <span className={`text-[11px] font-black uppercase tracking-widest mb-3 ${p.text}`}>{p.label}</span>
                                {houseIds.length > 0 ? (
                                    <div className="flex flex-wrap justify-center gap-3">
                                        {houseIds.map(id => {
                                            const h = HOUSES.find(x => x.id === id);
                                            return (
                                                <div key={id} className="flex flex-col items-center">
                                                    <span className="text-3xl md:text-4xl drop-shadow-sm mb-1">{h.icon}</span>
                                                    <span className="text-[10px] font-black uppercase tracking-wider" style={{ color: h.color }}>{h.name}</span>
                                                </div>
                                            );
                                        })}
                                    </div>
                                ) : (
                                    <span className="text-2xl font-bold opacity-20">-</span>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('public');
            const [houseTotals, setHouseTotals] = useState({});
            const [loading, setLoading] = useState(true);
            const [errorMsg, setErrorMsg] = useState(null);

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.FirebaseDB) {
                        clearInterval(checkFirebase);
                        startApp();
                    }
                }, 100);

                function startApp() {
                    const { auth, db, onAuthStateChanged, collection, query, onSnapshot } = window.FirebaseDB;

                    onAuthStateChanged(auth, (u) => {
                        setUser(u);
                        setLoading(false);
                    }, () => setLoading(false));

                    const totalsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'houseTotals');
                    onSnapshot(query(totalsRef), (snapshot) => {
                        const totals = {};
                        snapshot.forEach(doc => { totals[doc.id] = doc.data().points || 0; });
                        setHouseTotals(totals);
                    }, (err) => {
                        console.error("Firestore error:", err);
                        setErrorMsg("Firestore Permission Error. Check your Security Rules.");
                    });
                }
            }, []);

            const handleLogout = () => {
                window.FirebaseDB.signOut(window.FirebaseDB.auth);
                setView('public');
            };

            if (loading) return null;

            return (
                <div className="min-h-screen pb-12">
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 md:px-8 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-50 shadow-lg gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-scis-gold text-scis-navy w-12 h-12 flex items-center justify-center rounded-2xl shadow-inner font-display font-black text-2xl">
                                🦅
                            </div>
                            <div>
                                <h1 className="text-2xl font-display font-black text-white tracking-tight uppercase leading-none">SCIS House Cup</h1>
                                <p className="text-scis-gold text-xs font-bold tracking-widest uppercase opacity-90 mt-1">Official Leaderboard</p>
                            </div>
                        </div>
                        <div className="flex flex-wrap justify-center gap-2 md:gap-3">
                            <button onClick={() => setView('public')} className={`btn-game px-4 py-2 rounded-xl text-sm font-bold transition border-2 border-b-4 ${view === 'public' ? 'bg-scis-gold text-scis-navy border-yellow-600' : 'bg-white/10 text-white border-transparent hover:bg-white/20'}`}>🏆 Board</button>
                            
                            {!user ? (
                                <button onClick={() => setView('login')} className="btn-game bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold border-2 border-b-4 border-blue-800 hover:bg-blue-500">Teacher Login</button>
                            ) : (
                                <>
                                    <button onClick={() => setView('teacher')} className={`btn-game px-4 py-2 rounded-xl text-sm font-bold transition border-2 border-b-4 ${view === 'teacher' ? 'bg-scis-gold text-scis-navy border-yellow-600' : 'bg-white/10 text-white border-transparent hover:bg-white/20'}`}>⭐ Award Points</button>
                                    
                                    {user.email === ADMIN_EMAIL && (
                                        <button onClick={() => setView('admin')} className={`btn-game px-4 py-2 rounded-xl text-sm font-bold transition border-2 border-b-4 ${view === 'admin' ? 'bg-scis-gold text-scis-navy border-yellow-600' : 'bg-white/10 text-white border-transparent hover:bg-white/20'}`}>👑 Admin</button>
                                    )}
                                    
                                    <button onClick={handleLogout} className="btn-game bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-bold border-2 border-b-4 border-red-700 hover:bg-red-400">Logout</button>
                                </>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto p-4 md:p-8 mt-4">
                        {errorMsg && <div className="mb-6 p-4 bg-amber-50 border-2 border-amber-200 text-amber-800 rounded-2xl text-sm font-bold shadow-sm">⚠️ {errorMsg}</div>}
                        
                        {view === 'public' && <Dashboard houseTotals={houseTotals} />}
                        {view === 'login' && <Login setView={setView} />}
                        {view === 'teacher' && user && <Teacher user={user} />}
                        {view === 'admin' && user?.email === ADMIN_EMAIL && <Admin />}
                    </main>
                </div>
            );
        }

        function Dashboard({ houseTotals }) {
            const data = HOUSES.map(h => ({ name: h.name, points: houseTotals[h.id] || 0, color: h.color, icon: h.icon })).sort((a,b) => b.points - a.points);
            
            return (
                <div className="space-y-10 animate-in fade-in duration-500">
                    {/* Top Callout */}
                    {data[0]?.points > 0 && (
                        <div className="bg-scis-navy text-white rounded-3xl p-6 md:p-8 shadow-xl border-2 border-scis-navy border-b-8 border-b-scis-gold flex flex-col md:flex-row items-center justify-between gap-6 transform hover:scale-[1.01] transition-transform">
                            <div className="flex items-center gap-6">
                                <div className="text-6xl md:text-7xl animate-bounce-slow drop-shadow-xl">{data[0].icon}</div>
                                <div>
                                    <h2 className="text-scis-gold font-display font-black text-2xl md:text-3xl uppercase tracking-wider mb-1">House Cup Leaders</h2>
                                    <p className="text-slate-300 font-medium text-sm md:text-base">The <strong className="text-white">{data[0].name}</strong> are currently dominating!</p>
                                </div>
                            </div>
                            <div className="bg-white/10 backdrop-blur-md px-10 py-4 rounded-2xl border border-white/20 text-center w-full md:w-auto shadow-inner">
                                <span className="block text-5xl font-display font-black drop-shadow-md" style={{ color: data[0].color }}>{data[0].points}</span>
                                <span className="text-[10px] font-bold uppercase tracking-widest text-slate-300 mt-2 block">Total Points</span>
                            </div>
                        </div>
                    )}

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
                        {data.map((h, index) => {
                            const isFirst = index === 0 && h.points > 0;
                            return (
                                <div key={h.name} className="bg-white p-6 rounded-3xl border-2 border-b-8 shadow-sm text-center transform transition hover:-translate-y-2 hover:shadow-lg relative" style={{ borderColor: h.color }}>
                                    {isFirst && <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-yellow-900 text-[10px] font-black px-4 py-1 rounded-full shadow-md uppercase tracking-widest border-2 border-yellow-200 z-10">🥇 1st Place</div>}
                                    <div className="text-4xl mb-3 drop-shadow-md">{h.icon}</div>
                                    <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">{h.name}</p>
                                    <p className="text-5xl font-display font-black drop-shadow-sm" style={{ color: h.color }}>{h.points}</p>
                                </div>
                            );
                        })}
                    </div>
                    
                    <div className="bg-white p-6 md:p-10 rounded-3xl border-2 border-slate-100 border-b-8 border-b-slate-200 shadow-sm flex flex-col relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-slate-50 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2"></div>
                        <h2 className="text-2xl font-display font-black mb-8 text-scis-navy uppercase tracking-tight flex items-center gap-3">
                            <span className="text-3xl">📊</span> Live Standings
                        </h2>
                        <CustomBarChart data={data} />
                    </div>
                </div>
            );
        }

        function Login({ setView }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const [success, setSuccess] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');
                try {
                    const cred = await window.FirebaseDB.signInWithEmailAndPassword(window.FirebaseDB.auth, email, password);
                    setSuccess(true);
                    setTimeout(() => {
                        setView(cred.user.email === ADMIN_EMAIL ? 'admin' : 'teacher');
                    }, 1800);
                } catch (err) {
                    setError("Invalid email or password.");
                    setLoading(false);
                }
            };

            if (success) {
                return (
                    <div className="max-w-md mx-auto py-10 animate-in zoom-in duration-300">
                        <div className="bg-white p-10 rounded-[2rem] border-2 border-green-100 border-b-8 border-b-green-500 shadow-xl text-center">
                            <div className="text-6xl mb-6 animate-bounce">✅</div>
                            <h2 className="text-3xl font-display font-black mb-2 text-scis-navy uppercase tracking-tight">Access Granted</h2>
                            <p className="text-slate-500 font-bold uppercase tracking-widest text-sm">Loading your portal...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto py-10 animate-in fade-in slide-in-from-bottom-4">
                    <form onSubmit={handleLogin} className="bg-white p-10 rounded-[2rem] border-2 border-slate-100 border-b-8 border-b-scis-navy shadow-xl relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-2 bg-scis-gold"></div>
                        <div className="text-5xl mb-6 text-center drop-shadow-md">🗝️</div>
                        <h2 className="text-3xl font-display font-black mb-2 text-center text-scis-navy uppercase tracking-tight">Teacher Portal</h2>
                        <p className="text-slate-500 mb-8 text-center text-sm font-medium">Authenticate to submit match rankings.</p>
                        
                        {error && <div className="bg-red-50 border-2 border-red-200 text-red-600 p-4 rounded-2xl text-sm font-bold mb-6">{error}</div>}

                        <div className="space-y-5">
                            <div>
                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-2 block mb-2">Email Address</label>
                                <input type="email" required value={email} onChange={e => setEmail(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-200 outline-none focus:border-scis-navy focus:bg-white transition-colors font-medium text-scis-navy" />
                            </div>
                            <div>
                                <label className="text-xs font-black text-slate-400 uppercase tracking-widest ml-2 block mb-2">Password</label>
                                <input type="password" required value={password} onChange={e => setPassword(e.target.value)} className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-slate-200 outline-none focus:border-scis-navy focus:bg-white transition-colors font-medium text-scis-navy" />
                            </div>
                            <button type="submit" disabled={loading} className="w-full btn-game bg-scis-navy text-scis-gold py-4 rounded-2xl font-display font-black text-lg tracking-wider uppercase shadow-lg border-2 border-b-8 border-[#071126] hover:bg-[#122859] mt-6">
                                {loading ? 'Authenticating...' : 'Enter Portal'}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        function Teacher({ user }) {
            const [month, setMonth] = useState('');
            const [ranks, setRanks] = useState({ first: [], second: [], third: [], fourth: [] });
            const [loading, setLoading] = useState(false);
            const [success, setSuccess] = useState('');
            const [myPending, setMyPending] = useState([]);
            const [editingId, setEditingId] = useState(null);

            useEffect(() => {
                fetchMyPending();
            }, []);

            const fetchMyPending = async () => {
                const { db, collection, query, where, getDocs } = window.FirebaseDB;
                const q = query(
                    collection(db, 'artifacts', APP_ID, 'public', 'data', 'rankings'), 
                    where("teacherEmail", "==", user.email),
                    where("processed", "==", false)
                );
                const snapshot = await getDocs(q);
                const list = [];
                snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                list.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                setMyPending(list);
            };

            const toggleHouse = (place, houseId) => {
                setRanks(prev => {
                    const newRanks = { first: [...prev.first], second: [...prev.second], third: [...prev.third], fourth: [...prev.fourth] };
                    if (newRanks[place].includes(houseId)) {
                        newRanks[place] = newRanks[place].filter(id => id !== houseId);
                    } else {
                        Object.keys(newRanks).forEach(p => {
                            newRanks[p] = newRanks[p].filter(id => id !== houseId);
                        });
                        newRanks[place].push(houseId);
                    }
                    return newRanks;
                });
            };

            const totalPlaced = Object.values(ranks).flat().length;
            const isComplete = totalPlaced === HOUSES.length && month.trim() !== '';

            const submitRankings = async () => {
                if (!isComplete) return;
                setLoading(true);
                try {
                    const { db, collection, doc, addDoc, updateDoc, Timestamp } = window.FirebaseDB;
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'rankings', editingId), {
                            month, ranks, timestamp: Timestamp.now() 
                        });
                        setSuccess("Match results updated!");
                    } else {
                        await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'rankings'), {
                            teacherEmail: user.email, month, ranks, timestamp: Timestamp.now(), processed: false
                        });
                        setSuccess("Match results submitted! Points pending admin tally.");
                    }
                    setRanks({ first: [], second: [], third: [], fourth: [] });
                    setMonth('');
                    setEditingId(null);
                    fetchMyPending();
                    setTimeout(() => setSuccess(''), 4000);
                } catch (e) {
                    alert("Error saving rankings.");
                }
                setLoading(false);
            };

            const handleEdit = (submission) => {
                // Check for backward compatibility if old records used className
                setMonth(submission.month || submission.className || '');
                setRanks(submission.ranks);
                setEditingId(submission.id);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handleDelete = async (id) => {
                if(!confirm("Are you sure you want to delete these pending points?")) return;
                try {
                    const { db, doc, deleteDoc } = window.FirebaseDB;
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'rankings', id));
                    fetchMyPending();
                } catch(e) {
                    alert("Error deleting submission.");
                }
            };

            return (
                <div className="space-y-8 max-w-4xl mx-auto animate-in fade-in">
                    
                    {myPending.length > 0 && (
                        <div className="bg-white p-6 md:p-8 rounded-3xl border-2 border-slate-100 border-b-8 border-b-slate-200 shadow-sm">
                            <h3 className="text-xl font-display font-black text-scis-navy mb-2 uppercase flex items-center gap-2"><span className="text-2xl">⏳</span> Pending Points</h3>
                            <p className="text-slate-500 text-xs font-bold uppercase tracking-widest mb-6">Awaiting Mr. Olguin's approval</p>
                            
                            <div className="space-y-6 max-h-[800px] overflow-y-auto pr-2">
                                {myPending.map(sub => (
                                    <div key={sub.id} className="bg-slate-50 border-2 border-slate-200 p-5 rounded-3xl flex flex-col gap-4">
                                        <div className="flex flex-col md:flex-row justify-between md:items-center gap-4 border-b-2 border-slate-200 pb-4">
                                            <div className="flex-1">
                                                <div className="flex items-center gap-3">
                                                    <span className="font-display font-black text-2xl text-scis-navy uppercase">{sub.month || sub.className}</span>
                                                    <span className="text-[10px] font-bold text-slate-500 bg-white px-3 py-1.5 rounded-full border shadow-sm uppercase tracking-wider">{formatDateTime(sub.timestamp)}</span>
                                                </div>
                                            </div>
                                            <div className="flex gap-2 justify-end">
                                                <button onClick={() => handleEdit(sub)} className="btn-game px-4 py-2 bg-white border-2 border-b-4 border-slate-200 text-slate-600 text-xs font-black uppercase rounded-xl hover:border-blue-500 hover:text-blue-600">Edit</button>
                                                <button onClick={() => handleDelete(sub.id)} className="btn-game px-4 py-2 bg-white border-2 border-b-4 border-red-200 text-red-500 text-xs font-black uppercase rounded-xl hover:bg-red-50 hover:border-red-300">Delete</button>
                                            </div>
                                        </div>

                                        <SimpleStanding ranks={sub.ranks} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="bg-white p-6 md:p-10 rounded-3xl border-2 border-slate-100 border-b-8 border-b-scis-navy shadow-xl transition-all">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                            <div>
                                <h2 className="text-3xl font-display font-black text-scis-navy uppercase tracking-tight flex items-center gap-2">
                                    {editingId && <span className="text-3xl mr-2">✏️</span>} {editingId ? 'Edit Match Results' : 'Submit Match Results'}
                                </h2>
                                <p className="text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Assign houses to their final positions for the month.</p>
                            </div>
                            {editingId && (
                                <button onClick={() => { setEditingId(null); setMonth(''); setRanks({ first: [], second: [], third: [], fourth: [] }); }} className="text-xs font-black uppercase text-slate-400 hover:text-slate-700 bg-slate-100 px-3 py-1.5 rounded-lg">Cancel Edit</button>
                            )}
                        </div>
                        
                        {success && <div className="bg-green-50 border-2 border-green-200 text-green-700 p-4 rounded-2xl mb-6 font-bold flex items-center gap-2 animate-in slide-in-from-top-2"><span className="text-xl">✅</span> {success}</div>}

                        <div className="mb-8 bg-slate-50 p-6 rounded-2xl border-2 border-slate-200">
                            <label className="text-xs font-black text-scis-navy uppercase tracking-widest block mb-3">Month (e.g., March, April)</label>
                            <input 
                                type="text" 
                                required 
                                value={month} 
                                onChange={e => setMonth(e.target.value)} 
                                placeholder="Enter month..."
                                className="w-full p-4 bg-white rounded-xl border-2 border-slate-200 outline-none focus:border-scis-navy font-black text-scis-navy placeholder:font-medium shadow-inner" 
                            />
                        </div>

                        <div className="space-y-6 mb-10">
                            {['first', 'second', 'third', 'fourth'].map((place, index) => {
                                const placeStyles = [
                                    { color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200' },
                                    { color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200' },
                                    { color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200' },
                                    { color: 'text-slate-600', bg: 'bg-slate-50', border: 'border-slate-200' }
                                ];
                                const style = placeStyles[index];

                                return (
                                    <div key={place} className={`p-5 rounded-2xl border-2 ${style.border} ${style.bg}`}>
                                        <div className="flex items-center gap-3 mb-4">
                                            <span className={`w-8 h-8 rounded-full flex items-center justify-center bg-white border-2 ${style.border} font-display font-black ${style.color}`}>{index + 1}</span>
                                            <span className={`text-sm font-black uppercase tracking-widest ${style.color}`}>{['st','nd','rd','th'][index]} Place</span>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4">
                                            {HOUSES.map(h => {
                                                const isSelected = ranks[place].includes(h.id);
                                                return (
                                                    <button 
                                                        type="button"
                                                        key={h.id}
                                                        onClick={(e) => { e.preventDefault(); toggleHouse(place, h.id); }}
                                                        className={`p-3 rounded-2xl border-2 border-b-4 text-xs sm:text-sm font-black uppercase tracking-wide transition-all flex flex-col items-center justify-center gap-2 btn-game
                                                            ${isSelected ? 'border-b-2' : 'bg-white hover:bg-slate-50'}
                                                        `}
                                                        style={{ 
                                                            borderColor: isSelected ? h.color : '#e2e8f0',
                                                            color: isSelected ? h.color : '#64748b',
                                                            backgroundColor: isSelected ? h.color + '15' : 'white'
                                                        }}
                                                    >
                                                        {h.name}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        {!isComplete && <p className="text-red-500 text-xs font-black uppercase tracking-widest text-center mb-4 bg-red-50 py-3 rounded-xl border border-red-100">⚠️ Enter month and rank all 4 houses to submit.</p>}

                        <button 
                            onClick={submitRankings} 
                            disabled={loading || !isComplete} 
                            className={`w-full text-white py-5 rounded-2xl font-display font-black text-xl tracking-widest uppercase shadow-xl border-2 border-b-8 transition-colors btn-game ${editingId ? 'bg-amber-500 hover:bg-amber-600 border-amber-700' : 'bg-blue-600 hover:bg-blue-700 border-[#1e3a8a]'}`}
                        >
                            {loading ? "Processing..." : (editingId ? "Update Results" : "Submit Results")}
                        </button>
                    </div>

                </div>
            );
        }

        function Admin() {
            const [pendingRankings, setPendingRankings] = useState([]);
            const [processing, setProcessing] = useState(false);

            useEffect(() => {
                fetchPending();
            }, []);

            const fetchPending = async () => {
                const { db, collection, query, where, getDocs } = window.FirebaseDB;
                const q = query(collection(db, 'artifacts', APP_ID, 'public', 'data', 'rankings'), where("processed", "==", false));
                const snapshot = await getDocs(q);
                const list = [];
                snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                list.sort((a,b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                setPendingRankings(list);
            };

            const processMonthlyPoints = async () => {
                if (pendingRankings.length === 0) return;
                if (!confirm(`Are you sure you want to process ${pendingRankings.length} ranking submissions?`)) return;
                
                setProcessing(true);
                try {
                    const { db, doc, writeBatch, increment } = window.FirebaseDB;
                    const batch = writeBatch(db);

                    const pointsMap = { first: 10, second: 7, third: 4, fourth: 3 };
                    const totalTally = { centaurs: 0, pegasus: 0, titans: 0, unicorns: 0 };

                    pendingRankings.forEach(submission => {
                        (submission.ranks.first || []).forEach(hId => totalTally[hId] += pointsMap.first);
                        (submission.ranks.second || []).forEach(hId => totalTally[hId] += pointsMap.second);
                        (submission.ranks.third || []).forEach(hId => totalTally[hId] += pointsMap.third);
                        (submission.ranks.fourth || []).forEach(hId => totalTally[hId] += pointsMap.fourth);
                        
                        const rankRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'rankings', submission.id);
                        batch.update(rankRef, { processed: true });
                    });

                    HOUSES.forEach(h => {
                        if (totalTally[h.id] > 0) {
                            const houseRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'houseTotals', h.id);
                            batch.set(houseRef, { points: increment(totalTally[h.id]) }, { merge: true });
                        }
                    });

                    await batch.commit();
                    alert("🏆 Points successfully tallied and added to the Grand Board!");
                    fetchPending();
                } catch (e) {
                    console.error(e);
                    alert("Error processing points.");
                }
                setProcessing(false);
            };

            const resetAllPoints = async () => {
                if (!confirm("🔥 CRITICAL WARNING: This will set all house points back to 0. Are you absolutely sure?")) return;
                
                try {
                    const { db, doc, writeBatch } = window.FirebaseDB;
                    const batch = writeBatch(db);
                    HOUSES.forEach(h => {
                        const houseRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'houseTotals', h.id);
                        batch.set(houseRef, { points: 0 });
                    });
                    await batch.commit();
                    alert("All points have been reset to 0.");
                } catch(e) {
                    alert("Error resetting points.");
                }
            };
            
            const handleDeleteAdmin = async (id) => {
                if (!confirm("WARNING: Are you sure you want to delete this teacher's pending submission?")) return;
                try {
                    const { db, doc, deleteDoc } = window.FirebaseDB;
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'rankings', id));
                    fetchPending();
                } catch(e) {
                    alert("Error deleting submission.");
                }
            };

            const getHouseNamesWithIcons = (idsArray) => {
                if (!idsArray || idsArray.length === 0) return <span className="text-slate-300">None</span>;
                return (
                    <div className="flex gap-1.5 flex-wrap">
                        {idsArray.map(id => {
                            const h = HOUSES.find(x => x.id === id);
                            return <span key={id} className="px-2 py-0.5 rounded text-white font-black text-[10px] uppercase shadow-sm border border-black/10 flex items-center gap-1" style={{backgroundColor: h?.color}}>{h?.icon} {h?.name}</span>;
                        })}
                    </div>
                );
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 animate-in fade-in">
                    <div className="bg-white p-8 md:p-10 rounded-[2.5rem] border-2 border-slate-100 border-b-8 border-b-scis-navy shadow-xl">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
                            <div className="flex items-center gap-4">
                                <div className="text-5xl">👑</div>
                                <div>
                                    <h2 className="text-3xl font-display font-black text-scis-navy uppercase tracking-tight">The Headmaster's Ledger</h2>
                                    <p className="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Review & Tally Monthly Points</p>
                                </div>
                            </div>
                            <button onClick={resetAllPoints} className="btn-game border-2 border-b-4 border-red-200 text-red-600 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider hover:bg-red-50 hover:border-red-300">
                                Reset All Points
                            </button>
                        </div>

                        <div className="bg-slate-50 p-6 md:p-8 rounded-3xl border-2 border-slate-200">
                            <div className="flex justify-between items-center mb-6">
                                <h3 className="font-display font-black text-xl text-scis-navy uppercase tracking-wide">Pending Points</h3>
                                <span className="bg-scis-gold text-scis-navy py-1.5 px-4 rounded-full text-xs font-black uppercase tracking-widest shadow-sm border border-yellow-400">{pendingRankings.length} Awaiting</span>
                            </div>

                            {pendingRankings.length === 0 ? (
                                <div className="text-center py-10 bg-white rounded-2xl border-2 border-dashed border-slate-300">
                                    <p className="text-4xl mb-2 opacity-50">🕸️</p>
                                    <p className="text-slate-400 text-sm font-bold uppercase tracking-widest">The ledger is empty.</p>
                                </div>
                            ) : (
                                <div className="space-y-4 mb-8 max-h-[500px] overflow-y-auto pr-2">
                                    {pendingRankings.map(r => (
                                        <div key={r.id} className="bg-white p-5 rounded-2xl border-2 border-slate-100 shadow-sm flex flex-col gap-3">
                                            <div className="flex flex-col sm:flex-row justify-between sm:items-center border-b-2 border-slate-50 pb-3 gap-2">
                                                <div className="flex items-center gap-3">
                                                    <span className="font-black text-scis-navy text-sm uppercase">{r.teacherEmail.split('@')[0]}</span>
                                                    <span className="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider border border-blue-100">{r.month || r.className}</span>
                                                </div>
                                                <div className="flex items-center gap-3 justify-between sm:justify-end">
                                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{formatDateTime(r.timestamp)}</span>
                                                    <button onClick={() => handleDeleteAdmin(r.id)} className="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider transition border border-red-100">Void</button>
                                                </div>
                                            </div>
                                            
                                            <div className="flex flex-col gap-2 pt-1">
                                                <div className="flex items-center gap-2"><strong className="text-xs uppercase tracking-widest text-yellow-600 w-8">1st:</strong> {getHouseNamesWithIcons(r.ranks.first)}</div>
                                                <div className="flex items-center gap-2"><strong className="text-xs uppercase tracking-widest text-slate-500 w-8">2nd:</strong> {getHouseNamesWithIcons(r.ranks.second)}</div>
                                                <div className="flex items-center gap-2"><strong className="text-xs uppercase tracking-widest text-amber-700 w-8">3rd:</strong> {getHouseNamesWithIcons(r.ranks.third)}</div>
                                                <div className="flex items-center gap-2"><strong className="text-xs uppercase tracking-widest text-slate-400 w-8">4th:</strong> {getHouseNamesWithIcons(r.ranks.fourth)}</div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            <button 
                                onClick={processMonthlyPoints} 
                                disabled={processing || pendingRankings.length === 0}
                                className="w-full btn-game bg-scis-navy text-scis-gold py-5 rounded-2xl font-display font-black text-xl tracking-widest uppercase border-2 border-b-8 border-[#071126] hover:bg-[#122859] transition shadow-xl flex justify-center items-center gap-3"
                            >
                                {processing ? "Tallying..." : "End of Month Tally 🏆"}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
