<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. Olguin's Hatchet Survival</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Carter+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #14532d; /* Deep forest green */
            background-image: radial-gradient(#166534 2px, transparent 2px);
            background-size: 30px 30px;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .font-carter { font-family: 'Carter One', cursive; }
        
        .panel {
            background-color: #fef3c7; /* Warm parchment */
            border: 6px solid #78350f; /* Dark wood brown */
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .item-card {
            background-color: #fffbeb;
            border: 4px solid #b45309;
            border-radius: 0.75rem;
            padding: 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }
        
        .item-card:hover {
            transform: scale(1.02);
            border-color: #78350f;
        }

        .btn-3d {
            transition: all 0.1s;
            position: relative;
        }
        
        .btn-3d:active {
            transform: translateY(4px);
            border-bottom-width: 0px !important;
            margin-top: 4px;
        }

        /* Custom Scrollbar for inner scrolling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #fef3c7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #78350f; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #451a03; }

        .camp-box {
            background-color: rgba(255, 255, 255, 0.6);
            border: 3px dashed #78350f;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
        }
        
        .camp-title {
            font-weight: 900;
            color: #451a03;
            margin-bottom: 0.25rem;
            border-bottom: 2px solid #b45309;
            padding-bottom: 0.25rem;
        }
        
        .flash-red {
            animation: flash 0.5s infinite;
        }
        
        @keyframes flash {
            0% { background-color: #fef3c7; }
            50% { background-color: #fca5a5; }
            100% { background-color: #fef3c7; }
        }
    </style>
</head>
<body class="p-3 md:p-5 text-gray-800 flex flex-col">

    <!-- Header Area -->
    <header class="text-center mb-4 shrink-0">
        <h1 class="text-4xl md:text-5xl font-carter text-[#fef3c7] drop-shadow-lg flex items-center justify-center gap-3">
            🪓 6P's Hatchet Survival
        </h1>
        <p class="text-[#fef3c7] font-bold mt-1 text-lg drop-shadow-md tracking-wide">Wilderness Negotiation Challenge</p>
    </header>

    <!-- Main Game Area -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 md:gap-6 flex-grow min-h-0">

        <!-- Column 1: Camps -->
        <div class="panel flex flex-col p-4 lg:col-span-1 min-h-0">
            <h2 class="text-2xl font-carter text-[#78350f] mb-3 flex items-center gap-2 shrink-0">
                🔥 1. Build Shelters
            </h2>
            
            <div class="shrink-0 mb-3">
                <label class="block text-sm font-bold text-gray-700 mb-1">Survivor Roster (Paste names here)</label>
                <textarea id="roster" class="w-full h-24 p-2 border-3 border-[#b45309] rounded-lg bg-white focus:outline-none focus:border-[#78350f] resize-none" placeholder="Alice
Bob
Charlie..."></textarea>
            </div>
            
            <div class="flex items-end gap-2 shrink-0 mb-3">
                <div class="w-1/3">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Camps</label>
                    <input type="number" id="num-groups" value="5" min="2" max="10" class="w-full p-2 border-3 border-[#b45309] rounded-lg text-center font-bold text-lg">
                </div>
                <button onclick="generateGroups()" class="btn-3d w-2/3 bg-[#059669] text-white py-2 rounded-lg font-bold border-b-4 border-[#047857] flex items-center justify-center gap-2">
                    🎲 Randomize
                </button>
            </div>
            
            <div id="groups-output" class="flex-grow overflow-y-auto mt-2 pr-2">
                <div class="text-center text-gray-500 italic mt-8 font-bold">Paste names and hit Randomize to set up camps!</div>
            </div>
        </div>

        <!-- Column 2: Cargo Hold -->
        <div class="panel flex flex-col p-4 lg:col-span-2 min-h-0">
            <div class="shrink-0 text-center mb-3">
                <h2 class="text-3xl font-carter text-[#78350f] mb-3">🎒 2. The Scavenged Loot</h2>
                
                <div class="flex flex-wrap justify-center gap-2 mb-3">
                    <button id="btn-cessna" onclick="loadItems('cessna')" class="btn-3d bg-[#059669] text-white px-4 py-2 rounded-lg font-bold border-b-4 border-[#047857]">🛩️ Cessna Debris</button>
                    <button id="btn-wild" onclick="loadItems('wild')" class="btn-3d bg-[#d1d5db] text-gray-600 px-4 py-2 rounded-lg font-bold border-b-4 border-gray-400">🌲 Wilderness Finds</button>
                </div>
                
                <p class="text-red-700 font-bold text-sm bg-red-100 py-1 px-3 rounded-full inline-block border border-red-300">
                    Your camp can only keep <span class="underline decoration-wavy text-lg">THREE</span> items. Choose wisely.
                </p>
            </div>
            
            <div id="items-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 overflow-y-auto flex-grow p-1">
                <!-- Cards injected here via JS -->
            </div>
        </div>

        <!-- Column 3: Timers -->
        <div class="flex flex-col gap-4 lg:col-span-1 min-h-0">
            
            <!-- Timer 1: Prep -->
            <div class="panel flex-1 flex flex-col items-center justify-center p-4">
                <h2 class="text-2xl font-carter text-[#047857] mb-1 flex items-center gap-2">🧭 Pitch Prep Time</h2>
                <p class="text-sm font-bold text-gray-600 mb-2">Discuss your 3 items.</p>
                <div id="prep-display" class="text-6xl font-carter text-[#064e3b] mb-4 tracking-wider">15:00</div>
                <div class="flex gap-2 w-full px-4">
                    <button onclick="togglePrepTimer()" id="prep-btn" class="btn-3d flex-1 bg-[#059669] text-white py-2 rounded-lg font-bold border-b-4 border-[#047857]">Start</button>
                    <button onclick="resetPrepTimer()" class="btn-3d w-1/3 bg-[#e2e8f0] text-gray-700 py-2 rounded-lg font-bold border-b-4 border-gray-400">Reset</button>
                </div>
            </div>
            
            <!-- Timer 2: Pitch -->
            <div id="pitch-panel" class="panel flex-1 flex flex-col items-center justify-center p-4 transition-colors duration-300">
                <h2 class="text-2xl font-carter text-[#b91c1c] mb-1 flex items-center gap-2">🔥 Survival Pitch</h2>
                <p class="text-sm font-bold text-gray-600 mb-2">Convince the rest.</p>
                <div id="pitch-display" class="text-6xl font-carter text-[#7f1d1d] mb-4 tracking-wider">02:00</div>
                <div class="flex gap-2 w-full px-4">
                    <button onclick="togglePitchTimer()" id="pitch-btn" class="btn-3d flex-1 bg-[#ef4444] text-white py-2 rounded-lg font-bold border-b-4 border-[#b91c1c]">Start</button>
                    <button onclick="resetPitchTimer()" class="btn-3d w-1/3 bg-[#e2e8f0] text-gray-700 py-2 rounded-lg font-bold border-b-4 border-gray-400">Reset</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- DATA ---
        const cessnaDebris = [
            { icon: "🎧", name: "Pilot's Headset", desc: "Completely intact, but only plays loud clown music on loop." },
            { icon: "💺", name: "Concrete Cushion", desc: "A seat cushion made entirely of solid, heavy concrete." },
            { icon: "🕹️", name: "Single Steering Pedal", desc: "Detached from the plane. Heavy and essentially useless." },
            { icon: "📖", name: "Emergency Manual", desc: "A comprehensive survival guide, written entirely in ancient Latin." },
            { icon: "🪂", name: "Hamster Parachute", desc: "A fully functional emergency parachute sized perfectly for a rodent." },
            { icon: "✈️", name: "Miniature Plane", desc: "A 1:64 scale Hot Wheels toy replica of the rescue plane." },
            { icon: "⏱️", name: "Broken Altimeter", desc: "Doesn't tell altitude, but works perfectly as a 3-minute egg timer." },
            { icon: "🥤", name: "Unopenable Soda", desc: "A pristine, perfectly chilled can of soda that is physically impossible to open." },
            { icon: "🛶", name: "Deflated Life Raft", desc: "Has a very slow, un-patchable leak. Takes exactly 10 minutes to sink." },
            { icon: "🧥", name: "Windbreaker", desc: "A jacket that is literally made out of a constant gust of wind." },
            { icon: "🕶️", name: "Aviator Glasses", desc: "Very cool looking, but the lenses are painted completely solid black." },
            { icon: "⚙️", name: "Cessna Propeller", desc: "A single heavy blade that only spins if you blow on it really hard." }
        ];

        const wildernessFinds = [
            { icon: "🪓", name: "Rubber Hatchet", desc: "Looks sharp, but aggressively bounces back off of any wood." },
            { icon: "🍒", name: "Bowl of Gut Cherries", desc: "Looks delicious, but guaranteed to cause immediate and profound regret." },
            { icon: "🐕", name: "A Lost Dachshund", desc: "Named Roomba. Refuses to walk in the forest and demands to be carried everywhere." },
            { icon: "🦔", name: "Cuddly Porcupine", desc: "An extremely affectionate porcupine that desperately wants a hug." },
            { icon: "🦌", name: "Golden Retriever Moose", desc: "A massive wild moose that acts exactly like an enthusiastic puppy." },
            { icon: "🪵", name: "Fireproof Wood", desc: "A pile of perfectly dry wood that is legally immune to catching fire." },
            { icon: "🦟", name: "One Loud Mosquito", desc: "A single, incredibly loud mosquito that follows you everywhere." },
            { icon: "🐦", name: "Genius Foolbird", desc: "Actually brilliant and knows how to survive, but arrogantly refuses to help you." },
            { icon: "🦨", name: "Maple Syrup Skunk", desc: "A skunk that gets scared easily but sprays delicious maple syrup instead of stink." },
            { icon: "🐢", name: "Snapping Turtle", desc: "Painfully slow, but holds a massive grudge from a previous life." },
            { icon: "🏕️", name: "Poison Ivy Sleeping Bag", desc: "Looks very warm and cozy. Is definitely a terrible idea." },
            { icon: "🐟", name: "Land Fish", desc: "Can swim perfectly on dry land, but absolutely refuses to be eaten." }
        ];

        // --- AUDIO GENERATORS ---
        let audioCtx;
        function getAudioContext() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function playPop() {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.2, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 0.1);
            } catch (e) { console.error("Audio error:", e); }
        }

        function playBuzzer() {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const gainNode = ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, ctx.currentTime);
                osc.frequency.setValueAtTime(100, ctx.currentTime + 0.8);
                gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);
                osc.connect(gainNode);
                gainNode.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + 1.5);
            } catch (e) { console.error("Audio error:", e); }
        }

        // --- CARGO HOLD LOGIC ---
        function loadItems(listName, playSound = true) {
            if (playSound) playPop();
            const grid = document.getElementById('items-grid');
            const items = listName === 'cessna' ? cessnaDebris : wildernessFinds;
            
            const btnCessna = document.getElementById('btn-cessna');
            const btnWild = document.getElementById('btn-wild');
            
            if (listName === 'cessna') {
                btnCessna.className = "btn-3d bg-[#059669] text-white px-4 py-2 rounded-lg font-bold border-b-4 border-[#047857]";
                btnWild.className = "btn-3d bg-[#d1d5db] text-gray-600 px-4 py-2 rounded-lg font-bold border-b-4 border-gray-400";
            } else {
                btnWild.className = "btn-3d bg-[#b45309] text-white px-4 py-2 rounded-lg font-bold border-b-4 border-[#78350f]";
                btnCessna.className = "btn-3d bg-[#d1d5db] text-gray-600 px-4 py-2 rounded-lg font-bold border-b-4 border-gray-400";
            }

            grid.innerHTML = items.map(item => `
                <div class="item-card flex items-start gap-3">
                    <div class="text-4xl shrink-0 mt-1">${item.icon}</div>
                    <div>
                        <h3 class="font-carter text-lg text-[#78350f] leading-tight">${item.name}</h3>
                        <p class="text-sm text-gray-700 mt-1 leading-snug">${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        // --- GROUP GENERATOR LOGIC ---
        async function generateGroups() {
            const rosterText = document.getElementById('roster').value;
            const names = rosterText.split('\n').map(n => n.trim()).filter(n => n !== '');
            const numGroups = parseInt(document.getElementById('num-groups').value) || 5;
            const output = document.getElementById('groups-output');
            
            if (names.length === 0) {
                output.innerHTML = '<div class="text-red-500 font-bold text-center mt-4">Please add some names first!</div>';
                return;
            }

            for (let i = names.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [names[i], names[j]] = [names[j], names[i]];
            }

            const groups = Array.from({ length: numGroups }, () => []);
            names.forEach((name, index) => {
                groups[index % numGroups].push(name);
            });

            output.innerHTML = '';
            
            for (let i = 0; i < groups.length; i++) {
                if(groups[i].length > 0){
                    playPop();
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'camp-box shadow-sm';
                    groupDiv.innerHTML = `
                        <div class="camp-title">⛺ Shelter ${i + 1}</div>
                        <div class="text-sm text-gray-800 font-semibold leading-relaxed">${groups[i].join(', ')}</div>
                    `;
                    output.appendChild(groupDiv);
                    await new Promise(r => setTimeout(r, 150));
                }
            }
        }

        // --- TIMERS LOGIC ---
        let prepInterval, pitchInterval;
        let prepTime = 15 * 60;
        let pitchTime = 2 * 60;
        let isPrepRunning = false;
        let isPitchRunning = false;

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function updatePrepDisplay() { document.getElementById('prep-display').innerText = formatTime(prepTime); }
        function togglePrepTimer() {
            const btn = document.getElementById('prep-btn');
            if (isPrepRunning) {
                clearInterval(prepInterval);
                btn.innerText = 'Resume';
                btn.className = "btn-3d flex-1 bg-[#10b981] text-white py-2 rounded-lg font-bold border-b-4 border-[#047857]";
            } else {
                playPop();
                btn.innerText = 'Pause';
                btn.className = "btn-3d flex-1 bg-[#f59e0b] text-white py-2 rounded-lg font-bold border-b-4 border-[#b45309]";
                prepInterval = setInterval(() => {
                    if (prepTime > 0) {
                        prepTime--;
                        updatePrepDisplay();
                    } else {
                        clearInterval(prepInterval);
                        playBuzzer();
                    }
                }, 1000);
            }
            isPrepRunning = !isPrepRunning;
        }
        function resetPrepTimer() {
            clearInterval(prepInterval);
            isPrepRunning = false;
            prepTime = 15 * 60;
            updatePrepDisplay();
            const btn = document.getElementById('prep-btn');
            btn.innerText = 'Start';
            btn.className = "btn-3d flex-1 bg-[#059669] text-white py-2 rounded-lg font-bold border-b-4 border-[#047857]";
        }

        function updatePitchDisplay() { document.getElementById('pitch-display').innerText = formatTime(pitchTime); }
        function togglePitchTimer() {
            const btn = document.getElementById('pitch-btn');
            const panel = document.getElementById('pitch-panel');
            panel.classList.remove('flash-red');

            if (isPitchRunning) {
                clearInterval(pitchInterval);
                btn.innerText = 'Resume';
                btn.className = "btn-3d flex-1 bg-[#10b981] text-white py-2 rounded-lg font-bold border-b-4 border-[#047857]";
            } else {
                playPop();
                btn.innerText = 'Pause';
                btn.className = "btn-3d flex-1 bg-[#f59e0b] text-white py-2 rounded-lg font-bold border-b-4 border-[#b45309]";
                pitchInterval = setInterval(() => {
                    if (pitchTime > 0) {
                        pitchTime--;
                        updatePitchDisplay();
                    } else {
                        clearInterval(pitchInterval);
                        isPitchRunning = false;
                        playBuzzer();
                        panel.classList.add('flash-red');
                        btn.innerText = 'Start';
                        btn.className = "btn-3d flex-1 bg-[#ef4444] text-white py-2 rounded-lg font-bold border-b-4 border-[#b91c1c]";
                    }
                }, 1000);
            }
            isPitchRunning = !isPitchRunning;
        }
        function resetPitchTimer() {
            clearInterval(pitchInterval);
            isPitchRunning = false;
            pitchTime = 2 * 60;
            updatePitchDisplay();
            const btn = document.getElementById('pitch-btn');
            btn.innerText = 'Start';
            btn.className = "btn-3d flex-1 bg-[#ef4444] text-white py-2 rounded-lg font-bold border-b-4 border-[#b91c1c]";
            document.getElementById('pitch-panel').classList.remove('flash-red');
        }

        // Init
        loadItems('cessna', false);
        updatePrepDisplay();
        updatePitchDisplay();
    </script>
</body>
</html>
