<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIS Attendance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: { navy: '#1e3a5f', gold: '#f59e0b' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: linear-gradient(135deg, #e0e7ff 0%, #d1e0fd 25%, #dbeafe 50%, #e0e7ff 75%, #f0f9ff 100%);
            background-size: 400% 400%;
            animation: gradientShift 20s ease infinite;
            overflow-x: hidden;
            color: #1e293b;
            min-height: 100vh;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 24px rgba(30, 58, 95, 0.08), 0 1px 3px rgba(30, 58, 95, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        
        .glass-strong {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(32px) saturate(160%);
            -webkit-backdrop-filter: blur(32px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 8px 40px rgba(30, 58, 95, 0.12), 0 2px 8px rgba(30, 58, 95, 0.06), inset 0 1px 0 rgba(255, 255, 255, 1);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px) saturate(130%);
            -webkit-backdrop-filter: blur(20px) saturate(130%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-bottom: 2px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 2px 16px rgba(30, 58, 95, 0.06), 0 1px 4px rgba(30, 58, 95, 0.04), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.75);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(30, 58, 95, 0.12), 0 4px 12px rgba(30, 58, 95, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        }
        
        .glass-card:active { transform: scale(0.97) translateY(0); }
        
        .card-present {
            background: linear-gradient(145deg, rgba(34, 197, 94, 0.25), rgba(34, 197, 94, 0.15));
            border-color: rgba(34, 197, 94, 0.5);
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .card-late {
            background: linear-gradient(145deg, rgba(245, 158, 11, 0.25), rgba(245, 158, 11, 0.15));
            border-color: rgba(245, 158, 11, 0.5);
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .card-absent {
            background: linear-gradient(145deg, rgba(239, 68, 68, 0.25), rgba(239, 68, 68, 0.15));
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }
        
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
        }
        
        .blob-1 { width: 600px; height: 600px; background: linear-gradient(135deg, #93c5fd, #c4b5fd); top: -20%; left: -10%; animation: float1 15s ease-in-out infinite; }
        .blob-2 { width: 500px; height: 500px; background: linear-gradient(135deg, #fca5a5, #fdba74); bottom: -10%; right: -5%; animation: float2 18s ease-in-out infinite; }
        .blob-3 { width: 400px; height: 400px; background: linear-gradient(135deg, #86efac, #67e8f9); top: 40%; left: 40%; animation: float3 12s ease-in-out infinite; }
        
        @keyframes float1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(30px, -30px) scale(1.1); } 66% { transform: translate(-20px, 20px) scale(0.95); } }
        @keyframes float2 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(-40px, -20px) scale(1.05); } 66% { transform: translate(20px, 40px) scale(0.9); } }
        @keyframes float3 { 0%, 100% { transform: translate(0, 0) scale(1); } 50% { transform: translate(50px, -40px) scale(1.15); } }
        
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: rgba(30, 58, 95, 0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(30, 58, 95, 0.2); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(30, 58, 95, 0.35); }
        
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        
        .btn-press { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active:not(:disabled) { transform: scale(0.95); }
        
        .glass-select {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(30, 58, 95, 0.15);
            color: #1e293b;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(30, 58, 95, 0.06);
        }
        
        .glass-select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15), 0 2px 8px rgba(30, 58, 95, 0.08);
        }
        
        .glass-select option { background: #f8fafc; color: #1e293b; font-size: 16px; padding: 8px; }
        
        @keyframes moodPop {
            0% { transform: scale(0) rotate(-120deg); opacity: 0; }
            60% { transform: scale(1.15) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        
        .mood-btn-anim { animation: moodPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .status-badge {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 999px;
            backdrop-filter: blur(8px);
        }
        
        .student-name {
            font-weight: 700;
            font-size: 15px;
            line-height: 1.3;
            text-align: center;
            color: #1e293b;
            text-shadow: 0 1px 2px rgba(255,255,255,0.8);
            word-break: break-word;
            hyphens: auto;
        }
        
        .bottom-bar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(32px) saturate(160%);
            -webkit-backdrop-filter: blur(32px) saturate(160%);
            border-top: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 -4px 30px rgba(30, 58, 95, 0.1);
        }
        
        .data-table {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(16px);
        }
        
        .data-table th {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #64748b;
            padding: 14px 16px;
        }
        
        .data-table td { padding: 12px 16px; color: #334155; font-weight: 500; }
        .data-table tr:hover { background: rgba(59, 130, 246, 0.05); }
        
        .modal-overlay { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); }
        
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithPopup, OAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, Timestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'scis-house-points';
            window.FirebaseDB = { auth, db, collection, addDoc, onSnapshot, query, where, Timestamp, doc, setDoc, getDoc, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithPopup, OAuthProvider, signOut, appId };
        } catch (error) {
            console.error("Firebase Initialization Error:", error);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const SCHEDULE = [
            { day: 1, start: '08:00', end: '09:30', class: '1sA' },
            { day: 1, start: '09:45', end: '11:15', class: '2sB' },
            { day: 2, start: '08:00', end: '09:30', class: '3sA' },
        ];

        const DEFAULT_MOOD_OPTIONS = ['😐', '🤔', '🥰', '😄', '🙄', '🕵️', '🤯'];

        const formatName = (fullName) => {
            if (!fullName) return '';
            const parts = fullName.trim().split(/\s+/);
            if (parts.length <= 1) return fullName.trim();
            const firstPart = parts[0];
            const isAllCaps = firstPart === firstPart.toUpperCase() && firstPart.length > 1;
            if (!isAllCaps) return fullName.trim();
            const lastName = parts[0];
            const firstNames = parts.slice(1).join(' ');
            const capitalize = (str) => str.charAt(0).toUpperCase() + str.slice(1).toLowerCase();
            return (capitalize(firstNames) + ' ' + capitalize(lastName)).trim();
        };

        function MoodConfigModal({ isOpen, onClose, currentMoods, onSave }) {
            const [moods, setMoods] = useState(currentMoods.join(' '));
            if (!isOpen) return null;
            const handleSave = () => {
                const newMoods = moods.split(/\s+/).filter(m => m.length > 0);
                if (newMoods.length === 0) { alert('Please enter at least one emoji'); return; }
                onSave(newMoods);
                onClose();
            };
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay" onClick={onClose}>
                    <div className="glass-strong rounded-3xl p-8 max-w-md w-full shadow-2xl" onClick={e => e.stopPropagation()}>
                        <h3 className="text-2xl font-bold text-slate-800 mb-2">Configure Mood Emojis</h3>
                        <p className="text-slate-500 text-sm mb-6">Enter emojis separated by spaces</p>
                        <textarea value={moods} onChange={e => setMoods(e.target.value)}
                            className="w-full p-4 rounded-2xl glass-select min-h-[100px] text-lg resize-none mb-4"
                            placeholder="😐 🤔 🥰 😄 🙄 🕵️ 🤯" />
                        <div className="flex gap-3">
                            <button onClick={handleSave} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-2xl btn-press shadow-lg">Save Changes</button>
                            <button onClick={onClose} className="flex-1 glass font-bold py-3 px-6 rounded-2xl btn-press text-slate-600 hover:bg-white/80">Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        function RadialMoodPicker({ currentMood, isOpen, onToggle, onSelect, moodOptions }) {
            const radius = 100;
            return (
                <div className="relative flex justify-center items-center z-20">
                    <button className={`text-5xl cursor-pointer transition-all duration-200 hover:scale-110 drop-shadow-md ${isOpen ? 'scale-125' : ''}`}
                        onClick={(e) => { e.stopPropagation(); onToggle(); }} title="Click to change mood">
                        {currentMood || '😐'}
                    </button>
                    {isOpen && (
                        <div className="absolute top-1/2 left-1/2 w-0 h-0 z-50">
                            <div className="fixed inset-0 z-40 cursor-default" onClick={(e) => { e.stopPropagation(); onToggle(); }}></div>
                            {moodOptions.map((emoji, i) => {
                                const angle = (i * (360 / moodOptions.length) - 90) * (Math.PI / 180);
                                const x = Math.cos(angle) * radius;
                                const y = Math.sin(angle) * radius;
                                return (
                                    <div key={emoji} className="absolute z-50 pointer-events-none"
                                        style={{ transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))` }}>
                                        <button onClick={(e) => { e.stopPropagation(); onSelect(emoji); }}
                                            className="pointer-events-auto flex items-center justify-center w-14 h-14 glass-strong rounded-full text-3xl cursor-pointer hover:scale-125 transition-transform mood-btn-anim border-2 border-white/50 shadow-xl"
                                            style={{ animationDelay: `${i * 0.04}s` }}>
                                            {emoji}
                                        </button>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        function AttendanceTaker({ userEmail, students }) {
            const [selectedClass, setSelectedClass] = useState('');
            const [attendance, setAttendance] = useState({});
            const [moods, setMoods] = useState({});
            const [openMoodMenuId, setOpenMoodMenuId] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [moodOptions, setMoodOptions] = useState(DEFAULT_MOOD_OPTIONS);
            const [showMoodConfig, setShowMoodConfig] = useState(false);
            const [savedMoods, setSavedMoods] = useState({});
            
            const GRADES = useMemo(() => {
                const grades = new Set(students.map(s => s.grade).filter(Boolean));
                return [...grades].sort();
            }, [students]);

            useEffect(() => {
                if (!userEmail) return;
                const { db, doc, getDoc, appId } = window.FirebaseDB;
                const moodDocRef = doc(db, 'artifacts', appId, 'public', 'data', 'moodPreferences', userEmail);
                getDoc(moodDocRef).then(docSnap => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.moodOptions) setMoodOptions(data.moodOptions);
                        if (data.savedMoods) setSavedMoods(data.savedMoods);
                    }
                }).catch(() => {});
            }, [userEmail]);

            useEffect(() => {
                const now = new Date();
                const day = now.getDay();
                const timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
                const currentBlock = SCHEDULE.find(s => s.day === day && timeStr >= s.start && timeStr <= s.end);
                if (currentBlock && !selectedClass) setSelectedClass(currentBlock.class);
            }, []);

            const currentStudents = useMemo(() => {
                if (!selectedClass) return [];
                return students.filter(s => s.grade === selectedClass);
            }, [selectedClass, students]);

            useEffect(() => {
                if (!selectedClass) return;
                const persisted = {};
                currentStudents.forEach(s => { if (savedMoods[s.id]) persisted[s.id] = savedMoods[s.id]; });
                setMoods(persisted);
                setAttendance({});
                setOpenMoodMenuId(null);
            }, [selectedClass, currentStudents, savedMoods]);

            const markAllPresent = () => {
                const newAtt = {};
                currentStudents.forEach(s => newAtt[s.id] = 'P');
                setAttendance(newAtt);
            };

            const markRemainingAbsent = () => {
                const newAtt = { ...attendance };
                currentStudents.forEach(s => { if (!newAtt[s.id]) newAtt[s.id] = 'A'; });
                setAttendance(newAtt);
            };

            const cycleStudent = (id) => {
                setAttendance(prev => {
                    const current = prev[id];
                    if (current === 'P') return { ...prev, [id]: 'L' };
                    if (current === 'L') return { ...prev, [id]: 'A' };
                    if (current === 'A') { const next = {...prev}; delete next[id]; return next; }
                    return { ...prev, [id]: 'P' };
                });
            };

            const handleMoodSelect = async (studentId, emoji) => {
                setMoods(prev => ({...prev, [studentId]: emoji}));
                if (userEmail) {
                    try {
                        const { db, doc, setDoc, appId } = window.FirebaseDB;
                        const newSavedMoods = { ...savedMoods, [studentId]: emoji };
                        setSavedMoods(newSavedMoods);
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moodPreferences', userEmail), {
                            savedMoods: newSavedMoods,
                            moodOptions: moodOptions,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                    } catch (e) { console.error('Failed to save mood:', e); }
                }
            };

            const handleSaveMoodOptions = async (newOptions) => {
                setMoodOptions(newOptions);
                if (userEmail) {
                    try {
                        const { db, doc, setDoc, appId } = window.FirebaseDB;
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'moodPreferences', userEmail), {
                            moodOptions: newOptions,
                            savedMoods: savedMoods,
                            updatedAt: new Date().toISOString()
                        }, { merge: true });
                    } catch (e) { console.error('Failed to save mood options:', e); }
                }
            };

            const handleSubmit = async () => {
                if (Object.keys(attendance).length !== currentStudents.length) {
                    return alert("Please ensure every student is marked (Present, Late, or Absent) before submitting.");
                }
                setIsSubmitting(true);
                try {
                    const { db, collection, addDoc, Timestamp, appId } = window.FirebaseDB;
                    const recordsToSave = currentStudents.map(s => ({
                        studentId: s.id,
                        studentName: s.displayName,
                        status: attendance[s.id],
                        mood: moods[s.id] || '😐'
                    }));
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), {
                        class: selectedClass,
                        teacherEmail: userEmail || "teacher@scis-bo.com",
                        timestamp: Timestamp.now(),
                        records: recordsToSave,
                        presentCount: Object.values(attendance).filter(v => v === 'P').length,
                        lateCount: Object.values(attendance).filter(v => v === 'L').length,
                        absentCount: Object.values(attendance).filter(v => v === 'A').length
                    });
                    alert("Attendance saved successfully!");
                    setSelectedClass('');
                    setAttendance({});
                } catch (error) {
                    console.error("Error saving attendance:", error);
                    alert("Failed to submit attendance.");
                }
                setIsSubmitting(false);
            };

            const markedCount = Object.keys(attendance).length;
            const missingCount = currentStudents.length - markedCount;

            return (
                <div className="max-w-7xl mx-auto px-4 py-6 space-y-6 relative z-10">
                    <MoodConfigModal isOpen={showMoodConfig} onClose={() => setShowMoodConfig(false)} currentMoods={moodOptions} onSave={handleSaveMoodOptions} />
                    
                    <div className="glass-strong rounded-[2rem] p-6 md:p-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div>
                            <h2 className="text-3xl md:text-4xl font-bold text-slate-800 tracking-tight">Class Roster</h2>
                            <p className="text-slate-500 font-semibold text-sm mt-2">Select mood & mark attendance</p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-3 items-center w-full md:w-auto">
                            <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)}
                                className="w-full sm:w-auto p-4 glass-select rounded-2xl font-bold text-slate-700 text-lg appearance-none cursor-pointer min-w-[220px]">
                                <option value="">-- Select Class --</option>
                                {GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                            </select>
                            {selectedClass && currentStudents.length > 0 && (
                                <>
                                    <button onClick={markAllPresent}
                                        className="w-full sm:w-auto glass px-5 py-4 rounded-2xl font-bold text-sm uppercase tracking-wider shadow-lg hover:bg-white/90 btn-press text-slate-700 border border-white/60">
                                        Mark All Present
                                    </button>
                                    <button onClick={() => setShowMoodConfig(true)}
                                        className="w-full sm:w-auto glass px-4 py-4 rounded-2xl font-bold text-sm shadow-lg hover:bg-white/90 btn-press text-slate-600 border border-white/60"
                                        title="Change available emojis">
                                        ⚙️
                                    </button>
                                </>
                            )}
                        </div>
                    </div>

                    {selectedClass && currentStudents.length > 0 && (
                        <div className="animate-fade-in relative">
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 mb-8">
                                {currentStudents.map(student => {
                                    const status = attendance[student.id];
                                    const isMenuOpen = openMoodMenuId === student.id;
                                    let cardClass = "glass-card";
                                    let statusLabel = "Tap to Mark";
                                    let statusBg = "bg-slate-200/60 text-slate-500";
                                    if (status === 'P') { cardClass = "glass-card card-present"; statusLabel = "Present"; statusBg = "bg-green-500 text-white"; }
                                    else if (status === 'L') { cardClass = "glass-card card-late"; statusLabel = "Late"; statusBg = "bg-amber-500 text-white"; }
                                    else if (status === 'A') { cardClass = "glass-card card-absent"; statusLabel = "Absent"; statusBg = "bg-red-500 text-white"; }
                                    return (
                                        <div key={student.id} onClick={() => cycleStudent(student.id)}
                                            className={`relative flex flex-col items-center justify-between p-5 rounded-3xl min-h-[200px] cursor-pointer select-none ${cardClass} ${isMenuOpen ? 'z-50' : 'z-10'}`}>
                                            <div className="absolute top-0 left-0 right-0 h-1/3 bg-gradient-to-b from-white/50 to-transparent rounded-t-3xl pointer-events-none"></div>
                                            <div className="mt-2">
                                                <RadialMoodPicker currentMood={moods[student.id]} isOpen={isMenuOpen}
                                                    onToggle={() => setOpenMoodMenuId(isMenuOpen ? null : student.id)}
                                                    onSelect={(emoji) => handleMoodSelect(student.id, emoji)} moodOptions={moodOptions} />
                                            </div>
                                            <div className="flex-1 flex items-center justify-center w-full px-1 my-3">
                                                <span className="student-name">{student.displayName}</span>
                                            </div>
                                            <div className="mb-1">
                                                <span className={`status-badge ${statusBg} shadow-sm`}>{statusLabel}</span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="fixed bottom-0 left-0 right-0 p-4 md:p-5 bottom-bar z-[60] flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div className="font-bold text-base">
                                    {missingCount > 0 ? (
                                        <span className="text-amber-600 flex items-center gap-2">
                                            <span className="w-3 h-3 bg-amber-500 rounded-full animate-pulse"></span>
                                            {missingCount} student{missingCount > 1 ? 's' : ''} remaining
                                        </span>
                                    ) : (
                                        <span className="text-green-600 flex items-center gap-2">
                                            <span className="w-3 h-3 bg-green-500 rounded-full"></span>
                                            All students accounted for
                                        </span>
                                    )}
                                </div>
                                <div className="flex gap-3 w-full sm:w-auto">
                                    {missingCount > 0 && (
                                        <button onClick={markRemainingAbsent}
                                            className="flex-1 sm:flex-none glass px-5 py-3 rounded-xl font-bold text-sm shadow-lg hover:bg-white/90 btn-press text-slate-700 border border-red-200/50">
                                            Mark Unmarked Absent
                                        </button>
                                    )}
                                    <button onClick={handleSubmit}
                                        disabled={isSubmitting || missingCount > 0}
                                        className={`flex-1 sm:flex-none px-8 py-3 rounded-xl font-bold text-lg shadow-xl transition-all btn-press border-2 ${missingCount === 0 ? 'bg-blue-600 text-white hover:bg-blue-700 border-blue-600' : 'bg-slate-200 text-slate-400 border-slate-200 cursor-not-allowed'}`}>
                                        {isSubmitting ? 'Saving...' : 'Lock Attendance'}
                                    </button>
                                </div>
                            </div>
                            <div className="h-28"></div>
                        </div>
                    )}
                    
                    {selectedClass && currentStudents.length === 0 && (
                        <div className="text-center py-20 glass rounded-3xl border-2 border-dashed border-slate-300">
                            <p className="text-slate-500 font-bold text-xl">No students found for {selectedClass}</p>
                        </div>
                    )}
                </div>
            );
        }

        function AttendanceHistory({ userEmail }) {
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedClass, setSelectedClass] = useState('');

            useEffect(() => {
                const { db, collection, query, where, onSnapshot, appId } = window.FirebaseDB;
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), where("teacherEmail", "==", userEmail));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    list.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setLogs(list);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [userEmail]);

            const teacherClasses = useMemo(() => [...new Set(logs.map(l => l.class))].sort(), [logs]);
            const filteredLogs = useMemo(() => selectedClass ? logs.filter(l => l.class === selectedClass) : logs, [logs, selectedClass]);

            const moodStats = useMemo(() => {
                const counts = {};
                const allMoods = new Set();
                filteredLogs.forEach(log => log.records?.forEach(r => { if(r.mood) allMoods.add(r.mood); }));
                allMoods.forEach(m => counts[m] = 0);
                filteredLogs.forEach(log => log.records?.forEach(r => { if(r.mood && counts[r.mood] !== undefined) counts[r.mood]++; }));
                return counts;
            }, [filteredLogs]);

            const moodTimeline = useMemo(() => {
                const sortedLogs = [...filteredLogs].sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                return sortedLogs.map(log => {
                    const counts = {};
                    log.records?.forEach(r => { if(r.mood) counts[r.mood] = (counts[r.mood] || 0) + 1; });
                    let dominantMood = '😐', maxCount = 0;
                    for (const [m, c] of Object.entries(counts)) { if (c > maxCount) { maxCount = c; dominantMood = m; } }
                    const d = log.timestamp ? new Date(log.timestamp.seconds * 1000) : null;
                    return { id: log.id, date: d ? d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) : 'Unknown', mood: maxCount > 0 ? dominantMood : 'N/A' };
                }).filter(x => x.mood !== 'N/A');
            }, [filteredLogs]);

            const getChronologicalLogs = () => [...filteredLogs].sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
            
            const getStudentMatrix = () => {
                const sortedLogs = getChronologicalLogs();
                const studentMap = {};
                sortedLogs.forEach((log, logIndex) => {
                    log.records?.forEach(rec => {
                        const studentName = rec.studentName || 'Unknown';
                        if (!studentMap[studentName]) studentMap[studentName] = new Array(sortedLogs.length).fill('-');
                        studentMap[studentName][logIndex] = rec.status || '-';
                    });
                });
                return { sortedLogs, students: Object.keys(studentMap).sort((a, b) => a.localeCompare(b)), studentMap };
            };

            const handleExportCSV = () => {
                if (filteredLogs.length === 0) return alert("No logs to export.");
                const { sortedLogs, students, studentMap } = getStudentMatrix();
                const headers = ["Student Name", "Class"];
                sortedLogs.forEach(log => {
                    const d = log.timestamp ? new Date(log.timestamp.seconds * 1000) : null;
                    headers.push('"' + (d ? String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + d.getFullYear() + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') : '') + '"');
                });
                const rows = students.map(name => ['"' + name.replace(/"/g,'""') + '"', '"' + (selectedClass||'Mixed') + '"', ...studentMap[name]].join(','));
                const csv = [headers.join(','), ...rows].join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = 'SCIS_Attendance_' + (selectedClass||'All') + '_' + new Date().toISOString().split('T')[0] + '.csv';
                link.click();
            };

            const formatDate = (ts) => {
                if (!ts) return '';
                const d = new Date(ts.seconds * 1000);
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            };

            const maxMoodCount = Math.max(...Object.values(moodStats), 1);
            const allMoodKeys = Object.keys(moodStats);

            return (
                <div className="max-w-6xl mx-auto px-4 space-y-6 relative z-10 pb-32">
                    <div className="glass-strong rounded-[2rem] p-6 md:p-10 shadow-xl">
                        <div className="flex flex-col md:flex-row justify-between md:items-end gap-6 mb-8 border-b border-slate-200/50 pb-6">
                            <div>
                                <h2 className="text-3xl font-bold text-slate-800 tracking-tight">My Log & Insights</h2>
                                <p className="text-slate-500 font-semibold text-sm mt-2">{userEmail}</p>
                            </div>
                            <div className="flex flex-col sm:flex-row gap-3 items-center w-full md:w-auto">
                                <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)}
                                    className="w-full sm:w-auto p-3 glass-select rounded-xl font-bold text-slate-700 appearance-none cursor-pointer min-w-[180px]">
                                    <option value="">All My Classes</option>
                                    {teacherClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                <button onClick={handleExportCSV} disabled={filteredLogs.length === 0}
                                    className="w-full sm:w-auto glass px-5 py-3 rounded-xl font-bold text-sm shadow-lg transition-all btn-press flex items-center justify-center gap-2 text-slate-700 hover:bg-white/90 disabled:opacity-50">
                                    <span>📥</span> Export
                                </button>
                            </div>
                        </div>

                        {loading ? (
                            <div className="p-10 text-center">
                                <div className="w-16 h-16 mx-auto rounded-full glass shimmer"></div>
                                <p className="text-slate-500 font-bold mt-4 animate-pulse">Loading records...</p>
                            </div>
                        ) : logs.length === 0 ? (
                            <div className="text-center py-16 glass rounded-3xl border-2 border-dashed border-slate-300">
                                <p className="text-slate-500 font-bold text-xl">No attendance logs yet</p>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                {selectedClass && allMoodKeys.length > 0 && (
                                    <div className="glass rounded-2xl p-6 space-y-6">
                                        <div>
                                            <h3 className="font-bold text-lg text-slate-700 mb-4 uppercase tracking-wider">Mood Profile</h3>
                                            <div className="flex justify-between items-end gap-3 h-36">
                                                {allMoodKeys.map(mood => {
                                                    const count = moodStats[mood];
                                                    const pct = maxMoodCount > 0 ? (count / maxMoodCount) * 100 : 0;
                                                    const minHeight = Math.max(pct, 10);
                                                    const scale = 1 + (pct / 100) * 0.6;
                                                    return (
                                                        <div key={mood} className="flex flex-col items-center flex-1 transition-all hover:scale-105">
                                                            <div className="font-bold text-sm text-slate-600 mb-2">{count}</div>
                                                            <div className="w-full max-w-[50px] bg-slate-200/60 rounded-t-xl h-full flex items-end relative overflow-hidden">
                                                                <div className="w-full bg-gradient-to-t from-blue-400 to-indigo-400 rounded-t-xl transition-all duration-700" style={{ height: minHeight + '%' }}></div>
                                                            </div>
                                                            <div className="mt-3 text-3xl transition-transform" style={{ transform: 'scale(' + scale + ')' }}>{mood}</div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                        {moodTimeline.length > 0 && (
                                            <div className="pt-6 border-t border-slate-200/50">
                                                <h3 className="font-bold text-lg text-slate-700 mb-4 uppercase tracking-wider">Mood Timeline</h3>
                                                <div className="flex gap-3 overflow-x-auto pb-4 scrollbar-hide">
                                                    {moodTimeline.map(item => (
                                                        <div key={item.id} className="flex flex-col items-center min-w-[85px] glass rounded-2xl p-3 shrink-0 hover:bg-white/80 transition-colors">
                                                            <span className="text-xs font-bold text-slate-400 mb-2">{item.date}</span>
                                                            <span className="text-4xl">{item.mood}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}

                                {!selectedClass ? (
                                    <div className="overflow-x-auto glass rounded-2xl max-h-[600px]">
                                        <table className="w-full text-left border-collapse min-w-[700px] data-table">
                                            <thead><tr className="border-b border-slate-200/50">
                                                <th>Date / Time</th><th>Class</th><th className="text-center">Present</th><th className="text-center">Late</th><th className="text-center">Absent</th>
                                            </tr></thead>
                                            <tbody className="text-sm">
                                                {filteredLogs.map(log => (
                                                    <tr key={log.id} className="border-b border-slate-100">
                                                        <td className="whitespace-nowrap text-slate-500 font-semibold text-xs">{formatDate(log.timestamp)}</td>
                                                        <td className="font-bold text-lg text-slate-700">{log.class}</td>
                                                        <td className="text-center"><span className="bg-green-100 text-green-700 px-3 py-1.5 rounded-lg font-bold text-sm border border-green-200">{log.presentCount||0}</span></td>
                                                        <td className="text-center">{log.lateCount>0?<span className="bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg font-bold text-sm border border-amber-200">{log.lateCount}</span>:<span className="text-slate-300">-</span>}</td>
                                                        <td className="text-center">{log.absentCount>0?<span className="bg-red-100 text-red-700 px-3 py-1.5 rounded-lg font-bold text-sm border border-red-200">{log.absentCount}</span>:<span className="text-slate-300">-</span>}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto glass rounded-2xl max-h-[600px] relative">
                                        <table className="w-full text-left border-collapse min-w-max data-table">
                                            <thead className="sticky top-0 z-20">
                                                <tr className="border-b border-slate-200/50">
                                                    <th className="sticky left-0 z-30 border-r border-slate-200/50 min-w-[220px]">Student Name</th>
                                                    {getStudentMatrix().sortedLogs.map(log => (
                                                        <th key={log.id} className="text-center text-[10px] border-r border-slate-100/50">
                                                            <div className="flex flex-col items-center">
                                                                <span>{log.timestamp?new Date(log.timestamp.seconds*1000).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}):''}</span>
                                                                <span className="text-slate-400 font-medium">{log.timestamp?new Date(log.timestamp.seconds*1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):''}</span>
                                                            </div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm divide-y divide-slate-100/50">
                                                {getStudentMatrix().students.map(studentName => (
                                                    <tr key={studentName} className="hover:bg-blue-50/30 transition-colors">
                                                        <td className="sticky left-0 z-10 border-r border-slate-200/50 font-bold text-sm text-slate-700 bg-white/60 backdrop-blur-md truncate">{studentName}</td>
                                                        {getStudentMatrix().studentMap[studentName].map((status, i) => {
                                                            let cls = "text-slate-300 bg-slate-100/50 border-slate-200/50";
                                                            if (status==='P') cls = "bg-green-100 text-green-700 border-green-200";
                                                            if (status==='L') cls = "bg-amber-100 text-amber-700 border-amber-200";
                                                            if (status==='A') cls = "bg-red-100 text-red-700 border-red-200";
                                                            return (
                                                                <td key={i} className="p-2 text-center border-r border-slate-50">
                                                                    <div className={'w-9 h-9 mx-auto flex items-center justify-center rounded-lg font-bold text-sm border ' + cls}>{status}</div>
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            if (!window.FirebaseDB) return (
                <div className="flex h-screen items-center justify-center">
                    <div className="glass-strong p-8 rounded-3xl shadow-xl">
                        <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="font-bold text-lg text-slate-700">Initializing System...</p>
                    </div>
                </div>
            );

            const [user, setUser] = useState(null);
            const [currentTab, setCurrentTab] = useState('take');
            const [authLoaded, setAuthLoaded] = useState(false);
            const [students, setStudents] = useState([]);

            const userEmail = user?.email ? user.email.toLowerCase() : (user?.isAnonymous ? 'teacher@scis-bo.com' : null);

            useEffect(() => {
                const { auth, db, collection, query, onSnapshot, appId, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseDB;
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else if (!window.location.hostname.includes('github.io') && window.location.hostname !== 'localhost') {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth init failed:", e); }
                };

                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoaded(true);
                });

                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                const unsubscribeStudents = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => {
                        let docData = doc.data();
                        let formattedGrade = (docData.grade || '').replace(/s1/gi, 'sA').replace(/s2/gi, 'sB');
                        list.push({ id: doc.id, ...docData, grade: formattedGrade, displayName: formatName(docData.name || '') });
                    });
                    list.sort((a,b) => a.displayName.localeCompare(b.displayName));
                    setStudents(list);
                });

                return () => { unsubscribeAuth(); unsubscribeStudents(); };
            }, []);

            const handleLogin = async () => {
                const { auth, signInWithPopup, OAuthProvider } = window.FirebaseDB;
                const provider = new OAuthProvider('microsoft.com');
                provider.setCustomParameters({ tenant: 'scis-bo.com' });
                try { await signInWithPopup(auth, provider); } catch (error) { console.error("Login failed:", error); }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.FirebaseDB;
                await signOut(auth);
            };

            if (!authLoaded) return (
                <div className="flex h-screen items-center justify-center">
                    <div className="glass-strong p-8 rounded-3xl shadow-xl">
                        <div className="w-12 h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="font-bold text-lg text-slate-700">Connecting...</p>
                    </div>
                </div>
            );

            if (!user || (!user.email && !user.isAnonymous)) {
                return (
                    <div className="flex h-screen flex-col items-center justify-center p-6 text-center relative overflow-hidden">
                        <div className="blob blob-1"></div>
                        <div className="blob blob-2"></div>
                        <div className="blob blob-3"></div>
                        <div className="glass-strong p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full relative z-10">
                            <div className="w-24 h-24 mx-auto mb-6 rounded-[2rem] glass flex items-center justify-center text-5xl shadow-lg border border-white/50">📝</div>
                            <h2 className="text-3xl font-bold text-slate-800 tracking-tight mb-2">SCIS Kiosk</h2>
                            <p className="text-slate-500 font-semibold text-sm mb-10">Touch-screen Attendance Portal</p>
                            <button onClick={handleLogin} 
                                className="w-full glass px-6 py-4 rounded-2xl font-bold text-slate-700 hover:bg-white/90 transition-all shadow-xl btn-press flex items-center justify-center gap-3 border border-white/60">
                                <svg className="w-5 h-5" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
                                    <path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/>
                                    <path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/>
                                </svg>
                                Sign In to Activate
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative overflow-hidden">
                    <div className="blob blob-1"></div>
                    <div className="blob blob-2"></div>
                    <div className="blob blob-3"></div>
                    <nav className="glass-strong border-b border-white/60 px-4 md:px-8 py-4 sticky top-0 z-40 shadow-sm">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 glass flex items-center justify-center rounded-2xl text-2xl shadow-md border border-white/50">📝</div>
                                <div>
                                    <h1 className="text-xl font-bold text-slate-800 tracking-tight hidden sm:block">Attendance Kiosk</h1>
                                    <h1 className="text-xl font-bold text-slate-800 tracking-tight sm:hidden">Kiosk</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="flex glass p-1.5 rounded-2xl shadow-sm">
                                    <button onClick={() => setCurrentTab('take')} 
                                        className={'px-5 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all ' + (currentTab==='take'?'bg-blue-600 text-white shadow-md':'text-slate-600 hover:text-slate-800 hover:bg-white/50')}>
                                        Take
                                    </button>
                                    <button onClick={() => setCurrentTab('history')} 
                                        className={'px-5 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all ' + (currentTab==='history'?'bg-blue-600 text-white shadow-md':'text-slate-600 hover:text-slate-800 hover:bg-white/50')}>
                                        Log
                                    </button>
                                </div>
                                <button onClick={handleLogout} 
                                    className="glass p-3 rounded-2xl text-slate-500 hover:text-red-600 hover:bg-white/80 transition-all btn-press shadow-sm" title="Sign Out">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2.5}>
                                        <path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </nav>
                    <main className="pt-6 sm:pt-8 relative z-10">
                        {currentTab === 'take' ? <AttendanceTaker userEmail={userEmail} students={students} /> : <AttendanceHistory userEmail={userEmail} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
