<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIS AR/DR Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: {
                            navy: '#0C1D40',
                            gold: '#FFF86B',
                            grey: '#A8A6A5'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'fade-in': 'fadeIn 0.2s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        
        /* Mobile friendly active states */
        .btn-press { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active:not(:disabled) { transform: scale(0.97); }
        
        /* Hide scrollbar for cleaner mobile look */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Radio button custom styling */
        input[type="radio"]:checked + div {
            border-color: #0C1D40;
            background-color: #eff6ff;
        }
        input[type="radio"]:checked + div .radio-indicator {
            background-color: #0C1D40;
            border-color: #0C1D40;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithPopup, OAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, Timestamp, doc, updateDoc, deleteDoc, setDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Your specific Firebase project config 
        const githubPagesConfig = {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };

        // Setup Firebase
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : githubPagesConfig;
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            // ALIGNED WITH index.html
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'scis-house-points';

            window.FirebaseDB = { auth, db, collection, addDoc, onSnapshot, query, orderBy, Timestamp, doc, updateDoc, deleteDoc, setDoc, increment, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithPopup, OAuthProvider, signOut, appId };
        } catch (error) {
            console.error("Firebase Initialization Error:", error);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Constants
        const HOUSES = {
            'centaurs': { name: 'Centaurs', color: '#3b82f6', icon: '🏹', bg: 'bg-blue-100', text: 'text-blue-700' },
            'pegasus': { name: 'Pegasus', color: '#22c55e', icon: '🪽', bg: 'bg-green-100', text: 'text-green-700' },
            'titans': { name: 'Titans', color: '#eab308', icon: '⚡', bg: 'bg-yellow-100', text: 'text-yellow-700' },
            'unicorns': { name: 'Unicorns', color: '#ef4444', icon: '🦄', bg: 'bg-red-100', text: 'text-red-700' }
        };

        const REASONS = [
            "Late to class (unexcused) - Llegar tarde a clases.",
            "Disruptive behaviour - Comportamiento inadecuado.",
            "Constantly interrupting class - Interrumpir en clase constantemente.",
            "Not following instructions - No seguir instrucciones.",
            "Not wearing the proper uniform - No vestir el uniforme adecuado.",
            "Not presenting requested materials in class - No presentarse con los materiales de trabajo requeridos.",
            "Eating in class - Comer en horarios de clase.",
            "Public Display of affection(PDA) - Contacto físico en publico.",
            "Speaking spanish inside the class and in the hallways - Hablar en español en pasillos/dentro del aula.",
            "Sleeping in class - Dormir en clase.",
            "Other - Otro"
        ];

        const SUBJECTS = [
            "Coordination", "Spanish / Ms Carola", "Spanish / Ms Charito", "Science / Mr Tobias", 
            "Science / Ms Daniela", "Chemistry", "Social Studies", "History", 
            "Physics", "Physical Education", "Maths / Kingsley", "Maths / Silvia", 
            "Maths / Guillermo", "English / Elvia", "English / Sara", 
            "English / Letty", "ICT", "Biology", "Art", "Music", "Global Perspectives / Ms Wei", 
            "Global Perspectives / Ms Bell", "Business Studies", "Homeroom"
        ];

        function StudentManager({ students }) {
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ name: '', grade: '', house: 'centaurs' });
            const [filter, setFilter] = useState('');

            const filtered = students.filter(s => s.displayName.includes(filter.toUpperCase()) || s.grade.includes(filter));

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { db, collection, doc, addDoc, updateDoc, appId } = window.FirebaseDB;
                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', editingId), formData);
                        setEditingId(null);
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), formData);
                    }
                    setFormData({ name: '', grade: '', house: 'centaurs' });
                } catch (err) { alert("Error saving student"); }
            };

            const handleDelete = async (id) => {
                if(!confirm("Delete this student?")) return;
                const { db, doc, deleteDoc, appId } = window.FirebaseDB;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
            };

            const handleBulkImport = async () => {
                const jsonStr = prompt("Paste JSON array of students e.g. [{name: 'John Doe', grade: '2sA', house: 'centaurs'}]:");
                if (!jsonStr) return;
                try {
                    const arr = JSON.parse(jsonStr);
                    if (!confirm(`Import ${arr.length} students?`)) return;
                    const { db, collection, addDoc, appId } = window.FirebaseDB;
                    for (const s of arr) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), {
                            name: s.name, grade: s.grade, house: s.house
                        });
                    }
                    alert("Import complete!");
                } catch(e) { alert("Invalid JSON format."); }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="font-display font-black text-xl text-scis-navy">{editingId ? 'Edit Student' : 'Add New Student'}</h3>
                            <button onClick={handleBulkImport} className="text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-200">Bulk Import JSON</button>
                        </div>
                        <form onSubmit={handleSubmit} className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                            <input type="text" placeholder="Full Name" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} required className="sm:col-span-2 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-scis-navy outline-none font-medium text-sm" />
                            <input type="text" placeholder="Grade (e.g. 2sA)" value={formData.grade} onChange={e => setFormData({...formData, grade: e.target.value})} required className="p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-scis-navy outline-none font-medium text-sm" />
                            <select value={formData.house} onChange={e => setFormData({...formData, house: e.target.value})} className="p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-scis-navy outline-none font-medium text-sm">
                                {Object.entries(HOUSES).map(([id, h]) => <option key={id} value={id}>{h.name}</option>)}
                            </select>
                            <div className="sm:col-span-4 flex gap-2">
                                <button type="submit" className="bg-scis-navy text-scis-gold px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-[#122859] transition-colors">{editingId ? 'Update Student' : 'Add Student'}</button>
                                {editingId && <button type="button" onClick={() => {setEditingId(null); setFormData({name:'', grade:'', house:'centaurs'})}} className="bg-slate-100 text-slate-600 px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-slate-200">Cancel</button>}
                            </div>
                        </form>
                    </div>

                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                        <div className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-4">
                            <h3 className="font-display font-black text-xl text-scis-navy">Student Directory ({students.length})</h3>
                            <input type="text" placeholder="Search..." value={filter} onChange={e => setFilter(e.target.value)} className="p-2 bg-slate-50 border border-slate-200 rounded-lg focus:border-scis-navy outline-none text-sm" />
                        </div>
                        <div className="max-h-96 overflow-y-auto pr-2">
                            {filtered.map(s => (
                                <div key={s.id} className="flex justify-between items-center p-3 border-b border-slate-100 hover:bg-slate-50">
                                    <div>
                                        <div className="font-bold text-scis-navy text-sm">{s.name}</div>
                                        <div className="flex gap-2 mt-1">
                                            <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-1.5 rounded">{s.grade}</span>
                                            <span className="text-[10px] uppercase text-slate-400">{HOUSES[s.house]?.name}</span>
                                        </div>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => {setEditingId(s.id); setFormData({name: s.name, grade: s.grade, house: s.house})}} className="text-blue-500 text-xs font-bold hover:underline">Edit</button>
                                        <button onClick={() => handleDelete(s.id)} className="text-red-500 text-xs font-bold hover:underline">Delete</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function RoleManager({ roles }) {
            const [newEmail, setNewEmail] = useState('');

            const handleAddCoordinator = async (e) => {
                e.preventDefault();
                if (!newEmail || !newEmail.includes('@')) return alert("Enter a valid email");
                
                const { db, doc, updateDoc, appId } = window.FirebaseDB;
                const emailToAdd = newEmail.toLowerCase().trim();
                
                if (roles.coordinators.includes(emailToAdd) || roles.admins.includes(emailToAdd)) {
                    return alert("This user already has permissions.");
                }

                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roles'), {
                        coordinators: [...roles.coordinators, emailToAdd]
                    });
                    setNewEmail('');
                } catch (err) {
                    alert("Error adding coordinator. Ensure you have admin rights.");
                    console.error(err);
                }
            };

            const handleRemoveCoordinator = async (emailToRemove) => {
                if (!confirm(`Revoke coordinator access for ${emailToRemove}?`)) return;
                
                const { db, doc, updateDoc, appId } = window.FirebaseDB;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roles'), {
                        coordinators: roles.coordinators.filter(e => e !== emailToRemove)
                    });
                } catch (err) {
                    alert("Error removing coordinator.");
                    console.error(err);
                }
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                        <h3 className="font-display font-black text-xl text-scis-navy mb-4">Administrators</h3>
                        <p className="text-sm text-slate-500 mb-4">Admins have full access to manage students, ARs, DRs, and system roles.</p>
                        <ul className="space-y-2 mb-6">
                            {roles.admins.map(email => (
                                <li key={email} className="p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-scis-navy text-sm flex justify-between items-center">
                                    {email}
                                    <span className="bg-scis-navy text-scis-gold text-[10px] px-2 py-1 rounded uppercase tracking-widest">Admin</span>
                                </li>
                            ))}
                        </ul>

                        <h3 className="font-display font-black text-xl text-scis-navy mb-4 mt-8">Coordinators</h3>
                        <p className="text-sm text-slate-500 mb-4">Coordinators can view the dashboard, approve ARs/DRs, and manage points.</p>
                        
                        <form onSubmit={handleAddCoordinator} className="flex gap-2 mb-6">
                            <input 
                                type="email" 
                                placeholder="Add coordinator email (e.g., teacher@scis-bo.com)" 
                                value={newEmail} 
                                onChange={e => setNewEmail(e.target.value)} 
                                required 
                                className="flex-1 p-3 bg-slate-50 border border-slate-200 rounded-xl focus:border-scis-navy outline-none font-medium text-sm" 
                            />
                            <button type="submit" className="bg-blue-600 text-white px-6 py-2.5 rounded-xl font-bold text-sm hover:bg-blue-700 transition-colors">Add</button>
                        </form>

                        <ul className="space-y-2">
                            {roles.coordinators.length === 0 && <li className="text-sm text-slate-400 italic">No coordinators assigned.</li>}
                            {roles.coordinators.map(email => (
                                <li key={email} className="p-3 bg-slate-50 border border-slate-200 rounded-xl font-medium text-slate-700 text-sm flex justify-between items-center">
                                    {email}
                                    <button onClick={() => handleRemoveCoordinator(email)} className="text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1 rounded hover:bg-red-50 transition-colors">Remove</button>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        // --- COMPONENTS ---

        function HouseBadge({ houseId }) {
            const house = HOUSES[houseId];
            if (!house) return null;
            return (
                <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${house.bg} ${house.text} border border-${house.color}/20`}>
                    {house.icon} {house.name}
                </span>
            );
        }
        
        function SimpleWordCloud({ data, title, isAlert = false }) {
            const entries = Object.entries(data);
            if(entries.length === 0) return null;
            
            const max = Math.max(...entries.map(e => e[1]));
            const min = Math.min(...entries.map(e => e[1]));

            return (
                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col h-full">
                    <h3 className="font-display font-black text-lg text-scis-navy mb-4">{title}</h3>
                    <div className="flex flex-wrap gap-4 items-center justify-center py-4 flex-1">
                        {entries.sort((a,b) => b[1] - a[1]).map(([word, count]) => {
                            const size = min === max ? 1.5 : 1 + ((count - min) / (max - min)) * 2;
                            const isHigh = isAlert && count > 3;
                            return (
                                <span 
                                    key={word} 
                                    className={`font-bold transition-transform hover:scale-110 cursor-pointer ${isHigh ? 'text-red-500 drop-shadow-sm' : 'text-slate-600 hover:text-scis-navy'}`}
                                    style={{ fontSize: `${size}rem`, lineHeight: '1' }}
                                    title={`${count} incidents`}
                                >
                                    {word}
                                </span>
                            )
                        })}
                    </div>
                </div>
            );
        }

        function ARForm({ userEmail, students, isCoordinator }) {
            const GRADES = useMemo(() => [...new Set(students.map(s => s.grade))].sort(), [students]);

            const [recordType, setRecordType] = useState('AR'); // AR or DR
            const [searchMode, setSearchMode] = useState('search'); // 'search' | 'dropdown'
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedGrade, setSelectedGrade] = useState('');
            const [selectedStudent, setSelectedStudent] = useState(null);
            
            const [reason, setReason] = useState('');
            const [customReason, setCustomReason] = useState('');
            const [subject, setSubject] = useState('');
            
            const [showPreview, setShowPreview] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [successMsg, setSuccessMsg] = useState(false);

            // Filter students
            const filteredStudents = useMemo(() => {
                if (searchMode === 'search') {
                    if (searchTerm.length < 2) return [];
                    return students.filter(s => s.displayName.includes(searchTerm.toUpperCase()));
                } else {
                    if (!selectedGrade) return [];
                    return students.filter(s => s.grade === selectedGrade);
                }
            }, [searchTerm, searchMode, selectedGrade, students]);

            const isFormComplete = selectedStudent && reason && (reason !== 'Other - Otro' || customReason.trim() !== '') && subject;

            const handleSubmit = async () => {
                setIsSubmitting(true);
                try {
                    const { db, collection, addDoc, Timestamp, appId } = window.FirebaseDB;
                    const arData = {
                        studentId: selectedStudent.id,
                        studentName: selectedStudent.displayName,
                        grade: selectedStudent.grade,
                        house: selectedStudent.house,
                        type: recordType,
                        pointDeduction: recordType === 'DR' ? 30 : 3,
                        reason: reason,
                        customReason: reason === 'Other - Otro' ? customReason : null,
                        subject: subject,
                        teacherEmail: userEmail || "teacher@scis-bo.com",
                        timestamp: Timestamp.now(),
                        status: 'pending' // pending until accepted by coordinator
                    };

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'active_reflections'), arData);
                    
                    setSuccessMsg(true);
                    setTimeout(() => {
                        // Reset Form
                        setSuccessMsg(false);
                        setShowPreview(false);
                        setSelectedStudent(null);
                        setSearchTerm('');
                        setReason('');
                        setCustomReason('');
                        setSubject('');
                        setRecordType('AR');
                    }, 3000);

                } catch (error) {
                    console.error("Error saving record:", error);
                    alert("Failed to submit record. Please check connection.");
                }
                setIsSubmitting(false);
            };

            if (successMsg) {
                return (
                    <div className="flex flex-col items-center justify-center py-20 animate-fade-in text-center px-4">
                        <div className="w-24 h-24 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-5xl mb-6 shadow-sm border-4 border-white">
                            ✓
                        </div>
                        <h2 className="text-2xl font-display font-black text-scis-navy uppercase tracking-tight mb-2">{recordType} Assigned</h2>
                        <p className="text-slate-500 font-medium">{recordType === 'DR' ? 'Disciplinary Referral' : 'Active Reflection'} recorded successfully.</p>
                    </div>
                );
            }

            return (
                <div className="max-w-xl mx-auto pb-24 animate-fade-in">
                    
                    {/* Header */}
                    <div className="mb-6 px-4">
                        <h2 className="text-3xl font-display font-black text-scis-navy uppercase tracking-tight">Assign Incident</h2>
                        <p className="text-slate-500 text-sm font-medium mt-1">Issue an Active Reflection or Referral to a student.</p>
                    </div>

                    <div className="space-y-4 px-4">
                        
                        {/* 1. STUDENT SELECTION */}
                        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60">
                            <div className="flex items-center gap-3 mb-4">
                                <span className="w-8 h-8 rounded-full bg-scis-navy text-scis-gold font-display font-black flex items-center justify-center">1</span>
                                <h3 className="font-bold text-lg text-scis-navy">Select Student</h3>
                            </div>

                            {selectedStudent ? (
                                <div className="bg-slate-50 rounded-2xl p-4 border-2 border-slate-200 flex justify-between items-center animate-slide-up">
                                    <div>
                                        <p className="font-black text-scis-navy text-sm md:text-base leading-tight mb-1">{selectedStudent.displayName}</p>
                                        <div className="flex items-center gap-2">
                                            <span className="text-xs font-bold text-slate-500 bg-white px-2 py-0.5 rounded border border-slate-200">Grade: {selectedStudent.grade}</span>
                                            <HouseBadge houseId={selectedStudent.house} />
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedStudent(null)} className="p-2 text-slate-400 hover:text-red-500 transition-colors">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                                    </button>
                                </div>
                            ) : (
                                <div>
                                    <div className="flex bg-slate-100 p-1 rounded-xl mb-4">
                                        <button onClick={() => setSearchMode('search')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${searchMode === 'search' ? 'bg-white text-scis-navy shadow-sm' : 'text-slate-500'}`}>Search Name</button>
                                        <button onClick={() => setSearchMode('dropdown')} className={`flex-1 py-2 text-sm font-bold rounded-lg transition-all ${searchMode === 'dropdown' ? 'bg-white text-scis-navy shadow-sm' : 'text-slate-500'}`}>By Grade</button>
                                    </div>

                                    {searchMode === 'search' ? (
                                        <input 
                                            type="text" 
                                            placeholder="Type name (e.g. Perez)..."
                                            value={searchTerm}
                                            onChange={e => setSearchTerm(e.target.value)}
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-scis-navy/20 focus:border-scis-navy font-medium"
                                        />
                                    ) : (
                                        <select 
                                            value={selectedGrade} 
                                            onChange={e => setSelectedGrade(e.target.value)}
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-scis-navy/20 focus:border-scis-navy font-medium appearance-none"
                                        >
                                            <option value="">-- Select Grade --</option>
                                            {GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                    )}

                                    {filteredStudents.length > 0 && (
                                        <div className="mt-2 border border-slate-200 rounded-xl max-h-48 overflow-y-auto bg-white shadow-lg absolute z-10 w-[calc(100%-2rem)] max-w-[calc(36rem-2rem)]">
                                            {filteredStudents.map(student => (
                                                <div 
                                                    key={student.id} 
                                                    onClick={() => setSelectedStudent(student)}
                                                    className="p-3 border-b border-slate-100 last:border-0 hover:bg-slate-50 cursor-pointer active:bg-slate-100"
                                                >
                                                    <p className="font-bold text-sm text-scis-navy">{student.displayName}</p>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className="text-[10px] text-slate-500 font-bold bg-slate-100 px-1.5 rounded">{student.grade}</span>
                                                        <span className="text-[10px] uppercase text-slate-400">{HOUSES[student.house]?.name}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>

                        {/* 2. REASON SELECTION */}
                        <div className={`bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60 transition-opacity duration-300 ${selectedStudent ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                            <div className="flex items-center gap-3 mb-4">
                                <span className="w-8 h-8 rounded-full bg-scis-navy text-scis-gold font-display font-black flex items-center justify-center">2</span>
                                <h3 className="font-bold text-lg text-scis-navy">Details</h3>
                            </div>

                            {/* Record Type Toggle for Coordinators Only */}
                            {isCoordinator && (
                                <div className="mb-6">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Record Type</p>
                                    <div className="flex gap-4">
                                        <label className={`flex-1 p-3 rounded-xl border-2 cursor-pointer transition-colors flex items-center gap-2 ${recordType === 'AR' ? 'border-scis-navy bg-blue-50' : 'border-slate-200'}`}>
                                            <input type="radio" name="type" className="sr-only" checked={recordType === 'AR'} onChange={() => setRecordType('AR')} />
                                            <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${recordType === 'AR' ? 'border-scis-navy' : 'border-slate-300'}`}>
                                                {recordType === 'AR' && <div className="w-2 h-2 rounded-full bg-scis-navy"></div>}
                                            </div>
                                            <div>
                                                <span className="block font-bold text-sm text-scis-navy">AR (-3 pts)</span>
                                            </div>
                                        </label>
                                        <label className={`flex-1 p-3 rounded-xl border-2 cursor-pointer transition-colors flex items-center gap-2 ${recordType === 'DR' ? 'border-red-600 bg-red-50' : 'border-slate-200'}`}>
                                            <input type="radio" name="type" className="sr-only" checked={recordType === 'DR'} onChange={() => setRecordType('DR')} />
                                            <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center ${recordType === 'DR' ? 'border-red-600' : 'border-slate-300'}`}>
                                                {recordType === 'DR' && <div className="w-2 h-2 rounded-full bg-red-600"></div>}
                                            </div>
                                            <div>
                                                <span className="block font-bold text-sm text-red-700">DR (-30 pts)</span>
                                            </div>
                                        </label>
                                    </div>
                                </div>
                            )}
                            
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Reason</p>
                            <div className="space-y-2">
                                {REASONS.map((r, idx) => (
                                    <label key={idx} className="block relative cursor-pointer">
                                        <input 
                                            type="radio" 
                                            name="reason" 
                                            value={r} 
                                            checked={reason === r}
                                            onChange={() => setReason(r)}
                                            className="sr-only" 
                                        />
                                        <div className="p-4 border-2 border-slate-100 rounded-xl flex items-start gap-3 transition-colors">
                                            <div className="w-5 h-5 rounded-full border-2 border-slate-300 mt-0.5 radio-indicator flex-shrink-0"></div>
                                            <span className="text-sm font-medium text-slate-700 leading-tight">{r}</span>
                                        </div>
                                    </label>
                                ))}
                                
                                {reason === 'Other - Otro' && (
                                    <textarea 
                                        placeholder="Please specify..."
                                        value={customReason}
                                        onChange={e => setCustomReason(e.target.value)}
                                        className="w-full p-4 mt-2 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-scis-navy font-medium text-sm min-h-[100px] animate-slide-up"
                                    ></textarea>
                                )}
                            </div>
                        </div>

                        {/* 3. SUBJECT SELECTION */}
                        <div className={`bg-white rounded-3xl p-5 shadow-sm border border-slate-200/60 transition-opacity duration-300 ${reason ? 'opacity-100' : 'opacity-40 pointer-events-none'}`}>
                            <div className="flex items-center gap-3 mb-4">
                                <span className="w-8 h-8 rounded-full bg-scis-navy text-scis-gold font-display font-black flex items-center justify-center">3</span>
                                <h3 className="font-bold text-lg text-scis-navy">Subject / Class</h3>
                            </div>
                            
                            <div className="relative">
                                <select 
                                    value={subject} 
                                    onChange={e => setSubject(e.target.value)}
                                    className="w-full p-4 bg-slate-50 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-scis-navy font-medium appearance-none text-slate-700"
                                >
                                    <option value="">-- Select Subject --</option>
                                    {SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}
                                </select>
                                <div className="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
                                </div>
                            </div>
                        </div>

                    </div>

                    {/* Fixed Bottom Action Bar */}
                    <div className={`fixed bottom-0 left-0 right-0 p-4 bg-white/80 backdrop-blur-md border-t border-slate-200 transition-transform duration-300 z-50 ${isFormComplete && !showPreview ? 'translate-y-0' : 'translate-y-full'}`}>
                        <button 
                            onClick={() => setShowPreview(true)}
                            className="w-full max-w-xl mx-auto block btn-press bg-scis-navy text-scis-gold py-4 rounded-2xl font-display font-black text-lg tracking-widest uppercase shadow-xl"
                        >
                            Review {recordType}
                        </button>
                    </div>

                    {/* Preview Modal */}
                    {showPreview && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-scis-navy/40 backdrop-blur-sm p-4 animate-fade-in">
                            <div className="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl animate-slide-up">
                                <div className={`${recordType === 'DR' ? 'bg-red-100 text-red-900 border-red-200' : 'bg-amber-100 text-amber-900 border-amber-200'} p-6 text-center border-b`}>
                                    <span className="text-4xl block mb-2">{recordType === 'DR' ? '🚨' : '⚠️'}</span>
                                    <h3 className="font-display font-black text-2xl uppercase">Confirm {recordType}</h3>
                                    <p className="text-xs font-bold uppercase tracking-widest opacity-80 mt-1">Please review details</p>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Student</p>
                                        <p className="font-black text-scis-navy leading-tight">{selectedStudent?.displayName}</p>
                                        <div className="flex gap-2 mt-1">
                                            <span className="text-xs bg-slate-100 text-slate-600 px-2 py-0.5 rounded font-bold">{selectedStudent?.grade}</span>
                                            <HouseBadge houseId={selectedStudent?.house} />
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Deduction</p>
                                        <p className={`font-black ${recordType === 'DR' ? 'text-red-600' : 'text-blue-600'}`}>{recordType === 'DR' ? '-30 Points (Disciplinary Referral)' : '-3 Points (Active Reflection)'}</p>
                                    </div>
                                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Reason</p>
                                        <p className="font-medium text-sm text-slate-700">{reason === 'Other - Otro' ? `Other: ${customReason}` : reason}</p>
                                    </div>
                                    <div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Subject</p>
                                        <p className="font-bold text-scis-navy">{subject}</p>
                                    </div>
                                </div>
                                <div className="p-4 grid grid-cols-2 gap-3 bg-slate-50 border-t border-slate-100">
                                    <button 
                                        onClick={() => setShowPreview(false)}
                                        disabled={isSubmitting}
                                        className="py-3 rounded-xl font-bold text-sm text-slate-600 bg-white border border-slate-200 hover:bg-slate-100"
                                    >
                                        Cancel
                                    </button>
                                    <button 
                                        onClick={handleSubmit}
                                        disabled={isSubmitting}
                                        className="py-3 rounded-xl font-bold text-sm text-white bg-blue-600 hover:bg-blue-700 shadow-md flex items-center justify-center"
                                    >
                                        {isSubmitting ? 'Submitting...' : `Submit ${recordType}`}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CoordinatorDashboard({ students, roles, isAdmin, isCoordinator }) {
            const [view, setView] = useState('ars'); // 'ars' | 'students' | 'roles'
            const [ars, setArs] = useState([]);
            const [houseTotals, setHouseTotals] = useState({});
            const [loading, setLoading] = useState(true);
            
            // Advanced Filtering and Sorting States
            const [statusFilter, setStatusFilter] = useState('pending'); // 'pending' | 'approved' | 'all'
            const [filter, setFilter] = useState('');
            const [gradeFilter, setGradeFilter] = useState('');
            const [sortField, setSortField] = useState('date'); // 'date' | 'name' | 'grade' | 'subject'
            const [sortDirection, setSortDirection] = useState('desc'); // 'asc' | 'desc'

            useEffect(() => {
                const { db, collection, query, onSnapshot, appId } = window.FirebaseDB;
                
                // Fetch ARs and DRs
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'active_reflections'));
                const unsubscribeArs = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        let formattedGrade = data.grade || '';
                        // Normalize legacy classes like 1s1 to 1sA, 1S2 to 1sB
                        formattedGrade = formattedGrade.replace(/s1/gi, 'sA').replace(/s2/gi, 'sB');
                        list.push({ id: doc.id, ...data, grade: formattedGrade });
                    });
                    setArs(list);
                    setLoading(false);
                }, (error) => {
                    console.error("Dashboard Error:", error);
                    setLoading(false);
                });

                // Fetch Current House Points from the main shared collection -> "houseTotals"
                const totalsQ = query(collection(db, 'artifacts', appId, 'public', 'data', 'houseTotals'));
                const unsubscribeTotals = onSnapshot(totalsQ, (snapshot) => {
                    const totals = {};
                    snapshot.forEach(doc => totals[doc.id] = typeof doc.data().points === 'number' ? doc.data().points : (doc.data().score || 0));
                    setHouseTotals(totals);
                });

                return () => {
                    unsubscribeArs();
                    unsubscribeTotals();
                };
            }, []);

            const handleDeleteAR = async (id) => {
                if (!confirm("Are you sure you want to permanently delete this record?")) return;
                try {
                    const { db, doc, deleteDoc, appId } = window.FirebaseDB;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_reflections', id));
                } catch (err) {
                    console.error("Error deleting AR:", err);
                    alert("Failed to delete record.");
                }
            };

            const handleAccept = async (record) => {
                const typeName = record.type === 'DR' ? 'Disciplinary Referral' : 'Active Reflection';
                const pointsToDeduct = record.type === 'DR' ? 30 : (record.pointDeduction || 3);
                
                if (!confirm(`Are you sure you want to APPROVE this ${typeName} and deduct ${pointsToDeduct} points from ${HOUSES[record.house]?.name}?`)) return;

                try {
                    const { db, doc, updateDoc, setDoc, increment, appId } = window.FirebaseDB;
                    
                    // Deduct Points safely using increment on the shared collection -> "houseTotals"
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'houseTotals', record.house), {
                        points: increment(-pointsToDeduct)
                    }, { merge: true });
                    
                    // Mark AR/DR as approved
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_reflections', record.id), {
                        status: 'approved'
                    });

                } catch (err) {
                    console.error("Error accepting record:", err);
                    alert("Failed to process point deduction.");
                }
            };

            const availableGrades = useMemo(() => {
                const grades = new Set(ars.map(ar => ar.grade).filter(Boolean));
                return [...grades].sort();
            }, [ars]);

            const processedArs = useMemo(() => {
                let result = [...ars];
                
                // Status Filter
                if (statusFilter !== 'all') {
                    result = result.filter(ar => (ar.status || 'pending') === statusFilter);
                }

                if (gradeFilter) {
                    result = result.filter(ar => ar.grade === gradeFilter);
                }

                if (filter) {
                    const f = filter.toLowerCase();
                    result = result.filter(ar => 
                        ar.studentName?.toLowerCase().includes(f) || 
                        ar.grade?.toLowerCase().includes(f) ||
                        ar.teacherEmail?.toLowerCase().includes(f) ||
                        ar.subject?.toLowerCase().includes(f)
                    );
                }

                result.sort((a, b) => {
                    let comparison = 0;
                    if (sortField === 'date') {
                        const dateA = a.timestamp?.seconds || 0;
                        const dateB = b.timestamp?.seconds || 0;
                        comparison = dateA - dateB;
                    } else if (sortField === 'name') {
                        comparison = (a.studentName || '').localeCompare(b.studentName || '');
                    } else if (sortField === 'grade') {
                        comparison = (a.grade || '').localeCompare(b.grade || '');
                    } else if (sortField === 'subject') {
                        comparison = (a.subject || '').localeCompare(b.subject || '');
                    }
                    return sortDirection === 'asc' ? comparison : -comparison;
                });

                return result;
            }, [ars, filter, gradeFilter, sortField, sortDirection, statusFilter]);

            // Analytics & Word Cloud Computation
            const offenderStats = useMemo(() => {
                const sCounts = {};
                const gCounts = {};
                const studentDetails = {};

                ars.forEach(ar => {
                    if (ar.studentName) {
                        sCounts[ar.studentName] = (sCounts[ar.studentName] || 0) + 1;
                        if (!studentDetails[ar.studentName]) {
                            studentDetails[ar.studentName] = { name: ar.studentName, grade: ar.grade, house: ar.house };
                        }
                    }
                    if (ar.grade) {
                        gCounts[ar.grade] = (gCounts[ar.grade] || 0) + 1;
                    }
                });

                const repeatOffenders = Object.keys(sCounts)
                    .filter(name => sCounts[name] > 3)
                    .map(name => ({ ...studentDetails[name], count: sCounts[name] }))
                    .sort((a, b) => b.count - a.count);

                return { studentCounts: sCounts, gradeCounts: gCounts, repeatOffenders };
            }, [ars]);

            const formatDate = (ts) => {
                if (!ts) return '';
                const d = new Date(ts.seconds * 1000);
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            };

            const handleExportCSV = () => {
                if (processedArs.length === 0) return alert("No records to export.");
                
                const headers = ['Date', 'Time', 'Student Name', 'Grade', 'House', 'Type', 'Points Deducted', 'Subject', 'Reason', 'Teacher Email', 'Status'];

                const escapeCSV = (val) => {
                    if (val === null || val === undefined) return '""';
                    return '"' + String(val).replace(/"/g, '""') + '"';
                };

                const rows = processedArs.map(ar => {
                    let dateStr = '';
                    let timeStr = '';
                    if (ar.timestamp) {
                        const d = new Date(ar.timestamp.seconds * 1000);
                        dateStr = d.toLocaleDateString('en-GB'); // DD/MM/YYYY
                        timeStr = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    }
                    const reasonStr = ar.reason === 'Other - Otro' ? (ar.customReason || 'Other') : ar.reason;
                    
                    return [
                        escapeCSV(dateStr),
                        escapeCSV(timeStr),
                        escapeCSV(ar.studentName),
                        escapeCSV(ar.grade),
                        escapeCSV(HOUSES[ar.house]?.name || ar.house),
                        escapeCSV(ar.type),
                        escapeCSV(ar.type === 'DR' ? 30 : (ar.pointDeduction || 3)),
                        escapeCSV(ar.subject),
                        escapeCSV(reasonStr),
                        escapeCSV(ar.teacherEmail),
                        escapeCSV((ar.status || 'pending').toUpperCase())
                    ].join(',');
                });

                const csvContent = [headers.join(','), ...rows].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', `SCIS_Incidents_Export_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="max-w-6xl mx-auto p-4 animate-fade-in">
                    <div className="flex flex-col md:flex-row justify-between md:items-end gap-4 mb-8">
                        <div>
                            <h2 className="text-3xl font-display font-black text-scis-navy uppercase tracking-tight flex items-center gap-2">
                                <span className="text-3xl">📋</span> {view === 'ars' ? 'Dashboard' : view === 'students' ? 'Student Database' : 'Manage Roles'}
                            </h2>
                            <p className="text-slate-500 text-sm font-medium mt-1">High School Coordinator Panel</p>
                        </div>
                        
                        <div className="flex gap-2">
                            <button onClick={() => setView('ars')} className={`px-4 py-2 rounded-xl text-sm font-bold transition-colors ${view === 'ars' ? 'bg-scis-navy text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>Dashboard</button>
                            {isAdmin && (
                                <>
                                    <button onClick={() => setView('students')} className={`px-4 py-2 rounded-xl text-sm font-bold transition-colors ${view === 'students' ? 'bg-scis-navy text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>Students</button>
                                    <button onClick={() => setView('roles')} className={`px-4 py-2 rounded-xl text-sm font-bold transition-colors ${view === 'roles' ? 'bg-scis-navy text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>Roles</button>
                                </>
                            )}
                        </div>
                    </div>

                    {view === 'students' && isAdmin ? (
                        <StudentManager students={students} />
                    ) : view === 'roles' && isAdmin ? (
                        <RoleManager roles={roles} />
                    ) : (
                        <>
                            {/* LIVE HOUSE POINTS */}
                            <div className="mb-8 grid grid-cols-2 md:grid-cols-4 gap-4">
                                {Object.entries(HOUSES).map(([id, house]) => (
                                    <div key={id} className={`bg-white p-5 rounded-3xl shadow-sm border-2 border-b-4 flex flex-col items-center justify-center transform transition-transform hover:-translate-y-1`} style={{borderColor: house.color}}>
                                        <span className="text-4xl mb-2 drop-shadow-sm">{house.icon}</span>
                                        <span className="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-1">{house.name}</span>
                                        <span className="text-3xl font-display font-black" style={{color: house.color}}>{houseTotals[id] || 0}</span>
                                    </div>
                                ))}
                            </div>

                            {/* REPEAT OFFENDERS ALERT */}
                            {offenderStats.repeatOffenders.length > 0 && (
                                <div className="mb-8 bg-red-50 p-6 rounded-3xl border-2 border-red-200 shadow-sm animate-fade-in">
                                    <h3 className="font-display font-black text-xl text-red-700 flex items-center gap-2 mb-4">
                                        <span className="text-2xl animate-pulse">⚠️</span> Attention: Repeat Offenders (>3 Incidents)
                                    </h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
                                        {offenderStats.repeatOffenders.map(student => (
                                            <div key={student.name} className="bg-white p-4 rounded-xl shadow-sm border border-red-100 flex justify-between items-center">
                                                <div>
                                                    <div className="font-bold text-scis-navy text-sm">{student.name}</div>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-1.5 rounded">{student.grade}</span>
                                                        <HouseBadge houseId={student.house} />
                                                    </div>
                                                </div>
                                                <div className="w-10 h-10 rounded-full bg-red-100 text-red-700 font-black flex items-center justify-center text-lg border border-red-200">
                                                    {student.count}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* WORD CLOUDS */}
                            <div className="mb-8 grid grid-cols-1 lg:grid-cols-2 gap-6">
                                <SimpleWordCloud data={offenderStats.studentCounts} title="Student Frequency Cloud" isAlert={true} />
                                <SimpleWordCloud data={offenderStats.gradeCounts} title="Grade Frequency Cloud" />
                            </div>

                            {/* Advanced Filter and Sort Toolbar */}
                            <div className="flex flex-col md:flex-row gap-3 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-sm">
                                <div className="flex-1 relative">
                                    <input 
                                        type="text" 
                                        placeholder="Search student, teacher, subject..." 
                                        value={filter}
                                        onChange={e => setFilter(e.target.value)}
                                        className="w-full pl-10 pr-4 py-2.5 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy focus:ring-1 focus:ring-scis-navy text-sm shadow-sm"
                                    />
                                    <svg className="w-5 h-5 text-slate-400 absolute left-3 top-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                                </div>
                                
                                <select 
                                    value={statusFilter} 
                                    onChange={e => setStatusFilter(e.target.value)}
                                    className="py-2.5 px-4 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy focus:ring-1 focus:ring-scis-navy text-sm shadow-sm font-bold text-scis-navy"
                                >
                                    <option value="pending">🟡 Pending Actions</option>
                                    <option value="approved">🟢 Approved History</option>
                                    <option value="all">🔵 All Records</option>
                                </select>

                                <select 
                                    value={gradeFilter} 
                                    onChange={e => setGradeFilter(e.target.value)}
                                    className="py-2.5 px-4 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy focus:ring-1 focus:ring-scis-navy text-sm shadow-sm"
                                >
                                    <option value="">All Grades</option>
                                    {availableGrades.map(g => <option key={g} value={g}>{g}</option>)}
                                </select>

                                <div className="flex gap-2">
                                    <select 
                                        value={sortField} 
                                        onChange={e => setSortField(e.target.value)}
                                        className="py-2.5 px-4 bg-white border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy focus:ring-1 focus:ring-scis-navy text-sm shadow-sm"
                                    >
                                        <option value="date">Sort by Date</option>
                                        <option value="name">Sort by Name</option>
                                        <option value="grade">Sort by Grade</option>
                                        <option value="subject">Sort by Subject</option>
                                    </select>
                                    <button 
                                        onClick={() => setSortDirection(prev => prev === 'asc' ? 'desc' : 'asc')}
                                        className="p-2.5 bg-white border border-slate-300 rounded-xl hover:bg-slate-100 text-slate-600 shadow-sm transition-colors font-bold w-10 flex justify-center items-center"
                                        title={sortDirection === 'asc' ? 'Ascending Order' : 'Descending Order'}
                                    >
                                        {sortDirection === 'asc' ? '↑' : '↓'}
                                    </button>
                                    <button 
                                        onClick={handleExportCSV}
                                        className="p-2.5 bg-green-600 hover:bg-green-700 text-white rounded-xl shadow-sm transition-colors font-bold flex justify-center items-center px-4"
                                        title="Export current view to CSV"
                                    >
                                        <svg className="w-5 h-5 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                        <span className="hidden md:inline">Export CSV</span>
                                    </button>
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                {loading ? (
                                    <div className="p-10 text-center text-slate-500 font-medium">Loading records...</div>
                                ) : processedArs.length === 0 ? (
                                    <div className="p-16 text-center">
                                        <span className="text-5xl block mb-4 opacity-50">✨</span>
                                        <h3 className="font-display font-bold text-xl text-scis-navy">No Records Found</h3>
                                        <p className="text-slate-400 text-sm mt-1">No incidents match your current filters.</p>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse min-w-[900px]">
                                            <thead>
                                                <tr className="bg-slate-50 border-b border-slate-200">
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Date</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Student</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Type</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Subject</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Reason</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Teacher</th>
                                                    {isCoordinator && <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Actions</th>}
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {processedArs.map(ar => (
                                                    <tr key={ar.id} className={`border-b border-slate-100 transition-colors ${ar.status === 'approved' ? 'bg-slate-50/50 opacity-70' : 'hover:bg-slate-50/80'}`}>
                                                        <td className="p-4 whitespace-nowrap text-slate-500 font-medium">{formatDate(ar.timestamp)}</td>
                                                        <td className="p-4">
                                                            <div className="font-bold text-scis-navy">{ar.studentName}</div>
                                                            <div className="flex gap-2 mt-1 items-center">
                                                                <span className="text-[10px] font-bold bg-slate-100 text-slate-500 px-1.5 rounded">{ar.grade}</span>
                                                                <HouseBadge houseId={ar.house} />
                                                            </div>
                                                        </td>
                                                        <td className="p-4">
                                                            <span className={`px-2 py-1 rounded text-[10px] font-black uppercase tracking-widest ${ar.type === 'DR' ? 'bg-red-100 text-red-700 border border-red-200' : 'bg-blue-100 text-blue-700 border border-blue-200'}`}>
                                                                {ar.type === 'DR' ? 'DR (-30)' : 'AR (-3)'}
                                                            </span>
                                                        </td>
                                                        <td className="p-4 font-medium text-slate-700">{ar.subject}</td>
                                                        <td className="p-4">
                                                            <div className="max-w-[200px] truncate text-slate-700" title={ar.reason === 'Other - Otro' ? ar.customReason : ar.reason}>
                                                                {ar.reason === 'Other - Otro' ? (
                                                                    <span className="italic">Other: {ar.customReason}</span>
                                                                ) : (
                                                                    ar.reason.split(' - ')[0] // Show English part mostly for brevity in table
                                                                )}
                                                            </div>
                                                        </td>
                                                        <td className="p-4 text-slate-500 text-xs">{ar.teacherEmail}</td>
                                                        {isCoordinator && (
                                                            <td className="p-4 flex gap-2">
                                                                {(ar.status === 'pending' || !ar.status) && (
                                                                    <button onClick={() => handleAccept(ar)} className="text-green-700 hover:text-white font-bold text-xs uppercase tracking-wider bg-green-100 hover:bg-green-600 px-3 py-1.5 rounded-lg transition-colors shadow-sm">Accept</button>
                                                                )}
                                                                <button onClick={() => handleDeleteAR(ar.id)} className="text-red-500 hover:text-white font-bold text-xs uppercase tracking-wider bg-red-50 hover:bg-red-500 px-3 py-1.5 rounded-lg transition-colors">Delete</button>
                                                            </td>
                                                        )}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function App() {
            // Early return if Firebase failed to initialize
            if (!window.FirebaseDB) {
                return (
                    <div className="flex h-screen flex-col items-center justify-center bg-slate-50 p-6 text-center">
                        <div className="text-red-500 text-6xl mb-4">⚠️</div>
                        <h2 className="text-2xl font-black text-scis-navy font-display uppercase tracking-tight mb-2">Firebase Setup Required</h2>
                    </div>
                );
            }

            const [user, setUser] = useState(null);
            const [currentTab, setCurrentTab] = useState('form'); // 'form' | 'dashboard'
            const [authLoaded, setAuthLoaded] = useState(false);
            const [students, setStudents] = useState([]);
            
            // Dynamic Roles stored in Firebase
            const [roles, setRoles] = useState({ admins: [], coordinators: [] });

            const userEmail = user?.email ? user.email.toLowerCase() : (user?.isAnonymous ? 'dolguin@scis-bo.com' : null);
            
            // Determine privileges dynamically
            const isAdmin = userEmail && roles.admins.includes(userEmail);
            const isCoordinator = userEmail && (isAdmin || roles.coordinators.includes(userEmail));

            useEffect(() => {
                const { auth, db, collection, query, onSnapshot, appId, doc, setDoc, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseDB;
                
                // Auth check & initialization
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else if (window.location.hostname.includes('github.io') || window.location.hostname === 'localhost') {
                            // Wait for user to trigger Microsoft login
                        } else {
                            // Fallback for Canvas preview
                            await signInAnonymously(auth);
                        }
                    } catch (e) {
                        console.error("Auth init failed:", e);
                    }
                };

                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoaded(true);
                });

                // Fetch dynamic roles
                const rolesDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roles');
                const unsubscribeRoles = onSnapshot(rolesDoc, (docSnap) => {
                    if (docSnap.exists()) {
                        setRoles({
                            admins: (docSnap.data().admins || []).map(e => e.toLowerCase()),
                            coordinators: (docSnap.data().coordinators || []).map(e => e.toLowerCase())
                        });
                    } else {
                        // Initialize first time configuration for the database
                        const initialRoles = { 
                            admins: ['dolguin@scis-bo.com'], 
                            coordinators: ['amanda@scis-bo.com', 'japerez@scis-bo.com', 'pbaranda@scis-bo.com'] 
                        };
                        setDoc(rolesDoc, initialRoles);
                        setRoles(initialRoles);
                    }
                });

                // Fetch real-time students from Firestore
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                const unsubscribeStudents = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => {
                        let docData = doc.data();
                        let formattedGrade = docData.grade || '';
                        // Upgraded to 'gi' (case-insensitive) to catch 'S1'/'S2' from the CSV imports
                        formattedGrade = formattedGrade.replace(/s1/gi, 'sA').replace(/s2/gi, 'sB');

                        list.push({ 
                            id: doc.id, 
                            ...docData, 
                            grade: formattedGrade,
                            displayName: (docData.name || '').toUpperCase() 
                        });
                    });
                    list.sort((a,b) => a.name.localeCompare(b.name));
                    setStudents(list);
                });

                return () => {
                    unsubscribeAuth();
                    unsubscribeRoles();
                    unsubscribeStudents();
                };
            }, []);

            const handleLogin = async () => {
                const { auth, signInWithPopup, OAuthProvider } = window.FirebaseDB;
                const provider = new OAuthProvider('microsoft.com');
                
                // Restrict login strictly to the school's tenant domain
                provider.setCustomParameters({
                    tenant: 'scis-bo.com'
                });

                try {
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Login failed:", error);
                    if (error.code !== 'auth/popup-closed-by-user' && error.code !== 'auth/cancelled-popup-request') {
                        alert("Could not sign in with Microsoft. Check console for details. Error: " + error.message);
                    }
                }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.FirebaseDB;
                await signOut(auth);
                setCurrentTab('form');
            };

            if (!authLoaded) {
                return (
                    <div className="flex h-screen items-center justify-center bg-slate-50">
                        <div className="animate-pulse text-scis-navy font-display font-black tracking-widest uppercase">Connecting...</div>
                    </div>
                );
            }

            // Show Login Screen
            if (!user || (!user.email && !user.isAnonymous)) {
                return (
                    <div className="flex h-screen flex-col items-center justify-center bg-[#0C1D40] p-6 text-center">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full animate-slide-up">
                            <div className="bg-scis-gold text-scis-navy w-16 h-16 mx-auto flex items-center justify-center rounded-2xl shadow-inner mb-6">
                                <img src="GriffinSM.png" alt="SCIS Logo" className="w-10 h-10 object-contain" />
                            </div>
                            <h2 className="text-3xl font-black text-scis-navy font-display uppercase tracking-tight mb-2">SCIS AR Portal</h2>
                            <p className="text-slate-500 text-sm font-medium mb-8">Please sign in with your school email to access the Active Reflection portal.</p>
                            <button 
                                onClick={handleLogin}
                                className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 text-slate-700 font-bold py-3.5 px-4 rounded-xl hover:bg-slate-50 transition-colors shadow-sm"
                            >
                                <svg className="w-5 h-5" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/><path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
                                Sign In with Microsoft
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    {/* Top Navigation */}
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 py-3 sticky top-0 z-40 shadow-md">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-scis-gold text-scis-navy w-8 h-8 flex items-center justify-center rounded-lg shadow-inner">
                                    <img src="GriffinSM.png" alt="SCIS Logo" className="w-5 h-5 object-contain" />
                                </div>
                                <div>
                                    <h1 className="text-lg font-display font-black text-white tracking-tight uppercase leading-none hidden sm:block">SCIS Portal</h1>
                                    <h1 className="text-lg font-display font-black text-white tracking-tight uppercase leading-none sm:hidden">AR/DR</h1>
                                    {userEmail && <div className="text-[10px] text-scis-gold font-medium">{userEmail}</div>}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                {/* Role Based Toggles */}
                                {isCoordinator && (
                                    <div className="flex bg-white/10 p-1 rounded-xl mr-2">
                                        <button 
                                            onClick={() => setCurrentTab('form')}
                                            className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${currentTab === 'form' ? 'bg-scis-gold text-scis-navy' : 'text-white hover:bg-white/20'}`}
                                        >
                                            Assign
                                        </button>
                                        <button 
                                            onClick={() => setCurrentTab('dashboard')}
                                            className={`px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${currentTab === 'dashboard' ? 'bg-scis-gold text-scis-navy' : 'text-white hover:bg-white/20'}`}
                                        >
                                            Dashboard
                                        </button>
                                    </div>
                                )}
                                <button onClick={handleLogout} className="text-white hover:text-red-400 p-2 transition-colors" title="Sign Out">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="pt-6">
                        {currentTab === 'form' && <ARForm userEmail={userEmail} students={students} isCoordinator={isCoordinator} />}
                        {currentTab === 'dashboard' && isCoordinator && <CoordinatorDashboard students={students} roles={roles} isAdmin={isAdmin} isCoordinator={isCoordinator} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
