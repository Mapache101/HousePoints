        function parseCSV(text) {
          const rows = [];
          let currentRow = [];
          let currentCell = '';
          let inQuotes = false;
          
          for (let i = 0; i < text.length; i++) {
            const char = text[i];
            const nextChar = text[i + 1];
            
            if (char === '"' && inQuotes && nextChar === '"') {
              currentCell += '"';
              i++;
            } else if (char === '"') {
              inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
              currentRow.push(currentCell.trim());
              currentCell = '';
            } else if (char === '\n' && !inQuotes) {
              if (currentCell.endsWith('\r')) currentCell = currentCell.slice(0, -1);
              currentRow.push(currentCell.trim());
              if (currentRow.some(cell => cell !== '')) rows.push(currentRow);
              currentRow = [];
              currentCell = '';
            } else {
              currentCell += char;
            }
          }
          if (currentCell || currentRow.length > 0) {
            if (currentCell.endsWith('\r')) currentCell = currentCell.slice(0, -1);
            currentRow.push(currentCell.trim());
            if (currentRow.some(cell => cell !== '')) rows.push(currentRow);
          }
          return rows;
        }

        const identifyCategoryType = (categoryName) => {
          const lowerCat = categoryName.toLowerCase();
          if (lowerCat.includes('saber') || lowerCat.includes('to know')) return 'Saber (Tests/Knowledge)';
          if (lowerCat.includes('hacer') || lowerCat.includes('to do')) return 'Hacer (Classwork/Tasks)';
          if (lowerCat.includes('ser') || lowerCat.includes('to be')) return 'Ser (Behavior/Responsibility)';
          if (lowerCat.includes('eval') || lowerCat.includes('decidir')) return 'Autoevaluación/Decidir';
          return 'Other/Ungraded';
        };

        const processGradebook = (filename, csvText) => {
          const rows = parseCSV(csvText);
          if (rows.length < 2) return null;

          const headers = rows[0];
          const uidIndex = headers.findIndex(h => h.includes("Unique User ID") || h.includes("ID"));
          if (uidIndex === -1) return null;

          const categories = [];
          const assignments = [];

          headers.forEach((h, index) => {
            if (h.includes("Category Score")) {
              const cleanName = h.replace("Term1 - ", "").replace(" - Category Score", "");
              categories.push({ 
                index, 
                name: cleanName,
                type: identifyCategoryType(cleanName)
              });
            } else if (h.includes("(Max Points:")) {
              const match = h.match(/(.+)\s*\(Max Points:\s*\d+,\s*Grading Category:\s*(.+)\)/);
              if (match) {
                assignments.push({ 
                  index, 
                  name: match[1].trim(), 
                  category: match[2].trim(),
                  type: identifyCategoryType(match[2].trim())
                });
              } else {
                assignments.push({ 
                  index, 
                  name: h, 
                  category: "Other",
                  type: "Other/Ungraded"
                });
              }
            }
          });

          const studentData = {};
          for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            if (row.length <= uidIndex) continue;
            const uid = parseInt(row[uidIndex], 10);
            if (isNaN(uid)) continue;

            const record = { categories: {}, assignments: [] };
            
            categories.forEach(c => {
              if (row[c.index] && row[c.index] !== "N/A") {
                record.categories[c.name] = {
                   score: parseFloat(row[c.index]),
                   type: c.type
                };
              }
            });
            
            assignments.forEach(a => {
              const scoreRaw = row[a.index];
              if (scoreRaw && scoreRaw !== "N/A" && scoreRaw.trim() !== "") {
                record.assignments.push({
                  name: a.name,
                  category: a.category,
                  type: a.type,
                  score: parseFloat(scoreRaw)
                });
              }
            });

            record.assignments.sort((a, b) => a.score - b.score);
            studentData[uid] = record;
          }

          const lowerName = filename.toLowerCase();
          let subjectKey = null;
          if (lowerName.includes('math')) subjectKey = 'math';
          else if (lowerName.includes('english')) subjectKey = 'english';
          else if (lowerName.includes('science')) subjectKey = 'genSci';
          else if (lowerName.includes('social')) subjectKey = 'socStu';
          else if (lowerName.includes('spanish')) subjectKey = 'spanish';
          else if (lowerName.includes('music')) subjectKey = 'music';
          else if (lowerName.includes('art')) subjectKey = 'art';

          return { subjectKey, studentData };
        };

        // --- Main GradeAnalyzer Component ---
        function GradeAnalyzer({ user }) {
          const [searchTerm, setSearchTerm] = useState('');
          const [sortConfig, setSortConfig] = useState({ key: 'average', direction: 'descending' });
          const [selectedStudent, setSelectedStudent] = useState(null);
          const [gradebooks, setGradebooks] = useState({});
          const [expandedSubject, setExpandedSubject] = useState(null);

          const handleFileUpload = (event) => {
            const files = event.target.files;
            Array.from(files).forEach(file => {
              const reader = new FileReader();
              reader.onload = (e) => {
                const text = e.target.result;
                const result = processGradebook(file.name, text);
                if (result && result.subjectKey) {
                  setGradebooks(prev => ({
                    ...prev,
                    [result.subjectKey]: result.studentData
                  }));
                }
              };
              reader.readAsText(file);
            });
          };

          const processedData = useMemo(() => {
            return rawStudentsData.map(student => {
              const total = subjectsInfo.reduce((sum, sub) => sum + student[sub.key], 0);
              const average = total / subjectsInfo.length;
              return { ...student, average };
            });
          }, []);

          const stats = useMemo(() => {
            let sumAverage = 0;
            let highest = processedData[0];
            let lowest = processedData[0];

            processedData.forEach(student => {
              sumAverage += student.average;
              if (student.average > highest.average) highest = student;
              if (student.average < lowest.average) lowest = student;
            });

            const distribution = processedData.reduce((acc, student) => {
              if (student.average >= 90) acc.excellent++;
              else if (student.average >= 80) acc.good++;
              else if (student.average >= 70) acc.fair++;
              else acc.poor++;
              return acc;
            }, { excellent: 0, good: 0, fair: 0, poor: 0 });

            return {
              classAverage: (sumAverage / processedData.length).toFixed(1),
              highest,
              lowest,
              distribution
            };
          }, [processedData]);

          const subjectStats = useMemo(() => {
            return subjectsInfo.map(sub => {
              const total = processedData.reduce((sum, student) => sum + student[sub.key], 0);
              return { ...sub, average: total / processedData.length };
            }).sort((a, b) => b.average - a.average);
          }, [processedData]);

          const filteredAndSortedData = useMemo(() => {
            let sortableItems = [...processedData];
            if (searchTerm) {
              sortableItems = sortableItems.filter(item => 
                item.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.code.toString().includes(searchTerm)
              );
            }
            if (sortConfig !== null) {
              sortableItems.sort((a, b) => {
                if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'ascending' ? -1 : 1;
                if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'ascending' ? 1 : -1;
                return 0;
              });
            }
            return sortableItems;
          }, [processedData, searchTerm, sortConfig]);

          const requestSort = (key) => {
            let direction = 'ascending';
            if (sortConfig.key === key && sortConfig.direction === 'ascending') direction = 'descending';
            setSortConfig({ key, direction });
          };

          const getGradeColor = (grade, isBadge = false) => {
            if (grade === undefined || grade === null || isNaN(grade)) return 'text-slate-400';
            if (grade >= 90) return isBadge ? 'bg-emerald-100 text-emerald-800' : 'text-emerald-700 font-medium';
            if (grade >= 80) return isBadge ? 'bg-blue-100 text-blue-800' : 'text-blue-700 font-medium';
            if (grade >= 70) return isBadge ? 'bg-amber-100 text-amber-800' : 'text-amber-700 font-medium';
            return isBadge ? 'bg-red-100 text-red-800' : 'text-red-600 font-medium';
          };

          const getCategoryColor = (type) => {
            if (type.includes('Saber')) return 'bg-purple-100 text-purple-800 border-purple-200';
            if (type.includes('Hacer')) return 'bg-orange-100 text-orange-800 border-orange-200';
            if (type.includes('Ser')) return 'bg-teal-100 text-teal-800 border-teal-200';
            return 'bg-slate-100 text-slate-800 border-slate-200';
          };

          return (
            <div className="bg-slate-50 text-slate-800 font-sans w-full min-h-[calc(100vh-64px)] flex flex-col p-4 md:p-8 animate-fade-in">
              <div className="max-w-7xl mx-auto w-full space-y-6">
                
                {/* Header */}
                <header className="flex flex-col md:flex-row md:items-end justify-between gap-4 pb-4 border-b border-slate-200">
                  <div className="flex items-center gap-4">
                     <div>
                       <h1 className="text-3xl font-display font-black text-scis-navy tracking-tight uppercase">Grade Analysis Dashboard</h1>
                       <p className="text-slate-500 mt-1 font-medium">Class of 2026 • Teacher: Daniel Olguin</p>
                     </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <label className="flex items-center gap-2 bg-blue-50 hover:bg-blue-100 text-blue-700 px-4 py-2 rounded-lg border border-blue-200 cursor-pointer transition-colors shadow-sm btn-press">
                      <Icon name="Upload" className="w-5 h-5" />
                      <span className="font-semibold text-sm">Import Gradebooks</span>
                      <input type="file" multiple accept=".csv" onChange={handleFileUpload} className="hidden" />
                    </label>
                    <div className="flex items-center gap-2 bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm">
                      <Icon name="Users" className="w-5 h-5 text-slate-400" />
                      <span className="font-semibold text-slate-700">{processedData.length}</span>
                      <span className="text-slate-500 text-sm">Total Students</span>
                    </div>
                  </div>
                </header>

                {/* Top Summary Cards */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-start gap-4">
                    <div className="p-3 bg-blue-50 text-blue-600 rounded-xl">
                      <Icon name="BarChart3" className="w-6 h-6" />
                    </div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1 uppercase tracking-wider">Class Overall Average</p>
                      <p className="text-3xl font-black text-scis-navy">{stats.classAverage}</p>
                    </div>
                  </div>
                  
                  <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-start gap-4">
                    <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl">
                      <Icon name="Award" className="w-6 h-6" />
                    </div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1 uppercase tracking-wider">Highest Average</p>
                      <p className="text-xl font-black text-scis-navy">{stats.highest.average.toFixed(1)}</p>
                      <p className="text-sm text-slate-500 truncate w-48 font-medium" title={stats.highest.name}>
                        {stats.highest.name.split(':')[0]}
                      </p>
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm flex items-start gap-4">
                    <div className="p-3 bg-red-50 text-red-600 rounded-xl">
                      <Icon name="TrendingDown" className="w-6 h-6" />
                    </div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 mb-1 uppercase tracking-wider">Lowest Average</p>
                      <p className="text-xl font-black text-scis-navy">{stats.lowest.average.toFixed(1)}</p>
                      <p className="text-sm text-slate-500 truncate w-48 font-medium" title={stats.lowest.name}>
                        {stats.lowest.name.split(':')[0]}
                      </p>
                    </div>
                  </div>
                </div>

                {/* Data Table Section */}
                <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                  <div className="p-4 md:p-6 border-b border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/50">
                    <h2 className="text-xl font-display font-black text-scis-navy uppercase tracking-tight">Student Detail Records</h2>
                    <div className="relative w-full md:w-72">
                      <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <Icon name="Search" className="h-4 w-4 text-slate-400" />
                      </div>
                      <input
                        type="text"
                        placeholder="Search by name or code..."
                        className="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-scis-navy focus:border-transparent text-sm transition-shadow font-medium"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                      />
                    </div>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full text-sm text-left whitespace-nowrap">
                      <thead className="bg-slate-100 text-slate-600 font-bold uppercase tracking-wider text-xs">
                        <tr>
                          <th className="px-4 py-4 cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => requestSort('code')}>
                            <div className="flex items-center gap-1">Code {sortConfig.key === 'code' && (sortConfig.direction === 'ascending' ? <Icon name="ChevronUp" className="w-3 h-3"/> : <Icon name="ChevronDown" className="w-3 h-3"/>)}</div>
                          </th>
                          <th className="px-4 py-4 cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => requestSort('name')}>
                            <div className="flex items-center gap-1">Student Name {sortConfig.key === 'name' && (sortConfig.direction === 'ascending' ? <Icon name="ChevronUp" className="w-3 h-3"/> : <Icon name="ChevronDown" className="w-3 h-3"/>)}</div>
                          </th>
                          {subjectsInfo.map(sub => (
                            <th key={sub.key} className="px-4 py-4 cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => requestSort(sub.key)}>
                              <div className="flex items-center gap-1">
                                {sub.label} 
                                {sortConfig.key === sub.key && (sortConfig.direction === 'ascending' ? <Icon name="ChevronUp" className="w-3 h-3"/> : <Icon name="ChevronDown" className="w-3 h-3"/>)}
                              </div>
                            </th>
                          ))}
                          <th className="px-4 py-4 cursor-pointer hover:bg-slate-200 transition-colors bg-slate-200/50 border-l border-slate-300" onClick={() => requestSort('average')}>
                            <div className="flex items-center justify-end gap-1">
                              Avg
                              {sortConfig.key === 'average' && (sortConfig.direction === 'ascending' ? <Icon name="ChevronUp" className="w-3 h-3"/> : <Icon name="ChevronDown" className="w-3 h-3"/>)}
                            </div>
                          </th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {filteredAndSortedData.map((student) => (
                          <tr 
                            key={student.code} 
                            className="hover:bg-blue-50/50 cursor-pointer transition-colors group"
                            onClick={() => setSelectedStudent(student)}
                            title="Click to view full analysis"
                          >
                            <td className="px-4 py-3 font-mono text-slate-500 font-medium">{student.code}</td>
                            <td className="px-4 py-3 font-bold text-scis-navy group-hover:text-blue-700 transition-colors">{student.name}</td>
                            
                            {subjectsInfo.map(sub => (
                              <td key={sub.key} className="px-4 py-3">
                                <span className={getGradeColor(student[sub.key])}>
                                  {student[sub.key]}
                                </span>
                              </td>
                            ))}
                            
                            <td className="px-4 py-3 text-right border-l border-slate-100 bg-slate-50/50">
                              <span className={`inline-flex items-center justify-center px-2.5 py-1 rounded-lg text-xs font-black shadow-sm ${getGradeColor(student.average, true)}`}>
                                {student.average.toFixed(1)}
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

                {/* Student Analysis Modal */}
                {selectedStudent && (
                  <div 
                    className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-scis-navy/40 backdrop-blur-sm animate-fade-in" 
                    onClick={() => { setSelectedStudent(null); setExpandedSubject(null); }}
                  >
                    <div 
                      className="bg-white rounded-3xl w-full max-w-4xl max-h-[90vh] overflow-y-auto shadow-2xl flex flex-col animate-slide-up" 
                      onClick={e => e.stopPropagation()}
                    >
                      <div className="flex items-center justify-between p-6 border-b border-slate-200 sticky top-0 bg-white/95 backdrop-blur z-10">
                        <div>
                          <h2 className="text-2xl font-display font-black text-scis-navy uppercase tracking-tight">{selectedStudent.name}</h2>
                          <p className="text-slate-500 mt-1 font-medium">Code: {selectedStudent.code} • Overall Average: <span className={`font-black ml-1 px-2 py-0.5 rounded shadow-sm ${getGradeColor(selectedStudent.average, true)}`}>{selectedStudent.average.toFixed(1)}</span></p>
                        </div>
                        <button 
                          onClick={() => { setSelectedStudent(null); setExpandedSubject(null); }} 
                          className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-500 transition-colors font-bold"
                        >
                          <Icon name="X" className="w-5 h-5" />
                        </button>
                      </div>
                      
                      <div className="p-6 space-y-6 bg-slate-50/30">
                        <div>
                          <h3 className="text-xl font-display font-black text-scis-navy mb-1 uppercase tracking-tight">Subject Breakdown & Deficiencies</h3>
                          <p className="text-sm text-slate-500 font-medium">Click on subjects with uploaded gradebooks (marked with a document icon) to view the origin of the grades and specific deficiencies.</p>
                        </div>

                        <div className="space-y-3">
                          {subjectsInfo.map(sub => {
                            const studentScore = selectedStudent[sub.key];
                            const classAvg = subjectStats.find(s => s.key === sub.key).average;
                            const diff = studentScore - classAvg;
                            const hasGradebook = gradebooks[sub.key] && gradebooks[sub.key][selectedStudent.code];
                            const isExpanded = expandedSubject === sub.key;

                            return (
                              <div key={sub.key} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                                {/* Subject Row (Clickable if Gradebook exists) */}
                                <div 
                                  className={`flex flex-col md:flex-row md:items-center gap-4 p-4 transition-colors ${hasGradebook ? 'cursor-pointer hover:bg-slate-50' : ''}`}
                                  onClick={() => hasGradebook && setExpandedSubject(isExpanded ? null : sub.key)}
                                >
                                  <div className="w-48 font-bold text-scis-navy flex items-center gap-2">
                                    {hasGradebook ? (isExpanded ? <Icon name="ChevronDown" className="w-4 h-4 text-blue-500" /> : <Icon name="ChevronRight" className="w-4 h-4 text-blue-500" />) : <div className="w-4" />}
                                    {sub.label}
                                    {hasGradebook && <Icon name="FileText" className="w-4 h-4 text-slate-400" title="Detailed gradebook available" />}
                                  </div>
                                  
                                  <div className="flex-1 relative h-6 bg-slate-100 rounded-full overflow-hidden flex items-center shadow-inner">
                                    <div className="absolute top-0 bottom-0 w-0.5 bg-scis-navy z-10" style={{ left: `${classAvg}%` }} title={`Class Avg: ${classAvg.toFixed(1)}`} />
                                    <div 
                                      className={`h-full transition-all duration-700 ease-out ${
                                        studentScore >= 90 ? 'bg-emerald-400' : studentScore >= 80 ? 'bg-blue-400' : studentScore >= 70 ? 'bg-amber-400' : 'bg-red-400'
                                      }`}
                                      style={{ width: `${studentScore}%` }}
                                    />
                                  </div>
                                  
                                  <div className="w-32 flex items-center justify-between text-sm">
                                    <span className={`font-black text-lg ${getGradeColor(studentScore)}`}>{studentScore}</span>
                                    <span className={`font-bold text-xs px-2 py-0.5 rounded-md border ${diff >= 0 ? 'text-emerald-700 bg-emerald-50 border-emerald-200' : 'text-red-700 bg-red-50 border-red-200'}`}>
                                      {diff > 0 ? '+' : ''}{diff.toFixed(1)}
                                    </span>
                                  </div>
                                </div>

                                {/* Expandable Gradebook Details */}
                                {hasGradebook && isExpanded && (
                                  <div className="bg-slate-50 border-t border-slate-200 p-5 space-y-6">
                                    
                                    {/* Categories Overview mapped to SEDUCA */}
                                    {Object.keys(gradebooks[sub.key][selectedStudent.code].categories).length > 0 && (
                                      <div>
                                        <h4 className="text-xs font-black uppercase tracking-widest text-slate-500 mb-3">Performance by Evaluation Type (SEDUCA)</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
                                          {Object.entries(gradebooks[sub.key][selectedStudent.code].categories).map(([cat, data]) => (
                                            <div key={cat} className={`border rounded-xl p-3 text-center shadow-sm bg-white`}>
                                              <div className={`text-[10px] font-black uppercase tracking-widest opacity-75 mb-1 px-2 py-0.5 rounded inline-block ${getCategoryColor(data.type)}`}>{data.type}</div>
                                              <div className={`font-black text-2xl ${getGradeColor(data.score)}`}>{data.score.toFixed(1)}</div>
                                            </div>
                                          ))}
                                        </div>
                                      </div>
                                    )}

                                    {/* Individual Assignments & Deficiencies */}
                                    <div>
                                       <h4 className="text-xs font-black uppercase tracking-widest text-slate-500 mb-3 flex items-center gap-2">
                                          Assignments Log
                                          <span className="font-semibold normal-case text-slate-400 tracking-normal">(Sorted lowest to highest)</span>
                                       </h4>
                                       <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                                          <table className="w-full text-sm text-left">
                                             <thead className="bg-slate-100 text-slate-600 text-xs uppercase tracking-wider font-bold">
                                                <tr>
                                                   <th className="px-4 py-3 border-b border-slate-200">Score</th>
                                                   <th className="px-4 py-3 border-b border-slate-200">Assignment Name</th>
                                                   <th className="px-4 py-3 border-b border-slate-200">Evaluation Area</th>
                                                </tr>
                                             </thead>
                                             <tbody className="divide-y divide-slate-100">
                                                {gradebooks[sub.key][selectedStudent.code].assignments.map((assignment, idx) => (
                                                  <tr key={idx} className={assignment.score < 70 ? "bg-red-50/30" : "hover:bg-slate-50"}>
                                                     <td className="px-4 py-3 whitespace-nowrap">
                                                       <span className={`inline-flex items-center gap-1 font-black ${getGradeColor(assignment.score)}`}>
                                                         {assignment.score < 70 && <Icon name="AlertCircle" className="w-4 h-4 text-red-500" />}
                                                         {assignment.score}
                                                       </span>
                                                     </td>
                                                     <td className="px-4 py-3 font-semibold text-scis-navy">{assignment.name}</td>
                                                     <td className="px-4 py-3">
                                                        <span className={`px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-widest border ${getCategoryColor(assignment.type)}`}>
                                                            {assignment.type}
                                                        </span>
                                                     </td>
                                                  </tr>
                                                ))}
                                                {gradebooks[sub.key][selectedStudent.code].assignments.length === 0 && (
                                                  <tr><td colSpan="3" className="px-4 py-6 text-center text-slate-400 font-medium">No specific assignment records found.</td></tr>
                                                )}
                                             </tbody>
                                          </table>
                                       </div>
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          );
        }

        // --- Auth Wrapper ---
        function App() {
            if (!window.FirebaseDB) return <div className="p-10 text-center font-display font-black text-xl text-scis-navy">Initializing System...</div>;

            const [user, setUser] = useState(null);
            const [authLoaded, setAuthLoaded] = useState(false);

            useEffect(() => {
                const { auth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseDB;
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else if (!window.location.hostname.includes('github.io') && window.location.hostname !== 'localhost') {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth init failed:", e); }
                };

                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoaded(true);
                });

                return () => {
                    unsubscribeAuth();
                };
            }, []);

            const handleLogin = async () => {
                const { auth, signInWithPopup, OAuthProvider } = window.FirebaseDB;
                const provider = new OAuthProvider('microsoft.com');
                provider.setCustomParameters({ tenant: 'scis-bo.com' });
                try { await signInWithPopup(auth, provider); } catch (error) { console.error("Login failed:", error); }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.FirebaseDB;
                await signOut(auth);
            };

            if (!authLoaded) return <div className="flex h-screen items-center justify-center font-display font-black text-xl text-scis-navy animate-pulse">Connecting...</div>;

            if (!user || (!user.email && !user.isAnonymous)) {
                return (
                    <div className="flex h-screen flex-col items-center justify-center bg-scis-navy p-6 text-center">
                        <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-sm w-full animate-slide-up">
                            <div className="bg-scis-gold text-scis-navy w-16 h-16 mx-auto flex items-center justify-center rounded-2xl shadow-inner mb-6 text-3xl">📊</div>
                            <h2 className="text-3xl font-black text-scis-navy font-display uppercase tracking-tight mb-2">Grade Analysis</h2>
                            <p className="text-slate-500 text-sm font-medium mb-8">Sign in with your school email to access student analytics.</p>
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 text-slate-700 font-bold py-3.5 px-4 rounded-xl hover:bg-slate-50 transition-colors shadow-sm btn-press">
                                <svg className="w-5 h-5" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/><path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
                                Sign In with Microsoft
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col bg-slate-50">
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 py-3 sticky top-0 z-40 shadow-md">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-scis-gold text-scis-navy w-10 h-10 flex items-center justify-center rounded-xl shadow-inner text-xl">📊</div>
                                <div>
                                    <h1 className="text-xl font-display font-black text-white tracking-tight uppercase leading-none hidden sm:block mt-1">Grade Analysis</h1>
                                    <h1 className="text-xl font-display font-black text-white tracking-tight uppercase leading-none sm:hidden mt-1">Analytics</h1>
                                    {user?.email && <div className="text-[10px] text-scis-gold font-bold tracking-widest uppercase mt-0.5">{user.email}</div>}
                                </div>
                            </div>
                            
                            <button onClick={handleLogout} className="text-white hover:text-red-400 p-2 transition-colors flex items-center gap-2" title="Sign Out">
                                <span className="text-xs font-bold uppercase tracking-widest hidden sm:block">Sign Out</span>
                                <Icon name="LogOut" className="h-5 w-5" />
                            </button>
                        </div>
                    </nav>

                    <main className="flex-1">
                        <GradeAnalyzer user={user} />
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
