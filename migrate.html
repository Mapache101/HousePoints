<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIS Data Migration Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: { navy: '#0C1D40', gold: '#FFF86B' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>body { background-color: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, addDoc, doc, setDoc, increment, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'scis-house-points';

            window.FirebaseDB = { auth, db, collection, query, getDocs, addDoc, doc, setDoc, increment, Timestamp, onAuthStateChanged, signInAnonymously, signInWithCustomToken, appId };
        } catch (e) { console.error(e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Normalizes text by removing accents, double spaces, and converting to uppercase
        const normalize = (str) => {
            if (!str) return '';
            return str.toString()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // remove accents
                .toUpperCase()
                .replace(/[^A-Z0-9]/g, ' ') // replace special chars with space
                .replace(/\s+/g, ' ') // remove multiple spaces
                .trim();
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        function App() {
            const [students, setStudents] = useState([]);
            const [csvData, setCsvData] = useState('');
            const [parsedRows, setParsedRows] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                const init = async () => {
                    if(!window.FirebaseDB) return;
                    const { auth, db, collection, query, getDocs, signInAnonymously, onAuthStateChanged, appId, signInWithCustomToken } = window.FirebaseDB;
                    
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch(e) {}

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                            const snapshot = await getDocs(q);
                            const list = [];
                            snapshot.forEach(d => {
                                const data = d.data();
                                list.push({ 
                                    id: d.id, 
                                    ...data, 
                                    searchName: normalize(data.name),
                                    searchGrade: normalize(data.grade)
                                });
                            });
                            // Sort for the dropdown menu
                            list.sort((a,b) => a.name.localeCompare(b.name));
                            setStudents(list);
                        }
                    });
                };
                setTimeout(init, 500);
            }, []);

            const handleParse = () => {
                const lines = csvData.split('\n');
                const results = [];
                
                // Detect delimiter
                const firstLine = lines[0] || '';
                const delimiter = firstLine.includes(';') ? ';' : (firstLine.includes('\t') ? '\t' : ',');
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim() || lines[i].includes('DATE') || lines[i].includes('STUDENT NAME')) continue; 
                    
                    const cols = lines[i].split(delimiter);
                    // Need at least a student name to attempt a match
                    if (cols.length < 2 || !cols[1].trim()) continue;

                    const rawNameStr = cols[1].replace(/['"]/g, '').trim();
                    const rawName = normalize(rawNameStr);
                    const rawGrade = normalize(cols[2] || '');
                    
                    const hasAR = cols[3]?.trim() === '1';
                    const hasDR = cols[4]?.trim() === '1';
                    
                    if (!hasAR && !hasDR) continue;

                    // 1. EXACT MATCH
                    let matched = students.find(s => s.searchName === rawName);
                    let matchType = matched ? 'Exact' : null;
                    
                    // 2. SMART FUZZY MATCH (Word Overlap)
                    if (!matched) {
                        const csvWords = rawName.split(' ');
                        
                        // Look for a student where EVERY word in the CSV name exists in the DB name
                        let fuzzyMatch = students.find(s => {
                            const dbWords = s.searchName.split(' ');
                            return csvWords.every(w => dbWords.includes(w));
                        });

                        // If that fails, look for at least 2 matching words (e.g. First + Last name) 
                        // and a matching or empty grade to be safe.
                        if (!fuzzyMatch && csvWords.length >= 2) {
                            fuzzyMatch = students.find(s => {
                                const dbWords = s.searchName.split(' ');
                                const matchCount = csvWords.filter(w => dbWords.includes(w)).length;
                                const gradeMatches = rawGrade === '' || s.searchGrade === rawGrade || s.searchGrade.includes(rawGrade) || rawGrade.includes(s.searchGrade);
                                return matchCount >= 2 && gradeMatches;
                            });
                        }

                        if (fuzzyMatch) {
                            matched = fuzzyMatch;
                            matchType = 'Fuzzy';
                        }
                    }

                    results.push({
                        rowId: generateId(),
                        originalLine: lines[i],
                        date: cols[0] ? cols[0].trim() : '',
                        rawNameStr: rawNameStr,
                        rawName: rawName,
                        matchedStudent: matched || null,
                        matchType: matchType,
                        hasAR,
                        hasDR,
                        teacher: cols[5] && cols[5].trim() !== '' ? cols[5].trim() : 'Migration Admin'
                    });
                }
                setParsedRows(results);
            };

            const handleManualMatch = (rowId, studentId) => {
                const student = students.find(s => s.id === studentId);
                setParsedRows(prev => prev.map(r => r.rowId === rowId ? { 
                    ...r, 
                    matchedStudent: student || null,
                    matchType: student ? 'Manual' : null
                } : r));
            };

            const parseDateStr = (dateStr) => {
                try {
                    if (!dateStr) return window.FirebaseDB.Timestamp.now();
                    let clean = dateStr.replace(/O/gi, '0').replace(/-/g, '/').trim();
                    
                    // Support for Excel Serial Dates (e.g. 46064)
                    if (!isNaN(clean) && Number(clean) > 40000) {
                        let d = new Date(Math.round((Number(clean) - 25569) * 86400 * 1000));
                        return window.FirebaseDB.Timestamp.fromDate(d);
                    }

                    let d = new Date(clean);
                    if (isNaN(d.getTime())) return window.FirebaseDB.Timestamp.now();
                    return window.FirebaseDB.Timestamp.fromDate(d);
                } catch(e) {
                    return window.FirebaseDB.Timestamp.now();
                }
            };

            const handleMigrate = async () => {
                if(!confirm("Are you sure you want to execute this migration? It will write directly to Firebase and deduct house points.")) return;
                
                setIsProcessing(true);
                const { db, collection, addDoc, doc, setDoc, increment, appId } = window.FirebaseDB;
                
                const validRows = parsedRows.filter(r => r.matchedStudent !== null);
                
                for (let i = 0; i < validRows.length; i++) {
                    const row = validRows[i];
                    const student = row.matchedStudent;
                    
                    const createRecord = async (type, deduction) => {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'active_reflections'), {
                            studentId: student.id,
                            studentName: student.name,
                            grade: student.grade,
                            house: student.house,
                            type: type,
                            pointDeduction: deduction,
                            reason: `Legacy Migration - Past Record`,
                            subject: row.teacher,
                            teacherEmail: 'migration@scis-bo.com',
                            timestamp: parseDateStr(row.date),
                            status: 'approved'
                        });

                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'houseTotals', student.house), {
                            points: increment(-deduction)
                        }, { merge: true });
                    };

                    if (row.hasAR) await createRecord('AR', 3);
                    if (row.hasDR) await createRecord('DR', 30);
                    
                    setProgress(Math.round(((i + 1) / validRows.length) * 100));
                }

                alert("Migration Complete!");
                setIsProcessing(false);
                setParsedRows([]);
                setCsvData('');
                setProgress(0);
            };

            const readyToMigrate = parsedRows.length > 0 && parsedRows.every(r => r.matchedStudent);
            const missingCount = parsedRows.filter(r => !r.matchedStudent).length;

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8 font-sans space-y-6">
                    <div className="bg-scis-navy text-white p-6 md:p-8 rounded-3xl shadow-xl flex items-center justify-between">
                        <div>
                            <h1 className="text-2xl md:text-3xl font-display font-black tracking-tight flex items-center gap-3">
                                <span>🔄</span> Database Migration Tool
                            </h1>
                            <p className="text-scis-gold font-medium mt-1">Import Legacy AR/DR CSV Data ({students.length} Students Loaded)</p>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <label className="block font-bold text-slate-700 mb-2">1. Paste CSV Content Here</label>
                        <p className="text-xs text-slate-500 mb-3">Copy your entire spreadsheet data including the header row (DATE, STUDENT NAME, CLASS, etc.) and paste it below.</p>
                        <textarea 
                            value={csvData}
                            onChange={e => setCsvData(e.target.value)}
                            placeholder="DATE,STUDENT NAME,CLASS,AR,ACTION-DR,TEACHER&#10;10/02/2026,ROBERTO GIL,2SA,1,0,SPANISH&#10;46064,LEONARDO SERRANO,2SA,1,0,"
                            className="w-full h-40 p-4 bg-slate-50 border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy font-mono text-xs whitespace-pre"
                        ></textarea>
                        <button 
                            onClick={handleParse}
                            disabled={!csvData.trim()}
                            className="mt-4 bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-md"
                        >
                            2. Parse & Match Data
                        </button>
                    </div>

                    {parsedRows.length > 0 && (
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 animate-fade-in">
                            <div className="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-4 border-b border-slate-100 pb-4">
                                <h3 className="font-bold text-lg text-scis-navy">3. Review Matches</h3>
                                {missingCount > 0 ? (
                                    <span className="bg-red-100 text-red-700 px-4 py-2 rounded-lg font-bold text-sm shadow-inner flex items-center gap-2">
                                        <span className="text-lg">⚠️</span> Action Required: {missingCount} Unmatched Students
                                    </span>
                                ) : (
                                    <span className="bg-green-100 text-green-700 px-4 py-2 rounded-lg font-bold text-sm shadow-inner flex items-center gap-2">
                                        <span className="text-lg">✅</span> All Matched Perfectly!
                                    </span>
                                )}
                            </div>

                            <div className="max-h-[500px] overflow-y-auto mb-6 border border-slate-200 rounded-xl">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-100 sticky top-0 z-10 shadow-sm">
                                        <tr>
                                            <th className="p-3 font-black text-xs uppercase tracking-wider text-slate-500">CSV Input Name</th>
                                            <th className="p-3 font-black text-xs uppercase tracking-wider text-slate-500">Database Match</th>
                                            <th className="p-3 font-black text-xs uppercase tracking-wider text-slate-500">Actions to Apply</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {parsedRows.map((r) => (
                                            <tr key={r.rowId} className={r.matchedStudent ? 'hover:bg-slate-50 transition-colors' : 'bg-red-50 border-l-4 border-red-500'}>
                                                <td className="p-3">
                                                    <div className="font-mono text-xs font-bold text-slate-700">{r.rawNameStr}</div>
                                                    <div className="text-[10px] text-slate-400 mt-0.5">{r.date}</div>
                                                </td>
                                                <td className="p-3">
                                                    {r.matchedStudent ? (
                                                        <div className="flex flex-col sm:flex-row sm:items-center gap-2">
                                                            <div>
                                                                <span className="font-bold text-scis-navy block">{r.matchedStudent.name}</span>
                                                                <div className="flex items-center gap-2 mt-1">
                                                                    <span className="text-[10px] font-bold text-slate-500 bg-slate-200 px-1.5 rounded">{r.matchedStudent.grade}</span>
                                                                    <span className="text-[10px] uppercase font-black tracking-widest opacity-60">{r.matchedStudent.house}</span>
                                                                    <span className={`text-[9px] px-1.5 rounded font-bold uppercase tracking-widest ${r.matchType === 'Exact' ? 'bg-green-100 text-green-700' : r.matchType === 'Manual' ? 'bg-purple-100 text-purple-700' : 'bg-amber-100 text-amber-700'}`}>
                                                                        {r.matchType} Match
                                                                    </span>
                                                                </div>
                                                            </div>
                                                            <button onClick={() => handleManualMatch(r.rowId, null)} className="text-[10px] font-bold text-slate-400 hover:text-blue-600 underline mt-1 sm:mt-0 sm:ml-auto">Change Match</button>
                                                        </div>
                                                    ) : (
                                                        <div className="flex flex-col gap-2">
                                                            <span className="text-red-600 font-bold flex items-center gap-1"><span className="text-sm">❌</span> No Match Found</span>
                                                            <select 
                                                                onChange={(e) => handleManualMatch(r.rowId, e.target.value)}
                                                                className="w-full max-w-[250px] p-2 border-2 border-red-300 bg-white rounded-lg focus:border-red-500 outline-none text-xs font-medium shadow-inner"
                                                            >
                                                                <option value="">-- Select Correct Student --</option>
                                                                {students.map(s => <option key={s.id} value={s.id}>{s.name} ({s.grade})</option>)}
                                                            </select>
                                                        </div>
                                                    )}
                                                </td>
                                                <td className="p-3">
                                                    <div className="flex gap-2">
                                                        {r.hasAR && <span className="bg-blue-100 border border-blue-200 text-blue-800 px-2 py-1 rounded text-xs font-black shadow-sm">+1 AR <span className="opacity-50">(-3)</span></span>}
                                                        {r.hasDR && <span className="bg-red-100 border border-red-200 text-red-800 px-2 py-1 rounded text-xs font-black shadow-sm">+1 DR <span className="opacity-50">(-30)</span></span>}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div className="border-t border-slate-200 pt-6">
                                <button 
                                    onClick={handleMigrate}
                                    disabled={!readyToMigrate || isProcessing}
                                    className={`w-full font-display font-black text-xl py-5 rounded-2xl shadow-xl transition-all ${readyToMigrate ? 'bg-green-600 text-white hover:bg-green-700 hover:-translate-y-1' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}
                                >
                                    {isProcessing ? `Executing Migration... ${progress}%` : "4. Execute Migration to Firebase"}
                                </button>
                                {!readyToMigrate && <p className="text-center text-red-500 font-bold text-sm mt-3">Please resolve all unmatched students above before migrating.</p>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
