<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCIS Data Migration Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: { navy: '#0C1D40', gold: '#FFF86B' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>body { background-color: #f8fafc; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, addDoc, doc, setDoc, increment, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'scis-house-points';

            window.FirebaseDB = { auth, db, collection, query, getDocs, addDoc, doc, setDoc, increment, Timestamp, onAuthStateChanged, signInAnonymously, signInWithCustomToken, appId };
        } catch (e) { console.error(e); }
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [students, setStudents] = useState([]);
            const [csvData, setCsvData] = useState('');
            const [parsedRows, setParsedRows] = useState([]);
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState(0);

            useEffect(() => {
                const init = async () => {
                    if(!window.FirebaseDB) return;
                    const { auth, db, collection, query, getDocs, signInAnonymously, onAuthStateChanged, appId, signInWithCustomToken } = window.FirebaseDB;
                    
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch(e) {}

                    onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                            const snapshot = await getDocs(q);
                            const list = [];
                            snapshot.forEach(d => list.push({ id: d.id, ...d.data(), searchName: (d.data().name || '').toUpperCase().trim() }));
                            setStudents(list);
                        }
                    });
                };
                setTimeout(init, 500);
            }, []);

            const handleParse = () => {
                const lines = csvData.split('\n');
                const results = [];
                
                for (let i = 1; i < lines.length; i++) {
                    if (!lines[i].trim() || lines[i].includes('DATE,STUDENT NAME')) continue; // skip empty or duplicate headers
                    
                    const cols = lines[i].split(',');
                    if (cols.length < 5) continue;

                    const rawName = cols[1].replace(/['"]/g, '').trim().toUpperCase();
                    const hasAR = cols[3].trim() === '1';
                    const hasDR = cols[4].trim() === '1';
                    
                    if (!hasAR && !hasDR) continue; // Skip if no action

                    // Try to match student
                    let matched = students.find(s => s.searchName === rawName);
                    
                    // Fallback fuzzy match (if exact match fails)
                    if (!matched) {
                        matched = students.find(s => s.searchName.includes(rawName) || rawName.includes(s.searchName));
                    }

                    results.push({
                        originalLine: lines[i],
                        date: cols[0].trim(),
                        rawName: rawName,
                        matchedStudent: matched || null,
                        hasAR,
                        hasDR,
                        teacher: cols[6] ? cols[6].trim() : 'Migration Admin'
                    });
                }
                setParsedRows(results);
            };

            const parseDateStr = (dateStr) => {
                // Handle formats like "10/02/2026", "24-O2-26"
                try {
                    let clean = dateStr.replace(/O/gi, '0').replace(/-/g, '/').trim();
                    let d = new Date(clean);
                    if (isNaN(d.getTime())) return window.FirebaseDB.Timestamp.now();
                    return window.FirebaseDB.Timestamp.fromDate(d);
                } catch(e) {
                    return window.FirebaseDB.Timestamp.now();
                }
            };

            const handleMigrate = async () => {
                if(!confirm("Are you sure you want to execute this migration? It will write directly to Firebase and deduct house points.")) return;
                
                setIsProcessing(true);
                const { db, collection, addDoc, doc, setDoc, increment, appId } = window.FirebaseDB;
                
                const validRows = parsedRows.filter(r => r.matchedStudent !== null);
                
                for (let i = 0; i < validRows.length; i++) {
                    const row = validRows[i];
                    const student = row.matchedStudent;
                    
                    const createRecord = async (type, deduction) => {
                        // 1. Create AR/DR Record
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'active_reflections'), {
                            studentId: student.id,
                            studentName: student.name,
                            grade: student.grade,
                            house: student.house,
                            type: type,
                            pointDeduction: deduction,
                            reason: `Legacy Migration - Past Record`,
                            subject: row.teacher,
                            teacherEmail: 'migration@scis-bo.com',
                            timestamp: parseDateStr(row.date),
                            status: 'approved' // Automatically approved
                        });

                        // 2. Deduct Points Directly
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'houseTotals', student.house), {
                            points: increment(-deduction)
                        }, { merge: true });
                    };

                    if (row.hasAR) await createRecord('AR', 3);
                    if (row.hasDR) await createRecord('DR', 30);
                    
                    setProgress(Math.round(((i + 1) / validRows.length) * 100));
                }

                alert("Migration Complete!");
                setIsProcessing(false);
                setParsedRows([]);
                setCsvData('');
                setProgress(0);
            };

            const readyToMigrate = parsedRows.length > 0 && parsedRows.every(r => r.matchedStudent);
            const missingCount = parsedRows.filter(r => !r.matchedStudent).length;

            return (
                <div className="max-w-6xl mx-auto p-8 font-sans space-y-6">
                    <div className="bg-scis-navy text-white p-8 rounded-3xl shadow-xl flex items-center justify-between">
                        <div>
                            <h1 className="text-3xl font-display font-black tracking-tight">Database Migration Tool</h1>
                            <p className="text-scis-gold font-medium mt-1">Import Legacy AR/DR CSV Data ({students.length} Students Loaded)</p>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <label className="block font-bold text-slate-700 mb-2">1. Paste CSV Content Here</label>
                        <textarea 
                            value={csvData}
                            onChange={e => setCsvData(e.target.value)}
                            placeholder="DATE,STUDENT NAME,CLASS,AR,ACTION-DR,DIMITERS,TEACHER&#10;10/02/2026,ROBERTO GIL,2SA,1,0,-3,"
                            className="w-full h-48 p-4 bg-slate-50 border border-slate-300 rounded-xl focus:outline-none focus:border-scis-navy font-mono text-xs whitespace-pre"
                        ></textarea>
                        <button 
                            onClick={handleParse}
                            className="mt-4 bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700"
                        >
                            2. Parse & Match Data
                        </button>
                    </div>

                    {parsedRows.length > 0 && (
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="font-bold text-lg">3. Review Matches</h3>
                                {missingCount > 0 ? (
                                    <span className="bg-red-100 text-red-700 px-4 py-2 rounded-lg font-bold text-sm">⚠️ {missingCount} Unmatched Students (Please fix CSV and Re-Parse)</span>
                                ) : (
                                    <span className="bg-green-100 text-green-700 px-4 py-2 rounded-lg font-bold text-sm">✅ All Matched Perfectly</span>
                                )}
                            </div>

                            <div className="max-h-[400px] overflow-y-auto mb-6 border border-slate-200 rounded-xl">
                                <table className="w-full text-left text-sm">
                                    <thead className="bg-slate-50 sticky top-0">
                                        <tr>
                                            <th className="p-3 font-bold">CSV Name</th>
                                            <th className="p-3 font-bold">Matched Database Student</th>
                                            <th className="p-3 font-bold">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {parsedRows.map((r, i) => (
                                            <tr key={i} className={r.matchedStudent ? 'hover:bg-slate-50' : 'bg-red-50'}>
                                                <td className="p-3 font-mono text-xs">{r.rawName}</td>
                                                <td className="p-3">
                                                    {r.matchedStudent ? (
                                                        <span className="font-bold text-scis-navy">{r.matchedStudent.name} <span className="text-[10px] text-slate-400 bg-slate-100 px-2 py-1 rounded ml-2">{r.matchedStudent.grade} | {r.matchedStudent.house.toUpperCase()}</span></span>
                                                    ) : (
                                                        <span className="text-red-600 font-bold">❌ No Match Found</span>
                                                    )}
                                                </td>
                                                <td className="p-3">
                                                    {r.hasAR && <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded text-xs font-bold mr-2">+1 AR (-3)</span>}
                                                    {r.hasDR && <span className="bg-red-100 text-red-700 px-2 py-1 rounded text-xs font-bold">+1 DR (-30)</span>}
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={handleMigrate}
                                    disabled={!readyToMigrate || isProcessing}
                                    className={`flex-1 font-display font-black text-xl py-4 rounded-xl shadow-lg transition-colors ${readyToMigrate ? 'bg-scis-navy text-scis-gold hover:bg-[#11295c]' : 'bg-slate-300 text-slate-500 cursor-not-allowed'}`}
                                >
                                    {isProcessing ? `Migrating Data... ${progress}%` : "4. Execute Migration to Firebase"}
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
