<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIS Teacher Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { scis: { navy: '#0C1D40', gold: '#FFF86B', grey: '#A8A6A5' } },
                    fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] },
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pop': 'pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'press3d': 'press3d 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'flash': 'flash 0.4s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: { '0%': { transform: 'translateY(40px)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        pop: { '0%': { transform: 'scale(0.5)', opacity: '0' }, '80%': { transform: 'scale(1.1)', opacity: '1' }, '100%': { transform: 'scale(1)', opacity: '1' } },
                        press3d: { '0%': { transform: 'scale(1)' }, '50%': { transform: 'scale(0.92)' }, '100%': { transform: 'scale(1)' } },
                        flash: { '0%': { opacity: '0.6' }, '100%': { opacity: '0' } }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        
        /* Unified Interactive Elements */
        .btn-press, .btn-game { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active:not(:disabled), .btn-game:active:not(:disabled) { transform: scale(0.95); }
        .loading-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .bar-transition { transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Unified Scrollbars */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar, .scrollbar-hide::-webkit-scrollbar { display: none; }
        .no-scrollbar, .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Attendance & Calendar specific styles */
        .glass-panel { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .bg-gradient-animate { background: linear-gradient(-45deg, #0C1D40, #132a54, #081226, #1b3a6e); background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 1px; background-color: #e2e8f0; border: 1px solid #e2e8f0; }

        /* AR Radio Buttons */
        input[type="radio"]:checked + div { border-color: #0C1D40; background-color: #eff6ff; }
        input[type="radio"]:checked + div .radio-indicator { background-color: #0C1D40; border-color: #0C1D40; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, OAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, increment, query, where, getDocs, writeBatch, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            window.FirebaseDB = { 
                db: getFirestore(app), auth: getAuth(app), collection, doc, onSnapshot, setDoc, addDoc, updateDoc, deleteDoc, increment, query, where, getDocs, writeBatch, Timestamp, OAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInWithCustomToken, signInAnonymously, appId: 'scis-house-points' 
            };
        } catch (error) { console.error("Firebase Init Error:", error); }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- SHARED CONSTANTS ---
        const ADMIN_EMAIL = 'dolguin@scis-bo.com';
        const HOUSES = [
            { id: 'centaurs', name: 'Centaurs', color: '#3b82f6', icon: '🏹', bg: 'bg-blue-100', text: 'text-blue-700' }, 
            { id: 'pegasus', name: 'Pegasus', color: '#22c55e', icon: '🪽', bg: 'bg-green-100', text: 'text-green-700' },   
            { id: 'titans', name: 'Titans', color: '#eab308', icon: '⚡', bg: 'bg-yellow-100', text: 'text-yellow-700' },    
            { id: 'unicorns', name: 'Unicorns', color: '#ef4444', icon: '🦄', bg: 'bg-red-100', text: 'text-red-700' }  
        ];
        const MOOD_OPTIONS = ['😐', '🤔', '🥰', '😄', '🙄', '🕵️', '🤯'];
        const REASONS = [
            "Late to class (unexcused) - Llegar tarde a clases.", "Disruptive behaviour - Comportamiento inadecuado.",
            "Constantly interrupting class - Interrumpir en clase constantemente.", "Not following instructions - No seguir instrucciones.",
            "Not wearing the proper uniform - No vestir el uniforme adecuado.", "Not presenting requested materials in class - No presentarse con los materiales.",
            "Eating in class - Comer en horarios de clase.", "Public Display of affection(PDA) - Contacto físico en publico.",
            "Speaking spanish inside the class and in the hallways - Hablar en español.", "Sleeping in class - Dormir en clase.", "Other - Otro"
        ];
        const SUBJECTS = [
            "Coordination", "Spanish / Ms Carola", "Spanish / Ms Charito", "Science / Mr Tobias", "Science / Ms Daniela", "Chemistry", "Social Studies", "History", 
            "Physics", "Physical Education", "Maths / Kingsley", "Maths / Silvia", "Maths / Guillermo", "English / Elvia", "English / Sara", 
            "English / Letty", "ICT", "Biology", "Art", "Music", "Global Perspectives / Ms Wei", "Global Perspectives / Ms Bell", "Business Studies", "Homeroom"
        ];
        const SCHEDULE = [ { day: 1, start: '08:00', end: '09:30', class: '1sA' }, { day: 1, start: '09:45', end: '11:15', class: '2sB' }, { day: 2, start: '08:00', end: '09:30', class: '3sA' } ];

        const formatDateTime = (timestamp) => {
            if (!timestamp) return '';
            const d = new Date(timestamp.seconds * 1000);
            return d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        };

        function HouseBadge({ houseId }) {
            const house = HOUSES.find(h => h.id === houseId);
            if (!house) return null;
            return <span className={`inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-[10px] font-black uppercase tracking-wider ${house.bg} ${house.text} border border-${house.color}/20`}>{house.icon} {house.name}</span>;
        }

        // ==========================================
        // MAIN APP & HUB ROUTER
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [roles, setRoles] = useState({ admins: [], coordinators: [] });
            const [students, setStudents] = useState([]);
            const [grades, setGrades] = useState([]);
            const [currentView, setCurrentView] = useState('hub'); 
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const checkDb = setInterval(() => { if (window.FirebaseDB) { clearInterval(checkDb); initApp(); } }, 100);
                function initApp() {
                    const { auth, db, doc, collection, query, onSnapshot, setDoc, onAuthStateChanged, appId } = window.FirebaseDB;
                    onAuthStateChanged(auth, (u) => { setUser(u); setLoading(false); });

                    // Fetch Roles
                    onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roles'), (docSnap) => {
                        if (docSnap.exists()) setRoles({ admins: (docSnap.data().admins || []).map(e => e.toLowerCase()), coordinators: (docSnap.data().coordinators || []).map(e => e.toLowerCase()) });
                        else { const initRoles = { admins: [ADMIN_EMAIL], coordinators: [] }; setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roles'), initRoles); setRoles(initRoles); }
                    });

                    // Fetch Students Globally
                    onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'students')), (snapshot) => {
                        const list = []; const gradeSet = new Set();
                        snapshot.forEach(doc => {
                            let data = doc.data();
                            let fg = (data.grade || '').replace(/s1/gi, 'sA').replace(/s2/gi, 'sB');
                            if(fg) gradeSet.add(fg.toUpperCase());
                            list.push({ id: doc.id, ...data, grade: fg, displayName: (data.name || '').toUpperCase() });
                        });
                        list.sort((a,b) => a.displayName.localeCompare(b.displayName));
                        setStudents(list); setGrades([...gradeSet].sort());
                    });
                }
            }, []);

            if (loading) return <div className="flex h-screen items-center justify-center"><div className="loading-spin h-12 w-12 border-8 border-scis-gold border-t-scis-navy rounded-full"></div></div>;

            const userEmail = user?.email?.toLowerCase();
            const isAdmin = userEmail && (roles.admins.includes(userEmail) || userEmail === ADMIN_EMAIL);
            const isCoordinator = userEmail && (isAdmin || roles.coordinators.includes(userEmail));

            if (!user && currentView !== 'leaderboard') return <Login setView={setCurrentView} />;

            switch (currentView) {
                case 'hub': return <LandingHub setView={setCurrentView} isAdmin={isAdmin} isCoordinator={isCoordinator} user={user} />;
                case 'leaderboard': return <LeaderboardModule setGlobalView={setCurrentView} user={user} isAdmin={isAdmin} />;
                case 'ar': return <IncidentModule setGlobalView={setCurrentView} isCoordinator={isCoordinator} isAdmin={isAdmin} userEmail={userEmail} students={students} roles={roles} />;
                case 'att': return <AttendanceModule setGlobalView={setCurrentView} userEmail={userEmail} students={students} grades={grades} />;
                case 'calendar': return <CalendarModule setGlobalView={setCurrentView} user={user} grades={grades} />;
                default: return <LandingHub setView={setCurrentView} isAdmin={isAdmin} isCoordinator={isCoordinator} user={user} />;
            }
        }

        // ==========================================
        // LOGIN & HUB COMPONENTS
        // ==========================================
        function Login() {
            const handleLogin = async () => {
                const { auth, OAuthProvider, signInWithPopup } = window.FirebaseDB;
                const provider = new OAuthProvider('microsoft.com');
                provider.setCustomParameters({ tenant: 'scis-bo.com' });
                try { await signInWithPopup(auth, provider); } catch (err) { alert("Failed to authenticate."); }
            };

            return (
                <div className="flex h-screen flex-col items-center justify-center bg-scis-navy p-6 text-center relative overflow-hidden">
                    <div className="fixed top-0 left-0 w-full h-full -z-10 bg-gradient-animate pointer-events-none"></div>
                    <div className="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full animate-slide-up z-10 border-b-8 border-scis-gold">
                        <div className="bg-scis-gold text-scis-navy w-20 h-20 mx-auto flex items-center justify-center rounded-[1.5rem] shadow-inner text-4xl mb-6">🦅</div>
                        <h2 className="text-3xl font-black text-scis-navy font-display uppercase tracking-tight mb-2">SCIS Hub</h2>
                        <p className="text-slate-500 text-sm font-bold mb-8">Authenticate with Microsoft.</p>
                        <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 text-scis-navy font-black py-4 px-4 rounded-2xl hover:bg-slate-50 transition-all shadow-md btn-press">
                            Sign In to Access
                        </button>
                    </div>
                </div>
            );
        }

        function LandingHub({ setView, user }) {
            return (
                <div className="min-h-screen bg-slate-50">
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 md:px-8 py-4 flex justify-between items-center shadow-lg">
                        <div className="flex items-center gap-3">
                            <div className="bg-scis-gold text-scis-navy w-10 h-10 flex items-center justify-center rounded-xl shadow-inner text-xl">🦅</div>
                            <div>
                                <h1 className="text-xl font-display font-black text-white tracking-tight uppercase leading-none">SCIS Portal Hub</h1>
                                <p className="text-[10px] text-scis-gold font-bold uppercase tracking-widest">{user?.email || 'Guest'}</p>
                            </div>
                        </div>
                        <button onClick={() => window.FirebaseDB.signOut(window.FirebaseDB.auth)} className="bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-red-600 shadow-md btn-press">Sign Out</button>
                    </nav>

                    <main className="max-w-5xl mx-auto p-6 md:p-10 mt-4 animate-in fade-in slide-in-from-bottom-4">
                        <div className="mb-10 text-center">
                            <h2 className="text-4xl font-display font-black text-scis-navy uppercase tracking-tight mb-2">Welcome to the Hub</h2>
                            <p className="text-slate-500 font-medium">Select a module below to access your tools.</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            <div onClick={() => setView('leaderboard')} className="p-8 rounded-[2rem] border-2 shadow-sm cursor-pointer transform transition-all hover:-translate-y-2 hover:shadow-xl btn-press bg-white border-blue-200 text-blue-900">
                                <div className="text-5xl mb-4 drop-shadow-sm">🏆</div>
                                <h3 className="text-2xl font-display font-black uppercase tracking-tight mb-2">House Points</h3>
                                <p className="text-sm font-bold opacity-70 leading-snug">Leaderboard & Award Monthly Points.</p>
                            </div>
                            <div onClick={() => setView('ar')} className="p-8 rounded-[2rem] border-2 shadow-sm cursor-pointer transform transition-all hover:-translate-y-2 hover:shadow-xl btn-press bg-white border-amber-200 text-amber-900">
                                <div className="text-5xl mb-4 drop-shadow-sm">⚠️</div>
                                <h3 className="text-2xl font-display font-black uppercase tracking-tight mb-2">AR Portal</h3>
                                <p className="text-sm font-bold opacity-70 leading-snug">Issue incidents & Analytics.</p>
                            </div>
                            <div onClick={() => setView('att')} className="p-8 rounded-[2rem] border-2 shadow-sm cursor-pointer transform transition-all hover:-translate-y-2 hover:shadow-xl btn-press bg-white border-green-200 text-green-900">
                                <div className="text-5xl mb-4 drop-shadow-sm">📝</div>
                                <h3 className="text-2xl font-display font-black uppercase tracking-tight mb-2">Attendance</h3>
                                <p className="text-sm font-bold opacity-70 leading-snug">Kiosk roster & Mood tracker.</p>
                            </div>
                            <div onClick={() => setView('calendar')} className="p-8 rounded-[2rem] border-2 shadow-sm cursor-pointer transform transition-all hover:-translate-y-2 hover:shadow-xl btn-press bg-white border-purple-200 text-purple-900">
                                <div className="text-5xl mb-4 drop-shadow-sm">📅</div>
                                <h3 className="text-2xl font-display font-black uppercase tracking-tight mb-2">Calendar</h3>
                                <p className="text-sm font-bold opacity-70 leading-snug">Balance student assessments.</p>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        // ==========================================
        // MODULE 1: LEADERBOARD
        // ==========================================
        function LeaderboardModule({ setGlobalView, user, isAdmin }) {
            const [localView, setLocalView] = useState('public');
            const [houseTotals, setHouseTotals] = useState({});

            useEffect(() => {
                const { db, collection, query, onSnapshot, appId } = window.FirebaseDB;
                const unsub = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'houseTotals')), snap => {
                    const totals = {}; snap.forEach(doc => { totals[doc.id] = doc.data().points || 0; }); setHouseTotals(totals);
                });
                return () => unsub();
            }, []);

            return (
                <div className="min-h-screen bg-slate-50 animate-in fade-in">
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 md:px-8 py-3 sticky top-0 z-50 shadow-lg flex justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setGlobalView('hub')} className="bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">🏠 Back</button>
                            <div className="hidden sm:block text-scis-gold text-xl font-display font-black uppercase ml-2">🏆 Leaderboard</div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setLocalView('public')} className={`btn-game px-3 py-1.5 rounded-lg text-xs font-bold transition border-2 border-b-4 ${localView === 'public' ? 'bg-scis-gold text-scis-navy border-yellow-600' : 'bg-white/10 text-white border-transparent'}`}>Board</button>
                            {user && <button onClick={() => setLocalView('teacher')} className={`btn-game px-3 py-1.5 rounded-lg text-xs font-bold transition border-2 border-b-4 ${localView === 'teacher' ? 'bg-scis-gold text-scis-navy border-yellow-600' : 'bg-white/10 text-white border-transparent'}`}>Award</button>}
                            {isAdmin && <button onClick={() => setLocalView('admin')} className={`btn-game px-3 py-1.5 rounded-lg text-xs font-bold transition border-2 border-b-4 ${localView === 'admin' ? 'bg-scis-gold text-scis-navy border-yellow-600' : 'bg-white/10 text-white border-transparent'}`}>Admin</button>}
                        </div>
                    </nav>
                    <div className="max-w-6xl mx-auto p-4 md:p-8 mt-4">
                        {localView === 'public' && <LeaderboardDashboard houseTotals={houseTotals} />}
                        {localView === 'teacher' && <LeaderboardTeacher user={user} />}
                        {localView === 'admin' && <LeaderboardAdmin />}
                    </div>
                </div>
            );
        }

        function LeaderboardDashboard({ houseTotals }) {
            const data = HOUSES.map(h => ({ name: h.name, points: houseTotals[h.id] || 0, color: h.color, icon: h.icon })).sort((a,b) => b.points - a.points);
            const maxPoints = Math.max(...data.map(d => d.points), 10); 
            return (
                <div className="space-y-10">
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
                        {data.map((h, i) => (
                            <div key={h.name} className="bg-white p-6 rounded-3xl border-2 border-b-8 shadow-sm text-center relative" style={{ borderColor: h.color }}>
                                {i === 0 && h.points > 0 && <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-yellow-400 text-yellow-900 text-[10px] font-black px-4 py-1 rounded-full shadow-md uppercase tracking-widest border-2 border-yellow-200 z-10">🥇 1st Place</div>}
                                <div className="text-4xl mb-3 drop-shadow-md">{h.icon}</div>
                                <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">{h.name}</p>
                                <p className="text-5xl font-display font-black" style={{ color: h.color }}>{h.points}</p>
                            </div>
                        ))}
                    </div>
                    <div className="bg-white p-6 md:p-10 rounded-3xl border-2 border-slate-100 shadow-sm">
                        <h2 className="text-2xl font-display font-black mb-8 text-scis-navy uppercase">📊 Live Standings</h2>
                        <div className="w-full h-72 flex items-end justify-around pt-10 pb-4 border-b-4 border-slate-200 relative">
                            <div className="absolute inset-0 flex flex-col justify-between pointer-events-none opacity-20 z-0">
                                <div className="w-full border-b-2 border-dashed border-slate-400"></div><div className="w-full border-b-2 border-dashed border-slate-400"></div><div className="w-full border-b-2 border-dashed border-slate-400"></div>
                            </div>
                            {data.map(house => (
                                <div key={house.name} className="flex flex-col items-center justify-end h-full flex-1 group z-10">
                                    <div className="w-12 sm:w-20 rounded-t-xl transition-all duration-1000" style={{ height: `${Math.max((house.points/maxPoints)*100, 5)}%`, backgroundColor: house.color }}>
                                        <div className="w-1/3 h-full bg-white/20"></div>
                                    </div>
                                    <span className="text-[10px] sm:text-xs font-black text-slate-500 uppercase tracking-widest mt-4">{house.name}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function LeaderboardTeacher({ user }) {
            const [month, setMonth] = useState('');
            const [ranks, setRanks] = useState({ first: [], second: [], third: [], fourth: [] });
            const toggleHouse = (place, hId) => {
                setRanks(prev => {
                    const newRanks = { first: [...prev.first], second: [...prev.second], third: [...prev.third], fourth: [...prev.fourth] };
                    if (newRanks[place].includes(hId)) newRanks[place] = newRanks[place].filter(id => id !== hId);
                    else { Object.keys(newRanks).forEach(p => newRanks[p] = newRanks[p].filter(id => id !== hId)); newRanks[place].push(hId); }
                    return newRanks;
                });
            };
            const isComplete = Object.values(ranks).flat().length === 4 && month.trim() !== '';
            const submit = async () => {
                const { db, collection, addDoc, Timestamp, appId } = window.FirebaseDB;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'rankings'), { teacherEmail: user.email, month, ranks, timestamp: Timestamp.now(), processed: false });
                setRanks({ first: [], second: [], third: [], fourth: [] }); setMonth(''); alert("Match results submitted!");
            };
            return (
                <div className="max-w-4xl mx-auto bg-white p-8 rounded-3xl border-2 border-slate-100 shadow-xl">
                    <h2 className="text-3xl font-display font-black text-scis-navy uppercase mb-6">Submit Rankings</h2>
                    <input type="text" value={month} onChange={e=>setMonth(e.target.value)} placeholder="Month (e.g. March)" className="w-full p-4 mb-6 bg-slate-50 border-2 rounded-xl focus:border-scis-navy font-black text-scis-navy" />
                    <div className="space-y-4 mb-8">
                        {['first', 'second', 'third', 'fourth'].map((p, i) => (
                            <div key={p} className="p-4 bg-slate-50 border-2 rounded-xl flex flex-col gap-3">

        function LeaderboardAdmin() {
            const [pending, setPending] = useState([]);
            useEffect(() => {
                const { db, collection, query, onSnapshot, appId } = window.FirebaseDB;
                const unsub = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'rankings')), snap => {
                    const list = []; snap.forEach(d => list.push({id: d.id, ...d.data()})); setPending(list.filter(x => !x.processed));
                });
                return () => unsub();
            }, []);
            const processPoints = async () => {
                if(!confirm("Process all pending points?")) return;
                const { db, doc, writeBatch, increment, appId } = window.FirebaseDB;
                const batch = writeBatch(db);
                const tally = { centaurs: 0, pegasus: 0, titans: 0, unicorns: 0 };
                pending.forEach(sub => {
                    (sub.ranks.first||[]).forEach(id => tally[id] += 10); (sub.ranks.second||[]).forEach(id => tally[id] += 7);
                    (sub.ranks.third||[]).forEach(id => tally[id] += 4); (sub.ranks.fourth||[]).forEach(id => tally[id] += 3);
                    batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'rankings', sub.id), {processed: true});
                });
                HOUSES.forEach(h => { if(tally[h.id] > 0) batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'houseTotals', h.id), {points: increment(tally[h.id])}, {merge:true}); });
                await batch.commit(); alert("Points Tallied!");
            };
            return (
                <div className="max-w-4xl mx-auto bg-white p-8 rounded-3xl border-2 border-slate-100 shadow-xl">
                    <h2 className="text-3xl font-display font-black text-scis-navy uppercase mb-6">Tally Pending ({pending.length})</h2>
                    <div className="space-y-4 mb-6">
                        {pending.map(p => (
                            <div key={p.id} className="p-4 bg-slate-50 border rounded-xl flex justify-between items-center">
                                <div><span className="font-bold text-scis-navy">{p.teacherEmail}</span> <span className="text-xs bg-white px-2 py-1 rounded shadow-sm ml-2">{p.month}</span></div>
                                <div className="text-xs text-yellow-600 font-black">1st: {(p.ranks.first||[]).join(', ')}</div>
                            </div>
                        ))}
                    </div>
                    <button onClick={processPoints} disabled={pending.length===0} className="w-full bg-scis-navy hover:bg-[#122859] text-scis-gold py-4 rounded-xl font-black uppercase text-lg disabled:opacity-50 btn-press">Execute Point Transfer</button>
                </div>
            );
        }

        function IncidentDashboard({ ars }) {
            const pending = ars.filter(a => a.status === 'pending' || !a.status);
            const handleAccept = async (ar) => {
                if(!confirm(`Approve ${ar.type} and deduct points?`)) return;
                const { db, doc, setDoc, updateDoc, increment, appId } = window.FirebaseDB;
                const deduction = ar.type === 'DR' ? 30 : 3;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'houseTotals', ar.house), {points: increment(-deduction)}, {merge:true});
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_reflections', ar.id), {status: 'approved'});
            };
            const handleDelete = async (id) => {
                if(!confirm("Permanently delete record?")) return;
                const { db, doc, deleteDoc, appId } = window.FirebaseDB;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'active_reflections', id));
            };

            return (
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 animate-in fade-in">
                    <div className="flex justify-between items-center mb-6">

                            </thead>

                                    <tr key={ar.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                        <td className="p-4 font-medium text-slate-500 text-xs whitespace-nowrap">{formatDateTime(ar.timestamp)}</td>

                                        <td className="p-4">
                                            <span className={`px-2 py-0.5 rounded text-[10px] font-black uppercase mr-2 ${ar.type==='DR'?'bg-red-100 text-red-700':'bg-blue-100 text-blue-700'}`}>{ar.type}</span>

                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

        function IncidentAnalytics({ ars }) {
            const [filterGrade, setFilterGrade] = useState('');
            const analyzedData = useMemo(() => {
                let filtered = filterGrade ? ars.filter(a=>a.grade===filterGrade) : ars;
                const students = {}; const reasons = {}; const subjects = {};
                filtered.forEach(ar => {
                    if (!students[ar.studentId]) students[ar.studentId] = { name: ar.studentName, grade: ar.grade, ars: 0, drs: 0, total: 0 };
                    if (ar.type === 'AR') students[ar.studentId].ars++; if (ar.type === 'DR') students[ar.studentId].drs++;
                    students[ar.studentId].total++;
                    const r = ar.reason === 'Other - Otro' ? 'Other' : (ar.reason || '').split(' - ')[0];
                    reasons[r] = (reasons[r] || 0) + 1;
                    if(ar.subject) subjects[ar.subject] = (subjects[ar.subject] || 0) + 1;
                });
                return {
                    offenders: Object.values(students).sort((a,b)=>b.total-a.total).slice(0,10),
                    topReasons: Object.entries(reasons).map(([name, count])=>({name, count})).sort((a,b)=>b.count-a.count).slice(0,5),
                    topSubjects: Object.entries(subjects).map(([name, count])=>({name, count})).sort((a,b)=>b.count-a.count).slice(0,5)
                };
            }, [ars, filterGrade]);

            const grades = [...new Set(ars.map(a => a.grade).filter(Boolean))].sort();

            return (
                <div className="space-y-6 animate-in fade-in">
                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                        <select value={filterGrade} onChange={e=>setFilterGrade(e.target.value)} className="p-3 bg-slate-50 border rounded-xl text-sm font-bold text-scis-navy outline-none">
                            <option value="">All Grades (Analytics)</option>
                            {grades.map(g => <option key={g} value={g}>{g}</option>)}
                        </select>
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border p-6">
                            <h3 className="font-display font-black text-xl text-scis-navy mb-4">Top Offenders</h3>
                            <table className="w-full text-left border-collapse text-sm">
                                <thead><tr className="border-b"><th className="p-3 text-xs text-slate-500 uppercase">Student</th><th className="p-3 text-xs text-center text-slate-500 uppercase">ARs</th><th className="p-3 text-xs text-center text-slate-500 uppercase">DRs</th></tr></thead>
                                <tbody>
                                    {analyzedData.offenders.map((s, i) => (
                                        <tr key={i} className="border-b hover:bg-slate-50">
                                            <td className="p-3"><span className="font-bold text-scis-navy">{s.name}</span> <span className="text-[10px] bg-slate-100 px-1.5 rounded">{s.grade}</span> {s.ars > 3 && <span className="text-[10px] text-red-600 bg-red-100 px-2 rounded-full font-black ml-2">⚠️ High</span>}</td>
                                            <td className="p-3 text-center font-bold text-slate-700">{s.ars}</td>
                                            <td className="p-3 text-center font-bold text-red-600">{s.drs}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <div className="space-y-6">
                            <div className="bg-white rounded-3xl p-6 shadow-sm border">
                                <h3 className="font-display font-black text-lg text-scis-navy mb-4">Top Reasons</h3>
                                <ul className="space-y-3">
                                    {analyzedData.topReasons.map((r, i) => <li key={i} className="flex justify-between p-3 bg-slate-50 rounded-xl text-sm"><span className="truncate text-slate-600 mr-2">{r.name}</span><span className="font-black text-scis-navy">{r.count}</span></li>)}
                                </ul>
                            </div>
                            <div className="bg-white rounded-3xl p-6 shadow-sm border">
                                <h3 className="font-display font-black text-lg text-scis-navy mb-4">Problem Subjects</h3>
                                <ul className="space-y-3">
                                    {analyzedData.topSubjects.map((s, i) => <li key={i} className="flex justify-between p-3 bg-slate-50 rounded-xl text-sm"><span className="truncate text-slate-600 mr-2">{s.name}</span><span className="font-black text-scis-navy">{s.count}</span></li>)}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function IncidentAdmin({ students, roles }) {
            const [newEmail, setNewEmail] = useState('');
            const addCoord = async (e) => {
                e.preventDefault(); if(!newEmail.includes('@')) return;
                const { db, doc, updateDoc, appId } = window.FirebaseDB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roles'), { coordinators: [...roles.coordinators, newEmail.toLowerCase().trim()] });
                setNewEmail(''); alert("Added");
            };
            const removeCoord = async (email) => {
                const { db, doc, updateDoc, appId } = window.FirebaseDB;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'roles'), { coordinators: roles.coordinators.filter(e => e !== email) });
            };
            return (
                <div className="space-y-6 max-w-4xl mx-auto animate-in fade-in">
                    <div className="bg-white rounded-3xl p-6 shadow-sm border">
                        <h3 className="font-display font-black text-xl text-scis-navy mb-4">Coordinators</h3>
                        <form onSubmit={addCoord} className="flex gap-2 mb-6"><input type="email" placeholder="Email..." value={newEmail} onChange={e=>setNewEmail(e.target.value)} required className="flex-1 p-3 bg-slate-50 border rounded-xl text-sm" /><button type="submit" className="bg-blue-600 text-white px-6 rounded-xl font-bold btn-press">Add</button></form>
                        <ul className="space-y-2">
                            {roles.coordinators.map(email => <li key={email} className="p-3 bg-slate-50 border rounded-xl text-sm font-medium flex justify-between">{email}<button onClick={()=>removeCoord(email)} className="text-red-500 font-bold text-xs hover:bg-red-50 px-2 rounded">Remove</button></li>)}
                        </ul>
                    </div>
                </div>
            );
        }

        // ==========================================
        // MODULE 3: ATTENDANCE KIOSK
        // ==========================================
        function AttendanceModule({ setGlobalView, userEmail, students, grades }) {
            const [localView, setLocalView] = useState('take');

            return (
                <div className="min-h-screen bg-[#0C1D40] relative z-0 animate-in fade-in">
                    <div className="fixed top-0 left-0 w-full h-full -z-10 bg-gradient-animate pointer-events-none"></div>
                    <nav className="glass-panel border-b border-white/20 px-4 md:px-8 py-3 sticky top-0 z-40 shadow-lg flex justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setGlobalView('hub')} className="bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-lg text-xs font-bold transition-colors shadow-sm">🏠 Back</button>
                            <div className="hidden sm:block text-white text-xl font-display font-black uppercase ml-2">📝 Kiosk</div>
                        </div>
                        <div className="flex bg-white/30 p-1 rounded-xl shadow-inner border border-white/50">
                            <button onClick={() => setLocalView('take')} className={`px-4 py-1.5 text-xs font-black uppercase rounded-lg transition-all ${localView === 'take' ? 'bg-scis-navy text-scis-gold shadow-md' : 'text-white hover:bg-white/40'}`}>Take</button>
                            <button onClick={() => setLocalView('history')} className={`px-4 py-1.5 text-xs font-black uppercase rounded-lg transition-all ${localView === 'history' ? 'bg-scis-navy text-scis-gold shadow-md' : 'text-white hover:bg-white/40'}`}>Log</button>
                        </div>
                    </nav>
                    <main className="max-w-7xl mx-auto p-4 sm:pt-8 pb-32 relative z-10">
                        {localView === 'take' && <AttendanceTaker userEmail={userEmail} students={students} grades={grades} />}
                        {localView === 'history' && <AttendanceHistory userEmail={userEmail} />}
                    </main>
                </div>
            );
        }

        function RadialMoodPicker({ currentMood, isOpen, onToggle, onSelect }) {
            const radius = 80;
            return (
                <div className="relative flex justify-center items-center h-16 w-16 z-20">
                    <div className={`text-5xl drop-shadow-lg cursor-pointer transition-transform duration-300 ${isOpen ? 'scale-125' : 'hover:scale-110'}`} onPointerDown={(e)=>{e.preventDefault();e.stopPropagation();onToggle();}}>{currentMood || '😐'}</div>
                    {isOpen && (
                        <div className="absolute top-1/2 left-1/2 w-0 h-0 z-50">
                            <div className="fixed inset-0 z-40" onPointerDown={(e)=>{e.preventDefault();e.stopPropagation();onToggle();}}></div>
                            {MOOD_OPTIONS.map((emoji, i) => {
                                const angle = (i * (360 / MOOD_OPTIONS.length) - 90) * (Math.PI / 180);
                                const x = Math.cos(angle) * radius; const y = Math.sin(angle) * radius;
                                return (
                                    <div key={emoji} className="absolute z-50 pointer-events-none" style={{ transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))` }}>
                                        <div onPointerDown={(e)=>{e.preventDefault();e.stopPropagation();onSelect(emoji);}} className="pointer-events-auto flex items-center justify-center w-14 h-14 bg-white/95 backdrop-blur-md rounded-full shadow-2xl text-3xl cursor-pointer hover:scale-125 transition-transform animate-pop border border-slate-200" style={{ animationDelay: `${i * 0.03}s`, animationFillMode: 'both' }}>{emoji}</div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        function AttendanceTaker({ userEmail, students, grades }) {
            const [selectedClass, setSelectedClass] = useState('');
            const [attendance, setAttendance] = useState({});
            const [moods, setMoods] = useState({});
            const [openMoodMenuId, setOpenMoodMenuId] = useState(null);
            const [animatingId, setAnimatingId] = useState(null);

            const currentStudents = useMemo(() => selectedClass ? students.filter(s => s.grade === selectedClass) : [], [selectedClass, students]);

            const cycleStudent = (id) => {
                setAnimatingId(id); setTimeout(() => setAnimatingId(null), 300);
                setAttendance(prev => {
                    const c = prev[id];
                    if (c === 'P') return { ...prev, [id]: 'L' }; if (c === 'L') return { ...prev, [id]: 'A' };
                    if (c === 'A') { const n = {...prev}; delete n[id]; return n; }
                    return { ...prev, [id]: 'P' };
                });
            };

            const submit = async () => {
                if (Object.keys(attendance).length !== currentStudents.length) return alert("Mark all students!");
                const { db, collection, addDoc, Timestamp, appId } = window.FirebaseDB;
                const records = currentStudents.map(s => ({ studentId: s.id, studentName: s.displayName, status: attendance[s.id], mood: moods[s.id] || '😐' }));
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), {
                    class: selectedClass, teacherEmail: userEmail, timestamp: Timestamp.now(), records,
                    presentCount: Object.values(attendance).filter(v=>v==='P').length, lateCount: Object.values(attendance).filter(v=>v==='L').length, absentCount: Object.values(attendance).filter(v=>v==='A').length
                });
                alert("Attendance Locked!"); setSelectedClass(''); setAttendance({}); setMoods({});
            };

            const missingCount = currentStudents.length - Object.keys(attendance).length;

            return (
                <div className="space-y-6">
                    <div className="glass-panel rounded-3xl p-6 shadow-xl flex flex-col md:flex-row justify-between gap-6 relative z-20">
                        <div><h2 className="text-3xl font-display font-black text-scis-navy uppercase drop-shadow-sm">Roster</h2><p className="text-slate-600 font-bold uppercase text-xs mt-1">Select mood & mark presence</p></div>
                        <div className="flex gap-4">
                            <select value={selectedClass} onChange={e=>{setSelectedClass(e.target.value); setAttendance({}); setMoods({});}} className="p-4 bg-white/90 border-2 border-white/50 rounded-2xl focus:ring-4 focus:ring-scis-gold font-black text-scis-navy text-xl shadow-lg cursor-pointer outline-none">
                                <option value="">-- Class --</option>
                                {grades.map(g => <option key={g} value={g}>{g}</option>)}
                            </select>
                            {selectedClass && <button onClick={()=>{const n={}; currentStudents.forEach(s=>n[s.id]='P'); setAttendance(n);}} className="bg-scis-navy text-scis-gold px-6 rounded-2xl font-black uppercase shadow-xl btn-press">All Present</button>}
                        </div>
                    </div>
                    {selectedClass && currentStudents.length > 0 && (
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-3 pb-24">
                            {currentStudents.map(s => {
                                const st = attendance[s.id]; const isAnim = animatingId === s.id; const isMenu = openMoodMenuId === s.id;
                                let style = "bg-white/80 text-scis-navy hover:bg-white border-b-slate-300"; let lbl = "Tap"; let icn = "";
                                if(st==='P'){ style = "bg-gradient-to-b from-green-400 to-green-500 border-b-green-700 text-white shadow-green-500/50"; lbl="PRESENT"; icn="✅"; }
                                else if(st==='L'){ style = "bg-gradient-to-b from-amber-400 to-amber-500 border-b-amber-700 text-white shadow-amber-500/50"; lbl="LATE"; icn="⏱️"; }
                                else if(st==='A'){ style = "bg-gradient-to-b from-red-400 to-red-500 border-b-red-700 text-white shadow-red-500/50"; lbl="ABSENT"; icn="❌"; }
                                return (
                                    <div key={s.id} onClick={()=>cycleStudent(s.id)} className={`relative flex flex-col items-center justify-center p-3 rounded-3xl border-2 border-b-[6px] shadow-xl backdrop-blur-md transition-all min-h-[130px] cursor-pointer select-none ${style} ${isAnim?'animate-press3d':''} ${isMenu?'z-50':'z-10'}`}>
                                        <RadialMoodPicker currentMood={moods[s.id]} isOpen={isMenu} onToggle={()=>setOpenMoodMenuId(isMenu?null:s.id)} onSelect={(e)=>{setMoods(p=>({...p,[s.id]:e}));setOpenMoodMenuId(null);}} />
                                        <span className="font-black text-xs text-center z-10 drop-shadow-sm mt-3 truncate w-full px-1">{s.displayName}</span>
                                        <div className="mt-auto pt-2 z-10"><span className={`text-[9px] font-black uppercase px-2 py-1 rounded-full shadow-inner ${st?'bg-black/20':'bg-slate-200 text-slate-500'}`}>{icn} {lbl}</span></div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                    {selectedClass && (
                        <div className="fixed bottom-0 left-0 right-0 p-4 bg-scis-navy/90 backdrop-blur-xl border-t border-white/20 z-[60] flex justify-between items-center">
                            <span className={`font-bold ${missingCount===0?'text-green-400':'text-scis-gold animate-pulse'}`}>{missingCount===0 ? '✅ Ready!' : `⚠️ ${missingCount} left`}</span>
                            <button onClick={submit} disabled={missingCount>0} className={`px-10 py-4 rounded-2xl font-black uppercase shadow-2xl transition-all btn-press ${missingCount===0?'bg-scis-gold text-scis-navy':'bg-white/10 text-white/30 cursor-not-allowed'}`}>Lock</button>
                        </div>
                    )}
                </div>
            );
        }

        function AttendanceHistory({ userEmail }) {
            const [logs, setLogs] = useState([]);
            const [selectedClass, setSelectedClass] = useState('');
            
            useEffect(() => {
                const { db, collection, query, where, onSnapshot, appId } = window.FirebaseDB;
                const unsub = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), where("teacherEmail", "==", userEmail)), snap => {
                    const list = []; snap.forEach(d => list.push({id: d.id, ...d.data()}));
                    setLogs(list.sort((a,b)=>(b.timestamp?.seconds||0)-(a.timestamp?.seconds||0)));
                });
                return () => unsub();
            }, [userEmail]);

            const teacherClasses = useMemo(() => [...new Set(logs.map(l => l.class))].sort(), [logs]);
            const filteredLogs = useMemo(() => selectedClass ? logs.filter(l => l.class === selectedClass) : logs, [logs, selectedClass]);

            const getMatrix = () => {
                const sorted = [...filteredLogs].sort((a,b)=>(a.timestamp?.seconds||0)-(b.timestamp?.seconds||0));
                const map = {};
                sorted.forEach((log, i) => {
                    (log.records||[]).forEach(r => {
                        if(!map[r.studentName]) map[r.studentName] = new Array(sorted.length).fill('-');
                        map[r.studentName][i] = r.status || '-';
                    });
                });
                return { sorted, students: Object.keys(map).sort(), map };
            };

            return (
                <div className="max-w-6xl mx-auto space-y-6 animate-in fade-in">
                    <div className="glass-panel rounded-3xl p-6 shadow-2xl border-t border-white/60">
                        <div className="flex justify-between items-center mb-8 border-b border-white/30 pb-6">
                            <h2 className="text-3xl font-display font-black text-scis-navy uppercase">My Log</h2>
                            <select value={selectedClass} onChange={e=>setSelectedClass(e.target.value)} className="p-3 bg-white/90 border-2 border-white/50 rounded-xl font-bold text-scis-navy outline-none">
                                <option value="">-- All Classes --</option>
                                {teacherClasses.map(c => <option key={c} value={c}>{c}</option>)}
                            </select>
                        </div>
                        
                        {!selectedClass ? (
                            <div className="overflow-x-auto bg-white/80 rounded-2xl shadow-inner border border-white">
                                <table className="w-full text-left text-sm border-collapse min-w-[600px]">
                                    <thead><tr className="bg-white/90 border-b-2"><th className="p-4 font-black text-slate-500 uppercase text-xs">Date</th><th className="p-4 font-black text-slate-500 uppercase text-xs">Class</th><th className="p-4 font-black text-center text-green-600 uppercase text-xs">P</th><th className="p-4 font-black text-center text-amber-600 uppercase text-xs">L</th><th className="p-4 font-black text-center text-red-600 uppercase text-xs">A</th></tr></thead>
                                    <tbody>
                                        {filteredLogs.map(l => (
                                            <tr key={l.id} className="border-b border-white hover:bg-white">
                                                <td className="p-4 font-bold text-slate-600 text-xs whitespace-nowrap">{formatDateTime(l.timestamp)}</td>
                                                <td className="p-4 font-black text-lg text-scis-navy">{l.class}</td>
                                                <td className="p-4 text-center font-black text-green-700 bg-green-50/50">{l.presentCount||0}</td>
                                                <td className="p-4 text-center font-black text-amber-700 bg-amber-50/50">{l.lateCount||0}</td>
                                                <td className="p-4 text-center font-black text-red-700 bg-red-50/50">{l.absentCount||0}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <div className="overflow-x-auto bg-white/90 rounded-2xl shadow-xl max-h-[600px] relative">
                                <table className="w-full text-left border-collapse text-sm">
                                    <thead className="sticky top-0 bg-white shadow-sm z-20">
                                        <tr>
                                            <th className="p-4 sticky left-0 bg-white border-r text-xs font-black uppercase text-scis-navy">Student</th>
                                            {getMatrix().sorted.map(log => <th key={log.id} className="p-4 text-center text-[10px] font-black uppercase text-slate-500 border-r min-w-[80px]">{log.timestamp ? new Date(log.timestamp.seconds*1000).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : ''}</th>)}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {getMatrix().students.map(sName => (
                                            <tr key={sName} className="hover:bg-slate-50">
                                                <td className="p-4 sticky left-0 bg-white/90 border-r font-bold text-xs truncate">{sName}</td>
                                                {getMatrix().map[sName].map((st, i) => (
                                                    <td key={i} className="p-2 text-center border-r"><span className={`inline-block w-6 h-6 rounded flex items-center justify-center font-black text-xs ${st==='P'?'bg-green-100 text-green-700':st==='L'?'bg-amber-100 text-amber-700':st==='A'?'bg-red-100 text-red-700':'text-slate-300'}`}>{st}</span></td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // MODULE 4: CALENDAR
        // ==========================================
        function CalendarModule({ setGlobalView, user, grades }) {
            const [tests, setTests] = useState([]);
            const [selectedGrade, setSelectedGrade] = useState('');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDayView, setSelectedDayView] = useState(null);
            const [formData, setFormData] = useState({ title: '', date: '', time: '', class: '', teacher: user?.email?.split('@')[0].toUpperCase() || '' });

            useEffect(() => {
                const { db, collection, query, onSnapshot, appId } = window.FirebaseDB;
                const unsub = onSnapshot(query(collection(db, 'artifacts', appId, 'public', 'data', 'scheduled_tests')), snap => {
                    const list = []; snap.forEach(d => list.push({id: d.id, ...d.data()})); setTests(list);
                });
                return () => unsub();
            }, []);

            useEffect(() => { if (selectedGrade) setFormData(p => ({ ...p, class: selectedGrade })); }, [selectedGrade]);

            const submit = async (e) => {
                e.preventDefault(); const { db, collection, addDoc, Timestamp, appId } = window.FirebaseDB;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'scheduled_tests'), { ...formData, teacherEmail: user.email, timestamp: Timestamp.now() });
                setFormData({...formData, title: '', time: ''}); alert("Test Scheduled!");
            };

            const handleDelete = async (id) => {
                if(!confirm("Remove test?")) return;
                const { db, doc, deleteDoc, appId } = window.FirebaseDB; await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'scheduled_tests', id));
            };

            const classTests = selectedGrade ? tests.filter(t => t.class === selectedGrade) : tests;
            const getTestsForDay = (dayStr) => classTests.filter(t => t.date === dayStr).sort((a,b)=>a.time.localeCompare(b.time));
            
            const year = currentDate.getFullYear(); const month = currentDate.getMonth();
            const daysInMonth = new Date(year, month + 1, 0).getDate(); const firstDay = new Date(year, month, 1).getDay();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            const dayViewTests = selectedDayView ? tests.filter(t => t.date === selectedDayView && (!selectedGrade || t.class === selectedGrade)).sort((a,b)=>a.time.localeCompare(b.time)) : [];

            return (
                <div className="min-h-screen bg-slate-50 animate-in fade-in">
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 md:px-8 py-3 sticky top-0 z-40 shadow-md flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <BackToHubBtn setGlobalView={setGlobalView} />
                            <div className="hidden sm:block text-white text-xl font-display font-black uppercase ml-2">📅 Schedule</div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        <div className="flex justify-between items-end mb-8">
                            <h2 className="text-3xl font-display font-black text-scis-navy uppercase">Testing Calendar</h2>
                            <select value={selectedGrade} onChange={e=>setSelectedGrade(e.target.value)} className="p-3 bg-white border-2 rounded-xl font-bold text-scis-navy outline-none">
                                <option value="">-- All Grades --</option>
                                {grades.map(g => <option key={g} value={g}>{g}</option>)}
                            </select>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 bg-white rounded-3xl p-6 shadow-sm border border-slate-200 flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <button onClick={()=>setCurrentDate(new Date(year, month-1, 1))} className="p-2 bg-slate-100 rounded-lg text-slate-600 font-bold">&larr;</button>
                                    <h3 className="font-display font-black text-xl text-scis-navy">{monthNames[month]} {year}</h3>
                                    <button onClick={()=>setCurrentDate(new Date(year, month+1, 1))} className="p-2 bg-slate-100 rounded-lg text-slate-600 font-bold">&rarr;</button>
                                </div>
                                <div className="calendar-grid rounded-xl overflow-hidden shadow-inner">
                                    {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d=><div key={d} className="bg-slate-50 p-2 text-center text-xs font-black text-slate-500 uppercase border-b">{d}</div>)}
                                    {Array.from({length:firstDay}).map((_,i)=><div key={`e-${i}`} className="bg-slate-50/50 min-h-[100px]"></div>)}
                                    {Array.from({length:daysInMonth}).map((_,i) => {
                                        const dayStr = `${year}-${String(month+1).padStart(2,'0')}-${String(i+1).padStart(2,'0')}`;
                                        const dTests = getTestsForDay(dayStr);
                                        let bg = "bg-white"; if(selectedGrade){ bg = dTests.length===1?'bg-green-50':dTests.length===2?'bg-amber-50':dTests.length>=3?'bg-red-50':'bg-white'; }
                                        return (
                                            <div key={i} onClick={()=>{setFormData(p=>({...p,date:dayStr})); if(dTests.length>0) setSelectedDayView(dayStr);}} className={`${bg} min-h-[100px] p-2 flex flex-col cursor-pointer hover:brightness-95 border-b border-r`}>
                                                <div className="flex justify-between font-bold text-sm text-slate-600 mb-1">{i+1} {dTests.length>0 && <span className="text-[10px] bg-white shadow-sm px-1.5 rounded">{dTests.length}</span>}</div>
                                                <div className="flex flex-col gap-1 overflow-hidden no-scrollbar">
                                                    {dTests.slice(0,3).map(t=><div key={t.id} className="text-[9px] bg-white border rounded p-1 leading-tight truncate"><span className="font-black text-scis-navy">{t.time}</span> {t.title}</div>)}
                                                    {dTests.length>3 && <div className="text-[9px] text-slate-400 font-bold">+ {dTests.length-3} more</div>}
                                                </div>
                                            </div>
                                        )
                                    })}
                                </div>
                            </div>

                            <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200 h-fit sticky top-24">
                                <h3 className="font-display font-black text-xl text-scis-navy mb-4">Add Test</h3>
                                <form onSubmit={submit} className="space-y-4">
                                    <select required value={formData.class} onChange={e=>setFormData({...formData, class: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-bold"><option value="">Class...</option>{grades.map(g => <option key={g} value={g}>{g}</option>)}</select>
                                    <input type="date" required value={formData.date} onChange={e=>setFormData({...formData, date: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-medium" />
                                    <div className="flex gap-2">
                                        <input type="time" required value={formData.time} onChange={e=>setFormData({...formData, time: e.target.value})} className="w-1/2 p-3 bg-slate-50 border rounded-xl font-medium" />
                                        <input type="text" required placeholder="Teacher" value={formData.teacher} onChange={e=>setFormData({...formData, teacher: e.target.value})} className="w-1/2 p-3 bg-slate-50 border rounded-xl font-medium" />
                                    </div>
                                    <input type="text" required placeholder="Subject / Title" value={formData.title} onChange={e=>setFormData({...formData, title: e.target.value})} className="w-full p-3 bg-slate-50 border rounded-xl font-medium" />
                                    <button type="submit" className="w-full bg-scis-navy text-scis-gold py-4 rounded-xl font-black uppercase shadow-md btn-press">Schedule</button>
                                </form>
                            </div>
                        </div>

                        {selectedDayView && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 animate-in fade-in" onClick={()=>setSelectedDayView(null)}>
                                <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl" onClick={e=>e.stopPropagation()}>
                                    <div className="p-6 border-b flex justify-between bg-slate-50 rounded-t-3xl"><h3 className="font-black text-xl">Tests on {selectedDayView}</h3><button onClick={()=>setSelectedDayView(null)} className="font-black">✕</button></div>
                                    <div className="p-6 max-h-[50vh] overflow-y-auto space-y-3">
                                        {dayViewTests.map(t => (
                                            <div key={t.id} className="p-4 border rounded-xl shadow-sm">
                                                <div className="font-black text-lg text-scis-navy flex justify-between"><span>{t.title}</span><span className="text-sm bg-slate-100 px-2 py-1 rounded">{t.time}</span></div>
                                                <div className="text-sm text-slate-500 mt-2 flex justify-between"><span>👤 {t.teacher}</span><span className="font-black text-purple-700 bg-purple-50 px-2 rounded">{t.class}</span></div>
                                                {(user.email === t.teacherEmail || isAdmin) && <button onClick={()=>handleDelete(t.id)} className="mt-3 text-xs text-red-500 font-bold w-full text-center hover:bg-red-50 py-2 rounded">Delete</button>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
