<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIS Assessment Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: {
                            navy: '#0C1D40',
                            gold: '#FFF86B',
                            grey: '#A8A6A5'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.2s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        .btn-press { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active:not(:disabled) { transform: scale(0.97); }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background-color: #e2e8f0;
            border: 1px solid #e2e8f0;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'scis-house-points';

            window.FirebaseDB = { auth, db, collection, onSnapshot, query, signInAnonymously, onAuthStateChanged, appId };
        } catch (error) {
            console.error("Firebase Initialization Error:", error);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function PublicCalendarApp({ grades }) {
            const [tests, setTests] = useState([]);
            const [selectedGrade, setSelectedGrade] = useState('');
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDayView, setSelectedDayView] = useState(null); 

            useEffect(() => {
                const { db, collection, query, onSnapshot, appId } = window.FirebaseDB;
                
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'scheduled_tests'));
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    setTests(list);
                });

                return () => unsubscribe();
            }, []);

            const classTests = useMemo(() => {
                return selectedGrade ? tests.filter(t => t.class === selectedGrade) : tests;
            }, [tests, selectedGrade]);

            // Calendar Logic
            const getDaysInMonth = (year, month) => new Date(year, month + 1, 0).getDate();
            const getFirstDayOfMonth = (year, month) => new Date(year, month, 1).getDay();

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            const changeMonth = (offset) => {
                setCurrentDate(new Date(year, month + offset, 1));
            };

            const getTestsForDay = (dayStr) => {
                return classTests.filter(t => t.date === dayStr).sort((a, b) => a.time.localeCompare(b.time));
            };

            const dayViewTests = selectedDayView ? getTestsForDay(selectedDayView) : [];

            return (
                <div className="max-w-5xl mx-auto px-4 py-8 animate-fade-in relative">
                    
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between md:items-end gap-4 mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                        <div>
                            <div className="flex items-center gap-3 mb-2">
                                <div className="bg-scis-gold text-scis-navy w-10 h-10 flex items-center justify-center rounded-xl shadow-inner text-xl">🎓</div>
                                <h2 className="text-2xl sm:text-3xl font-display font-black text-scis-navy uppercase tracking-tight">
                                    Student Portal
                                </h2>
                            </div>
                            <p className="text-slate-500 text-sm font-medium">Track your scheduled assessments and plan your study time.</p>
                        </div>
                        
                        <div className="flex flex-col gap-2 w-full md:w-auto">
                            <label className="font-bold text-slate-400 text-[10px] uppercase tracking-widest">Select your grade:</label>
                            <select 
                                value={selectedGrade} 
                                onChange={e => setSelectedGrade(e.target.value)}
                                className="p-3 bg-slate-50 border-2 border-slate-200 rounded-xl focus:border-scis-navy outline-none font-bold text-scis-navy shadow-sm min-w-[200px] w-full"
                            >
                                <option value="">-- View All Grades --</option>
                                {grades.map(g => <option key={g} value={g}>{g}</option>)}
                            </select>
                        </div>
                    </div>

                    {/* CALENDAR VIEW */}
                    <div className="bg-white rounded-3xl p-4 sm:p-6 shadow-sm border border-slate-200 flex flex-col">
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => changeMonth(-1)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <h3 className="font-display font-black text-xl sm:text-2xl text-scis-navy uppercase tracking-wide">{monthNames[month]} {year}</h3>
                            <button onClick={() => changeMonth(1)} className="p-2 hover:bg-slate-100 rounded-lg text-slate-500 transition-colors">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </div>

                        <div className="calendar-grid flex-1 rounded-xl overflow-hidden shadow-inner">
                            {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                                <div key={day} className="bg-slate-50 p-2 text-center text-[10px] sm:text-xs font-black text-slate-500 uppercase tracking-widest border-b border-slate-200">
                                    <span className="hidden sm:inline">{day}</span>
                                    <span className="sm:hidden">{day.charAt(0)}</span>
                                </div>
                            ))}
                            
                            {Array.from({ length: firstDay }).map((_, i) => (
                                <div key={`empty-${i}`} className="bg-slate-50/50 min-h-[80px] sm:min-h-[140px]"></div>
                            ))}

                            {Array.from({ length: daysInMonth }).map((_, i) => {
                                const dayNum = i + 1;
                                const dayStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
                                const dayTests = getTestsForDay(dayStr);
                                
                                let bgClass = "bg-white";
                                let headerClass = "text-slate-600";
                                
                                if (selectedGrade) {
                                    if (dayTests.length === 1) bgClass = "bg-green-50";
                                    else if (dayTests.length === 2) bgClass = "bg-amber-50";
                                    else if (dayTests.length >= 3) { bgClass = "bg-red-50"; headerClass = "text-red-700 font-black"; }
                                }

                                return (
                                    <div 
                                        key={dayNum} 
                                        className={`${bgClass} min-h-[80px] sm:min-h-[140px] p-1.5 sm:p-2 flex flex-col transition-colors ${dayTests.length > 0 ? 'cursor-pointer hover:brightness-95 active:brightness-90' : ''}`} 
                                        onClick={() => {
                                            if (dayTests.length > 0) setSelectedDayView(dayStr);
                                        }}
                                    >
                                        <div className="flex justify-between items-center mb-1">
                                            <span className={`text-sm font-bold ${headerClass}`}>{dayNum}</span>
                                            {dayTests.length > 0 && <span className="text-[9px] font-black bg-white px-1.5 py-0.5 rounded shadow-sm text-slate-500 border border-slate-100">{dayTests.length}</span>}
                                        </div>
                                        
                                        <div className="flex flex-col gap-1 overflow-hidden sm:overflow-y-auto max-h-[120px] no-scrollbar">
                                            {dayTests.map(test => (
                                                <div key={test.id} className="hidden sm:block text-[10px] sm:text-xs leading-tight p-2 rounded-md border shadow-sm bg-white border-slate-200">
                                                    <div className="font-bold text-scis-navy truncate mb-0.5">{test.time} - {test.title}</div>
                                                    <div className="text-slate-500 text-[10px] truncate flex justify-between">
                                                        <span>{test.teacher}</span>
                                                        {!selectedGrade && <span className="font-black text-scis-navy">{test.class}</span>}
                                                    </div>
                                                </div>
                                            ))}
                                            {/* Mobile indicator */}
                                            <div className="sm:hidden w-full text-center mt-1">
                                                {dayTests.length > 0 && <span className="text-[9px] font-black text-scis-navy bg-white/90 px-2 py-1 rounded-md shadow-sm border border-slate-200/50 block truncate">Tap to view {dayTests.length}</span>}
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="mt-6 flex gap-4 text-[10px] sm:text-xs font-bold text-slate-500 uppercase tracking-widest justify-center flex-wrap bg-slate-50 p-3 rounded-xl border border-slate-200">
                            <span className="mr-2 text-slate-400 hidden sm:inline">Load Indicator:</span>
                            <div className="flex items-center gap-1"><div className="w-3 h-3 bg-green-100 rounded border border-green-200"></div> Light</div>
                            <div className="flex items-center gap-1"><div className="w-3 h-3 bg-amber-100 rounded border border-amber-200"></div> Moderate</div>
                            <div className="flex items-center gap-1"><div className="w-3 h-3 bg-red-100 rounded border border-red-200"></div> Heavy (3+)</div>
                        </div>
                    </div>

                    {/* DAY DETAILS MODAL */}
                    {selectedDayView && (
                        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-scis-navy/60 backdrop-blur-sm p-4 animate-fade-in" onClick={() => setSelectedDayView(null)}>
                            <div className="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl animate-slide-up" onClick={e => e.stopPropagation()}>
                                <div className="bg-slate-50 p-6 border-b flex justify-between items-center">
                                    <div>
                                        <h3 className="font-display font-black text-xl text-scis-navy leading-tight">Assessments</h3>
                                        <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">
                                            {new Date(selectedDayView + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
                                        </p>
                                    </div>
                                    <button onClick={() => setSelectedDayView(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-slate-200 text-slate-500 hover:bg-slate-300 transition-colors font-bold">✕</button>
                                </div>
                                
                                <div className="p-6 max-h-[60vh] overflow-y-auto space-y-3 bg-slate-50/50">
                                    {dayViewTests.map(test => (
                                        <div key={test.id} className="p-4 rounded-xl border shadow-sm bg-white border-slate-200 relative">
                                            <div className="flex justify-between items-start mb-2">
                                                <div className="font-black text-scis-navy text-lg leading-tight pr-4">{test.title}</div>
                                                <span className="bg-scis-navy text-scis-gold px-2 py-1 rounded-lg text-xs font-black shadow-sm whitespace-nowrap">{test.time}</span>
                                            </div>
                                            <div className="text-slate-500 text-sm font-medium flex justify-between items-center mt-3 pt-3 border-t border-slate-100">
                                                <span className="flex items-center gap-1">👨‍🏫 {test.teacher}</span>
                                                <span className="font-black text-slate-600 bg-slate-100 px-2 py-0.5 rounded border border-slate-200">{test.class}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-4 bg-white border-t">
                                    <button onClick={() => setSelectedDayView(null)} className="w-full py-3 rounded-xl font-black text-sm text-white bg-scis-navy hover:bg-[#122859] shadow-md btn-press">Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function App() {
            if (!window.FirebaseDB) return <div className="p-10 text-center font-display font-black text-xl text-scis-navy">Connecting to SCIS...</div>;

            const [authLoaded, setAuthLoaded] = useState(false);
            const [grades, setGrades] = useState([]);

            useEffect(() => {
                const { auth, db, collection, query, onSnapshot, appId, signInAnonymously, onAuthStateChanged } = window.FirebaseDB;
                
                // Sign in anonymously to allow read access if Firestore rules require auth
                signInAnonymously(auth).catch(e => console.error("Anonymous auth failed:", e));

                const unsubscribeAuth = onAuthStateChanged(auth, () => {
                    setAuthLoaded(true);
                });

                // Fetch Grades
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                const unsubscribeStudents = onSnapshot(q, (snapshot) => {
                    const gradeSet = new Set();
                    snapshot.forEach(doc => {
                        let g = doc.data().grade;
                        if (g) {
                            gradeSet.add(g.replace(/s1/gi, 'sA').replace(/s2/gi, 'sB').toUpperCase());
                        }
                    });
                    setGrades([...gradeSet].sort());
                });

                return () => {
                    unsubscribeAuth();
                    unsubscribeStudents();
                };
            }, []);

            if (!authLoaded) return <div className="flex h-screen items-center justify-center font-display font-black text-xl text-scis-navy animate-pulse">Loading Calendar...</div>;

            return (
                <div className="min-h-screen">
                    <nav className="bg-scis-navy border-b-4 border-scis-gold px-4 py-3 sticky top-0 z-40 shadow-md">
                        <div className="max-w-5xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <img src="GriffinSM.png" alt="SCIS Logo" className="w-8 h-8 object-contain hidden sm:block" onError={(e) => e.target.style.display='none'} />
                                <h1 className="text-lg sm:text-xl font-display font-black text-white tracking-widest uppercase leading-none">
                                    SCIS <span className="text-scis-gold">Calendar</span>
                                </h1>
                            </div>
                            <div className="text-xs font-bold text-slate-300 uppercase tracking-widest">
                                Read Only
                            </div>
                        </div>
                    </nav>

                    <main>
                        <PublicCalendarApp grades={grades} />
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
