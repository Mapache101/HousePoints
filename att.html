<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SCIS Attendance Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        scis: { navy: '#0C1D40', gold: '#FFF86B', grey: '#A8A6A5' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pop': 'pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'press3d': 'press3d 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                        'flash': 'flash 0.4s ease-out forwards',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(40px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        pop: {
                            '0%': { transform: 'scale(0.5)', opacity: '0' },
                            '80%': { transform: 'scale(1.1)', opacity: '1' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        },
                        press3d: {
                            '0%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(0.92)' },
                            '100%': { transform: 'scale(1)' },
                        },
                        flash: {
                            '0%': { opacity: '0.6' },
                            '100%': { opacity: '0' },
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0C1D40; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        h1, h2, h3, .font-display { font-family: 'Outfit', sans-serif; }
        
        /* Smooth interactions for touch */
        .btn-press { transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-press:active:not(:disabled) { transform: scale(0.92); }
        
        /* Hide scrollbars for cleaner kiosk look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        /* Cool smooth color degrade background */
        .bg-gradient-animate {
            background: linear-gradient(-45deg, #0C1D40, #132a54, #081226, #1b3a6e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithPopup, OAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDyFV6WAZhpr4leljJOQozPzEWlNaU-heQ",
            authDomain: "scis-house-points.firebaseapp.com",
            projectId: "scis-house-points",
            storageBucket: "scis-house-points.firebasestorage.app",
            messagingSenderId: "929403398815",
            appId: "1:929403398815:web:c6634925bfac5b665650aa"
        };
        
        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'scis-house-points';

            window.FirebaseDB = { auth, db, collection, addDoc, onSnapshot, query, where, Timestamp, signInWithCustomToken, signInAnonymously, onAuthStateChanged, signInWithPopup, OAuthProvider, signOut, appId };
        } catch (error) {
            console.error("Firebase Initialization Error:", error);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONSTANTS ---
        const SCHEDULE = [
            { day: 1, start: '08:00', end: '09:30', class: '1sA' },
            { day: 1, start: '09:45', end: '11:15', class: '2sB' },
            { day: 2, start: '08:00', end: '09:30', class: '3sA' },
        ];

        const MOOD_OPTIONS = ['😐', '🤔', '🥰', '😄', '🙄', '🕵️', '🤯'];

        // --- RADIAL MOOD PICKER COMPONENT ---
        function RadialMoodPicker({ currentMood, isOpen, onToggle, onSelect }) {
            const radius = 80;

            return (
                <div className="relative flex justify-center items-center h-16 w-16 z-20">
                    <div 
                        className={`text-5xl drop-shadow-lg cursor-pointer transition-transform duration-300 ${isOpen ? 'scale-125' : 'hover:scale-110'}`}
                        onPointerDown={(e) => { 
                            e.preventDefault(); 
                            e.stopPropagation(); 
                            onToggle(); 
                        }}
                        onClick={(e) => e.stopPropagation()} 
                    >
                        {currentMood || '😐'}
                    </div>
                    
                    {isOpen && (
                        <div className="absolute top-1/2 left-1/2 w-0 h-0 z-50">
                            <div 
                                className="fixed inset-0 z-40 cursor-default" 
                                onPointerDown={(e) => { 
                                    e.preventDefault();
                                    e.stopPropagation(); 
                                    onToggle(); 
                                }}
                                onClick={(e) => e.stopPropagation()}
                            ></div>
                            
                            {MOOD_OPTIONS.map((emoji, i) => {
                                const angle = (i * (360 / MOOD_OPTIONS.length) - 90) * (Math.PI / 180);
                                const x = Math.cos(angle) * radius;
                                const y = Math.sin(angle) * radius;
                                
                                return (
                                    <div 
                                        key={emoji}
                                        className="absolute z-50 pointer-events-none"
                                        style={{ transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))` }}
                                    >
                                        <div
                                            onPointerDown={(e) => { 
                                                e.preventDefault();
                                                e.stopPropagation(); 
                                                onSelect(emoji); 
                                            }}
                                            onClick={(e) => e.stopPropagation()}
                                            className="pointer-events-auto flex items-center justify-center w-14 h-14 bg-white/95 backdrop-blur-md rounded-full shadow-2xl text-3xl cursor-pointer hover:scale-125 transition-transform animate-pop border border-slate-200"
                                            style={{ 
                                                animationDelay: `${i * 0.03}s`,
                                                animationFillMode: 'both' 
                                            }}
                                        >
                                            {emoji}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
            );
        }

        // --- ATTENDANCE KIOSK ---
        function AttendanceTaker({ userEmail, students }) {
            const [selectedClass, setSelectedClass] = useState('');
            const [attendance, setAttendance] = useState({}); 
            const [moods, setMoods] = useState({}); 
            const [openMoodMenuId, setOpenMoodMenuId] = useState(null);
            const [animatingId, setAnimatingId] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false); 
            
            const GRADES = useMemo(() => {
                const grades = new Set(students.map(s => s.grade).filter(Boolean));
                return [...grades].sort();
            }, [students]);

            useEffect(() => {
                const now = new Date();
                const day = now.getDay();
                const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                const currentBlock = SCHEDULE.find(s => s.day === day && timeStr >= s.start && timeStr <= s.end);
                if (currentBlock && !selectedClass) {
                    setSelectedClass(currentBlock.class);
                }
            }, []);

            const currentStudents = useMemo(() => {
                if (!selectedClass) return [];
                return students.filter(s => s.grade === selectedClass);
            }, [selectedClass, students]);

            useEffect(() => {
                setAttendance({});
                setMoods({});
                setOpenMoodMenuId(null);
            }, [selectedClass]);

            const markAllPresent = () => {
                const newAtt = {};
                currentStudents.forEach(s => newAtt[s.id] = 'P');
                setAttendance(newAtt);
            };

            const cycleStudent = (id) => {
                setAnimatingId(id);
                setTimeout(() => setAnimatingId(null), 400); 

                setAttendance(prev => {
                    const current = prev[id];
                    if (current === 'P') return { ...prev, [id]: 'L' };
                    if (current === 'L') return { ...prev, [id]: 'A' };
                    if (current === 'A') {
                        const next = {...prev};
                        delete next[id];
                        return next;
                    }
                    return { ...prev, [id]: 'P' };
                });
            };

            const handleSubmit = async () => {
                if (Object.keys(attendance).length !== currentStudents.length) {
                    return alert("Please ensure every student is marked (Present, Late, or Absent) before submitting.");
                }

                setIsSubmitting(true);
                try {
                    const { db, collection, addDoc, Timestamp, appId } = window.FirebaseDB;
                    
                    const recordsToSave = currentStudents.map(s => ({
                        studentId: s.id,
                        studentName: s.displayName,
                        status: attendance[s.id],
                        mood: moods[s.id] || '😐'
                    }));

                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), {
                        class: selectedClass,
                        teacherEmail: userEmail || "teacher@scis-bo.com",
                        timestamp: Timestamp.now(),
                        records: recordsToSave,
                        presentCount: Object.values(attendance).filter(v => v === 'P').length,
                        lateCount: Object.values(attendance).filter(v => v === 'L').length,
                        absentCount: Object.values(attendance).filter(v => v === 'A').length
                    });
                    
                    alert("✨ Attendance locked and saved! Great job.");
                    setSelectedClass('');
                    setAttendance({});
                    setMoods({});
                } catch (error) {
                    console.error("Error saving attendance:", error);
                    alert("Failed to submit attendance.");
                }
                setIsSubmitting(false);
            };

            const missingCount = currentStudents.length - Object.keys(attendance).length;

            return (
                <div className="max-w-7xl mx-auto px-4 py-6 space-y-6">
                    <div className="glass-panel rounded-3xl p-6 shadow-xl flex flex-col md:flex-row md:items-center justify-between gap-6 animate-fade-in z-20 relative">
                        <div>
                            <h2 className="text-3xl md:text-4xl font-display font-black text-scis-navy uppercase tracking-tight drop-shadow-sm">Class Roster</h2>
                            <p className="text-slate-600 font-bold uppercase tracking-widest text-xs mt-1">Select your mood & mark presence</p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-4 items-center w-full md:w-auto">
                            <select 
                                value={selectedClass} 
                                onChange={e => setSelectedClass(e.target.value)}
                                className="w-full sm:w-auto p-4 bg-white/90 border-2 border-white/50 rounded-2xl focus:outline-none focus:ring-4 focus:ring-scis-gold font-black text-scis-navy text-xl appearance-none shadow-lg cursor-pointer transition-all hover:bg-white"
                            >
                                <option value="">-- Select Class --</option>
                                {GRADES.map(g => <option key={g} value={g}>{g}</option>)}
                            </select>
                            
                            {selectedClass && currentStudents.length > 0 && (
                                <button 
                                    onClick={markAllPresent}
                                    className="w-full sm:w-auto bg-scis-navy text-scis-gold px-6 py-4 rounded-2xl font-black uppercase tracking-widest shadow-xl hover:bg-[#122859] btn-press border border-scis-gold/30"
                                >
                                    Mark All Present
                                </button>
                            )}
                        </div>
                    </div>

                    {selectedClass && currentStudents.length > 0 && (
                        <div className="animate-slide-up relative">
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 sm:gap-4 mb-8">
                                {currentStudents.map(student => {
                                    const status = attendance[student.id];
                                    const isAnimating = animatingId === student.id;
                                    const isMenuOpen = openMoodMenuId === student.id;
                                    
                                    let cardStyle = "bg-white/80 border-white text-scis-navy hover:bg-white border-b-slate-300";
                                    let statusLabel = "Tap to Mark";
                                    let statusIcon = "";
                                    
                                    if (status === 'P') {
                                        cardStyle = "bg-gradient-to-b from-green-400 to-green-500 border-green-300 border-b-green-700 text-white shadow-green-500/50";
                                        statusLabel = "PRESENT";
                                        statusIcon = "✅";
                                    } else if (status === 'L') {
                                        cardStyle = "bg-gradient-to-b from-amber-400 to-amber-500 border-amber-300 border-b-amber-700 text-white shadow-amber-500/50";
                                        statusLabel = "LATE";
                                        statusIcon = "⏱️";
                                    } else if (status === 'A') {
                                        cardStyle = "bg-gradient-to-b from-red-400 to-red-500 border-red-300 border-b-red-700 text-white shadow-red-500/50";
                                        statusLabel = "ABSENT";
                                        statusIcon = "❌";
                                    }

                                    return (
                                        <div 
                                            key={student.id}
                                            onClick={() => cycleStudent(student.id)}
                                            className={`
                                                relative flex flex-col items-center justify-center p-3 sm:p-4 rounded-3xl border-2 border-b-[6px] shadow-xl backdrop-blur-md
                                                transition-all duration-150 min-h-[130px] active:border-b-2 active:translate-y-[4px] select-none cursor-pointer
                                                ${cardStyle}
                                                ${isAnimating ? 'animate-press3d' : ''}
                                                ${isMenuOpen ? 'z-50' : 'z-10'}
                                            `}
                                        >
                                            {isAnimating && <div className="absolute inset-0 bg-white animate-flash rounded-3xl pointer-events-none z-0"></div>}
                                            <div className="absolute top-0 left-0 w-full h-1/3 bg-white/30 rounded-t-[1.3rem] pointer-events-none"></div>

                                            <RadialMoodPicker 
                                                currentMood={moods[student.id]}
                                                isOpen={isMenuOpen}
                                                onToggle={() => setOpenMoodMenuId(isMenuOpen ? null : student.id)}
                                                onSelect={(emoji) => {
                                                    setMoods(prev => ({...prev, [student.id]: emoji}));
                                                    setOpenMoodMenuId(null);
                                                }}
                                            />

                                            <span className="font-black text-xs sm:text-sm leading-tight text-center truncate w-full px-1 z-10 drop-shadow-sm mt-3">{student.displayName}</span>
                                            
                                            <div className="mt-auto pt-2 z-10">
                                                <span className={`text-[9px] font-black uppercase tracking-widest px-2.5 py-1 rounded-full shadow-inner ${status ? 'bg-black/20 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                                    {statusIcon} {statusLabel}
                                                </span>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            <div className="fixed bottom-0 left-0 right-0 p-4 md:p-6 bg-scis-navy/80 backdrop-blur-xl border-t border-white/10 z-[60] flex flex-col sm:flex-row items-center justify-between gap-4">
                                <div className="text-white font-bold">
                                    {missingCount > 0 ? (
                                        <span className="text-scis-gold animate-pulse flex items-center gap-2">⚠️ {missingCount} student(s) still need to tap.</span>
                                    ) : (
                                        <span className="text-green-400 flex items-center gap-2">✅ All students accounted for!</span>
                                    )}
                                </div>
                                <button 
                                    onClick={handleSubmit}
                                    disabled={isSubmitting || missingCount > 0}
                                    className={`w-full sm:w-auto px-10 py-4 rounded-2xl font-display font-black text-xl tracking-widest uppercase shadow-2xl transition-all btn-press ${missingCount === 0 ? 'bg-scis-gold text-scis-navy hover:scale-105' : 'bg-white/10 text-white/30 cursor-not-allowed'}`}
                                >
                                    {isSubmitting ? 'Locking...' : 'Lock Attendance'}
                                </button>
                            </div>
                            <div className="h-24"></div> 
                        </div>
                    )}
                    
                    {selectedClass && currentStudents.length === 0 && (
                        <div className="text-center py-20 glass-panel rounded-3xl border border-dashed border-white/50 z-10 relative">
                            <p className="text-scis-navy font-black text-xl">No students found for {selectedClass}.</p>
                        </div>
                    )}
                </div>
            );
        }

        // --- PERSONAL ATTENDANCE HISTORY & CLASS INSIGHTS ---
        function AttendanceHistory({ userEmail }) {
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedClass, setSelectedClass] = useState('');

            useEffect(() => {
                const { db, collection, query, where, onSnapshot, appId } = window.FirebaseDB;
                
                // ONLY fetch records belonging to the logged in teacher!
                const q = query(
                    collection(db, 'artifacts', appId, 'public', 'data', 'attendance'),
                    where("teacherEmail", "==", userEmail)
                );
                
                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                    // Sort descending for chronological order 
                    list.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    setLogs(list);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [userEmail]);

            // Unique classes this teacher has logs for
            const teacherClasses = useMemo(() => {
                return [...new Set(logs.map(l => l.class))].sort();
            }, [logs]);

            // Filter logs based on selection
            const filteredLogs = useMemo(() => {
                if (!selectedClass) return logs;
                return logs.filter(l => l.class === selectedClass);
            }, [logs, selectedClass]);

            // Compute Emoji/Mood Statistics for the selected view
            const moodStats = useMemo(() => {
                const counts = {};
                MOOD_OPTIONS.forEach(m => counts[m] = 0);
                
                filteredLogs.forEach(log => {
                    if (log.records) {
                        log.records.forEach(rec => {
                            if (rec.mood && counts[rec.mood] !== undefined) {
                                counts[rec.mood]++;
                            }
                        });
                    }
                });
                return counts;
            }, [filteredLogs]);

            // Matrix generation functions
            const getChronologicalLogs = () => [...filteredLogs].sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
            
            const getStudentMatrix = () => {
                const sortedLogs = getChronologicalLogs();
                const studentMap = {}; 
                
                sortedLogs.forEach((log, logIndex) => {
                    if (log.records && Array.isArray(log.records)) {
                        log.records.forEach(rec => {
                            const studentName = rec.studentName || 'Unknown';
                            if (!studentMap[studentName]) {
                                studentMap[studentName] = new Array(sortedLogs.length).fill('-');
                            }
                            studentMap[studentName][logIndex] = rec.status || '-';
                        });
                    }
                });

                return {
                    sortedLogs,
                    students: Object.keys(studentMap).sort((a, b) => a.localeCompare(b)),
                    studentMap
                };
            };

            const handleExportCSV = () => {
                if (filteredLogs.length === 0) return alert("No logs to export.");
                
                const { sortedLogs, students, studentMap } = getStudentMatrix();
                
                const headers = ["Student Name", "Class"];
                sortedLogs.forEach(log => {
                    const dateObj = log.timestamp ? new Date(log.timestamp.seconds * 1000) : null;
                    const dateStr = dateObj ? `${String(dateObj.getDate()).padStart(2, '0')}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${dateObj.getFullYear()}` : '';
                    const timeStr = dateObj ? `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}` : '';
                    headers.push(`"${dateStr} ${timeStr}"`); 
                });

                const rows = students.map(studentName => {
                    const escapedName = `"${studentName.replace(/"/g, '""')}"`;
                    // If 'All Classes' is selected, state the class for context, otherwise use selectedClass
                    const classToDisplay = selectedClass ? selectedClass : "Mixed";
                    const escapedClass = `"${classToDisplay}"`;
                    return [escapedName, escapedClass, ...studentMap[studentName]].join(',');
                });

                const csvContent = [headers.join(','), ...rows].join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                const url = URL.createObjectURL(blob);
                link.setAttribute("href", url);
                link.setAttribute("download", `SCIS_Attendance_${selectedClass || 'All'}_${new Date().toISOString().split('T')[0]}.csv`);
                link.style.visibility = 'hidden';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const formatDate = (ts) => {
                if (!ts) return '';
                const d = new Date(ts.seconds * 1000);
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }) + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            };

            const maxMoodCount = Math.max(...Object.values(moodStats), 1);

            return (
                <div className="max-w-6xl mx-auto px-4 space-y-6 animate-fade-in z-10 relative">
                    <div className="glass-panel rounded-3xl p-6 md:p-10 shadow-2xl border-t border-white/60">
                        
                        {/* Header & Controls */}
                        <div className="flex flex-col md:flex-row justify-between md:items-end gap-6 mb-8 border-b border-white/30 pb-6">
                            <div>
                                <h2 className="text-3xl font-display font-black text-scis-navy uppercase tracking-tight drop-shadow-sm">My Log & Insights</h2>
                                <p className="text-slate-600 font-bold uppercase tracking-widest text-xs mt-1">Logged in as: {userEmail}</p>
                            </div>
                            
                            <div className="flex flex-col sm:flex-row gap-4 items-center w-full md:w-auto">
                                <select 
                                    value={selectedClass} 
                                    onChange={e => setSelectedClass(e.target.value)}
                                    className="w-full sm:w-auto p-3 bg-white/90 border-2 border-white/50 rounded-xl focus:outline-none focus:ring-2 focus:ring-scis-gold font-bold text-scis-navy appearance-none shadow-sm cursor-pointer"
                                >
                                    <option value="">-- All My Classes --</option>
                                    {teacherClasses.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>

                                <button 
                                    onClick={handleExportCSV}
                                    disabled={filteredLogs.length === 0}
                                    className="w-full sm:w-auto bg-green-500 hover:bg-green-600 text-white px-5 py-3 rounded-xl font-black text-sm shadow-md transition-all btn-press flex items-center justify-center gap-2 border border-green-400 disabled:opacity-50 disabled:cursor-not-allowed"
                                >
                                    <span>📥</span> Export View
                                </button>
                            </div>
                        </div>

                        {loading ? (
                            <div className="p-10 text-center text-scis-navy font-black text-xl animate-pulse">Loading your records...</div>
                        ) : logs.length === 0 ? (
                            <div className="text-center py-16 bg-white/50 rounded-3xl border-2 border-dashed border-white/50">
                                <p className="text-slate-500 font-black text-xl">You have not submitted any attendance logs yet.</p>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-slide-up">
                                
                                {/* MOOD ANALYTICS */}
                                {selectedClass && (
                                    <div className="bg-white/80 rounded-2xl p-6 shadow-inner border border-white">
                                        <h3 className="font-display font-black text-lg text-scis-navy mb-4 uppercase tracking-wider">Class Mood Trends</h3>
                                        <div className="flex justify-between items-end gap-2 sm:gap-4 h-32">
                                            {MOOD_OPTIONS.map(mood => {
                                                const count = moodStats[mood];
                                                const pct = Math.max((count / maxMoodCount) * 100, 8); // Minimum 8% height so bar is visible
                                                return (
                                                    <div key={mood} className="flex flex-col items-center flex-1 group">
                                                        <div className="font-bold text-xs text-scis-navy mb-1 opacity-0 group-hover:opacity-100 transition-opacity">{count}</div>
                                                        <div className="w-full max-w-[40px] bg-slate-200 rounded-t-lg h-full flex items-end relative overflow-hidden">
                                                            <div 
                                                                className="w-full bg-gradient-to-t from-scis-navy to-blue-500 rounded-t-lg transition-all duration-1000" 
                                                                style={{ height: `${pct}%` }}
                                                            ></div>
                                                        </div>
                                                        <div className="text-2xl sm:text-3xl mt-2 drop-shadow-sm group-hover:scale-110 transition-transform">{mood}</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                {/* CONDITIONAL VIEW: List (All) OR Matrix (Specific Class) */}
                                {!selectedClass ? (
                                    <div className="overflow-x-auto bg-white/80 rounded-2xl shadow-inner border border-white">
                                        <table className="w-full text-left border-collapse min-w-[700px]">
                                            <thead>
                                                <tr className="bg-white/90 border-b-2 border-slate-100">
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Date / Time</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest">Class</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest text-center">Present</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest text-center">Late</th>
                                                    <th className="p-4 text-xs font-black text-slate-500 uppercase tracking-widest text-center">Absent</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm">
                                                {filteredLogs.map(log => (
                                                    <tr key={log.id} className="border-b border-white hover:bg-white transition-colors">
                                                        <td className="p-4 whitespace-nowrap text-slate-600 font-bold text-xs">{formatDate(log.timestamp)}</td>
                                                        <td className="p-4 font-black text-lg text-scis-navy">{log.class}</td>
                                                        <td className="p-4 text-center">
                                                            <span className="bg-green-100 text-green-700 px-3 py-1 rounded-lg font-black shadow-sm border border-green-200">{log.presentCount || 0}</span>
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            {log.lateCount > 0 ? (
                                                                <span className="bg-amber-100 text-amber-700 px-3 py-1 rounded-lg font-black shadow-sm border border-amber-200">{log.lateCount}</span>
                                                            ) : <span className="text-slate-300">-</span>}
                                                        </td>
                                                        <td className="p-4 text-center">
                                                            {log.absentCount > 0 ? (
                                                                <span className="bg-red-100 text-red-700 px-3 py-1 rounded-lg font-black shadow-sm border border-red-200">{log.absentCount}</span>
                                                            ) : <span className="text-slate-300">-</span>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="overflow-x-auto bg-white/90 rounded-2xl shadow-xl border border-white max-h-[600px] relative">
                                        <table className="w-full text-left border-collapse min-w-max">
                                            <thead className="sticky top-0 z-20 bg-white shadow-sm">
                                                <tr>
                                                    <th className="p-4 bg-white sticky left-0 z-30 border-r border-slate-100 text-xs font-black text-scis-navy uppercase tracking-widest min-w-[200px]">Student Name</th>
                                                    {getStudentMatrix().sortedLogs.map(log => (
                                                        <th key={log.id} className="p-4 text-center text-[10px] font-black text-slate-500 uppercase tracking-wider border-r border-slate-100 bg-white">
                                                            <div className="flex flex-col items-center">
                                                                <span>{log.timestamp ? new Date(log.timestamp.seconds*1000).toLocaleDateString('en-GB', {day:'2-digit', month:'short'}) : ''}</span>
                                                                <span className="text-slate-400 font-medium">{log.timestamp ? new Date(log.timestamp.seconds*1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : ''}</span>
                                                            </div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm divide-y divide-slate-100">
                                                {getStudentMatrix().students.map(studentName => (
                                                    <tr key={studentName} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-4 bg-white/90 sticky left-0 z-10 border-r border-slate-100 font-bold text-xs text-slate-700 backdrop-blur-md truncate">{studentName}</td>
                                                        {getStudentMatrix().studentMap[studentName].map((status, i) => {
                                                            let badgeStyle = "text-slate-300 font-black";
                                                            if (status === 'P') badgeStyle = "bg-green-100 text-green-700 border border-green-200 shadow-sm";
                                                            if (status === 'L') badgeStyle = "bg-amber-100 text-amber-700 border border-amber-200 shadow-sm";
                                                            if (status === 'A') badgeStyle = "bg-red-100 text-red-700 border border-red-200 shadow-sm";
                                                            
                                                            return (
                                                                <td key={i} className="p-2 text-center border-r border-slate-50">
                                                                    <div className={`w-8 h-8 mx-auto flex items-center justify-center rounded-lg font-black text-sm ${badgeStyle}`}>
                                                                        {status}
                                                                    </div>
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            if (!window.FirebaseDB) return <div className="flex h-screen items-center justify-center font-display font-black text-xl bg-scis-navy text-white">Initializing System...</div>;

            const [user, setUser] = useState(null);
            const [currentTab, setCurrentTab] = useState('take'); // 'take' | 'history'
            const [authLoaded, setAuthLoaded] = useState(false);
            const [students, setStudents] = useState([]);

            const userEmail = user?.email ? user.email.toLowerCase() : (user?.isAnonymous ? 'teacher@scis-bo.com' : null);

            useEffect(() => {
                const { auth, db, collection, query, onSnapshot, appId, signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.FirebaseDB;
                
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else if (!window.location.hostname.includes('github.io') && window.location.hostname !== 'localhost') {
                            await signInAnonymously(auth);
                        }
                    } catch (e) { console.error("Auth init failed:", e); }
                };

                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (u) => {
                    setUser(u);
                    setAuthLoaded(true);
                });

                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'students'));
                const unsubscribeStudents = onSnapshot(q, (snapshot) => {
                    const list = [];
                    snapshot.forEach(doc => {
                        let docData = doc.data();
                        let formattedGrade = docData.grade || '';
                        formattedGrade = formattedGrade.replace(/s1/gi, 'sA').replace(/s2/gi, 'sB');
                        list.push({ id: doc.id, ...docData, grade: formattedGrade, displayName: (docData.name || '').toUpperCase() });
                    });
                    list.sort((a,b) => a.name.localeCompare(b.name));
                    setStudents(list);
                });

                return () => {
                    unsubscribeAuth();
                    unsubscribeStudents();
                };
            }, []);

            const handleLogin = async () => {
                const { auth, signInWithPopup, OAuthProvider } = window.FirebaseDB;
                const provider = new OAuthProvider('microsoft.com');
                provider.setCustomParameters({ tenant: 'scis-bo.com' });
                try {
                    await signInWithPopup(auth, provider);
                } catch (error) {
                    console.error("Login failed:", error);
                }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.FirebaseDB;
                await signOut(auth);
            };

            if (!authLoaded) return <div className="flex h-screen items-center justify-center font-display font-black text-xl animate-pulse bg-scis-navy text-white">Connecting Database...</div>;

            if (!user || (!user.email && !user.isAnonymous)) {
                return (
                    <div className="flex h-screen flex-col items-center justify-center bg-scis-navy p-6 text-center relative overflow-hidden">
                        <div className="fixed top-0 left-0 w-full h-full -z-10 bg-gradient-animate pointer-events-none"></div>
                        <div className="glass-panel p-10 rounded-[2.5rem] shadow-2xl max-w-md w-full animate-slide-up z-10">
                            <div className="bg-scis-gold text-scis-navy w-20 h-20 mx-auto flex items-center justify-center rounded-[1.5rem] shadow-inner font-display font-black text-5xl mb-6">📝</div>
                            <h2 className="text-3xl font-black text-scis-navy font-display uppercase tracking-tight mb-2">SCIS Kiosk</h2>
                            <p className="text-slate-600 text-sm font-bold mb-10">Touch-screen Attendance Portal</p>
                            <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-white/50 text-scis-navy font-black py-4 px-4 rounded-2xl hover:bg-slate-50 transition-all shadow-xl btn-press">
                                <svg className="w-5 h-5" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg"><path fill="#f25022" d="M0 0h10v10H0z"/><path fill="#7fba00" d="M11 0h10v10H11z"/><path fill="#00a4ef" d="M0 11h10v10H0z"/><path fill="#ffb900" d="M11 11h10v10H11z"/></svg>
                                Sign In to Activate Kiosk
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative">
                    <div className="fixed top-0 left-0 w-full h-full -z-10 bg-gradient-animate pointer-events-none"></div>
                    
                    <nav className="glass-panel border-b border-white/20 px-4 md:px-8 py-4 sticky top-0 z-40 shadow-lg">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="bg-scis-navy text-scis-gold w-10 h-10 flex items-center justify-center rounded-xl shadow-inner font-display font-black text-xl border border-white/20">📝</div>
                                <div>
                                    <h1 className="text-xl font-display font-black text-scis-navy tracking-tight uppercase leading-none hidden sm:block drop-shadow-sm">Attendance Kiosk</h1>
                                    <h1 className="text-xl font-display font-black text-scis-navy tracking-tight uppercase leading-none sm:hidden">Kiosk</h1>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="flex bg-white/50 p-1.5 rounded-2xl shadow-inner border border-white/50">
                                    <button onClick={() => setCurrentTab('take')} className={`px-5 py-2 text-xs font-black uppercase tracking-widest rounded-xl transition-all ${currentTab === 'take' ? 'bg-scis-navy text-scis-gold shadow-md' : 'text-slate-600 hover:bg-white/40'}`}>Take</button>
                                    <button onClick={() => setCurrentTab('history')} className={`px-5 py-2 text-xs font-black uppercase tracking-widest rounded-xl transition-all ${currentTab === 'history' ? 'bg-scis-navy text-scis-gold shadow-md' : 'text-slate-600 hover:bg-white/40'}`}>Log</button>
                                </div>
                                <button onClick={handleLogout} className="bg-white/50 text-red-500 hover:text-red-700 hover:bg-white/80 p-3 rounded-2xl transition-all shadow-inner border border-white/50 btn-press" title="Sign Out">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                                </button>
                            </div>
                        </div>
                    </nav>

                    <main className="pt-6 sm:pt-8 pb-32 relative z-10">
                        {currentTab === 'take' ? <AttendanceTaker userEmail={userEmail} students={students} /> : <AttendanceHistory userEmail={userEmail} />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
